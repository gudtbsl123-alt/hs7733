<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>그래프 탐험대 — 6학년 선수학습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;--bg2:#111828;--card:#1A2035;
  --purple:#7C5CFC;--teal:#00D4A8;--amber:#FFB800;--coral:#FF4F6A;--green:#22D46A;
  --text:#F0F4FF;--text2:#8A9CC0;--text3:#445570;
  --border:rgba(255,255,255,.08);
  --font:'Noto Sans KR',sans-serif;--jua:'Jua',sans-serif;
}
html,body{
  height:100%;width:100%;
  font-family:var(--font);background:var(--bg);color:var(--text);
  overflow:hidden;touch-action:manipulation;
}
.screen{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ══ TITLE ══ */
#s-title{background:linear-gradient(160deg,#060B18,#0D1525 50%,#060B18);align-items:center;justify-content:center;position:relative;overflow:hidden}
#titleCanvas{position:absolute;inset:0;pointer-events:none;width:100%;height:100%}
.title-inner{position:relative;z-index:5;text-align:center;padding:clamp(12px,3vw,28px);width:100%;max-width:700px;overflow-y:auto;max-height:100%;}
.title-logo{font-family:var(--jua);font-size:clamp(28px,6vw,64px);line-height:1.15;margin-bottom:6px;text-shadow:0 0 40px rgba(124,92,252,.6)}
.title-logo span{color:var(--amber)}
.title-sub{font-size:clamp(12px,2vw,15px);color:var(--text2);margin-bottom:clamp(16px,3vw,28px);line-height:1.6}

/* 닉네임 입력 */
.nick-box{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(124,92,252,.5);
  border-radius:22px;padding:clamp(20px,4vw,32px) clamp(24px,5vw,40px);
  margin-bottom:clamp(20px,3.5vw,32px);
}
.nick-label{font-size:clamp(18px,3vw,26px);font-weight:700;color:var(--teal);margin-bottom:14px;letter-spacing:.5px}
.nick-input{
  width:100%;background:rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.15);
  border-radius:16px;padding:16px 24px;color:var(--text);
  font-size:clamp(22px,4vw,34px);font-family:var(--jua);outline:none;
  transition:.2s;text-align:center;
}
.nick-input:focus{border-color:var(--purple);background:rgba(124,92,252,.1)}
.nick-input::placeholder{color:var(--text3)}

.title-preview{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:20px;padding:clamp(16px,3vw,24px);margin-bottom:clamp(18px,3vw,28px);
  display:flex;gap:clamp(16px,3.5vw,36px);align-items:center;flex-wrap:wrap;justify-content:center;
}
.tp-item{text-align:center;min-width:90px}
.tp-icon{font-size:clamp(32px,5.5vw,48px);margin-bottom:6px}
.tp-label{font-size:clamp(14px,2.4vw,20px);color:var(--text2);font-weight:500;line-height:1.4}
.diff-btns{display:flex;gap:clamp(10px,2.5vw,20px);justify-content:center;margin-bottom:clamp(18px,3vw,28px);flex-wrap:wrap}
.diff-btn{
  padding:clamp(14px,2.5vw,20px) clamp(28px,5vw,48px);border-radius:50px;border:2.5px solid;cursor:pointer;
  font-size:clamp(18px,3vw,26px);font-weight:700;font-family:var(--font);transition:.2s;
}
.diff-btn.easy{border-color:var(--green);color:var(--green);background:rgba(34,212,106,.08)}
.diff-btn.mid{border-color:var(--amber);color:var(--amber);background:rgba(255,184,0,.08)}
.diff-btn.hard{border-color:var(--coral);color:var(--coral);background:rgba(255,79,106,.08)}
.diff-btn.selected.easy{background:rgba(34,212,106,.22)}
.diff-btn.selected.mid{background:rgba(255,184,0,.22)}
.diff-btn.selected.hard{background:rgba(255,79,106,.22)}
.diff-btn:hover{transform:scale(1.05)}
.start-btn{
  background:var(--purple);color:white;border:none;
  border-radius:50px;padding:clamp(18px,3vw,26px) clamp(52px,9vw,88px);
  font-size:clamp(22px,4vw,34px);font-weight:700;font-family:var(--jua);
  cursor:pointer;transition:.2s;box-shadow:0 0 30px rgba(124,92,252,.4);
}
.start-btn:hover{transform:scale(1.04);box-shadow:0 0 50px rgba(124,92,252,.6)}
.start-btn:disabled{opacity:.4;cursor:default;transform:none}

/* ══ GAME ══ */
#s-game{background:var(--bg)}
.hud{
  flex-shrink:0;padding:clamp(6px,1.2vw,10px) clamp(10px,2vw,16px);
  background:rgba(10,14,26,.9);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:clamp(6px,1.5vw,12px);z-index:10;
  flex-wrap:nowrap;overflow:hidden;
}
.hud-nick{font-family:var(--jua);font-size:clamp(11px,1.8vw,15px);color:var(--teal);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.hud-score{font-family:var(--jua);font-size:clamp(16px,2.5vw,22px);color:var(--amber);min-width:clamp(50px,8vw,80px)}
.hud-combo{
  background:rgba(124,92,252,.2);border:1px solid rgba(124,92,252,.4);
  border-radius:20px;padding:2px clamp(6px,1.5vw,12px);
  font-size:clamp(11px,1.5vw,13px);font-weight:700;color:#B8A0FF;
  white-space:nowrap;transition:.3s;
}
.hud-combo.hot{background:rgba(255,79,106,.25);border-color:rgba(255,79,106,.5);color:#FF8FA3;animation:comboPop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes comboPop{0%{transform:scale(.8)}100%{transform:scale(1)}}
.hud-hp-bar{display:flex;gap:2px;flex-shrink:0}
.hp-heart{font-size:clamp(13px,2vw,17px);transition:.3s}
.hp-heart.lost{filter:grayscale(1);opacity:.25}
.hud-qnum{font-size:clamp(10px,1.5vw,13px);color:var(--text2);margin-left:auto;white-space:nowrap}
.timer-ring{width:clamp(34px,5vw,42px);height:clamp(34px,5vw,42px);flex-shrink:0}
.timer-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4}
.timer-arc{fill:none;stroke:var(--teal);stroke-width:4;stroke-linecap:round;stroke-dasharray:100.5;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .4s}
.timer-text{font-family:var(--jua);font-size:12px;fill:white;dominant-baseline:central;text-anchor:middle}
.fart-btn{
  background:rgba(34,212,106,.15);border:2px solid var(--green);
  border-radius:20px;padding:3px clamp(8px,1.5vw,14px);
  font-size:clamp(10px,1.5vw,13px);font-weight:700;color:var(--green);
  cursor:pointer;font-family:var(--font);transition:.2s;white-space:nowrap;flex-shrink:0;
}
.fart-btn:disabled{opacity:.3;cursor:default;border-color:var(--text3);color:var(--text3);background:transparent}
.fart-btn:not(:disabled):hover{background:rgba(34,212,106,.3)}
.fart-count{font-size:10px;display:inline;opacity:.85}

/* CANVAS */
#gameCanvas{display:block;width:100%;flex-shrink:0}

/* QUESTION PANEL */
.q-panel{
  flex:1;min-height:0;
  padding:clamp(10px,2vw,16px) clamp(12px,2.5vw,20px) clamp(10px,2vw,14px);
  background:rgba(6,10,22,.98);border-top:2px solid rgba(124,92,252,.3);
  overflow-y:auto;display:flex;flex-direction:column;gap:clamp(8px,1.5vw,12px);
}
.q-text{
  font-size:clamp(22px,4vw,34px);font-weight:900;
  line-height:1.45;
  color:#F0F8FF;text-align:center;
  padding:clamp(12px,2.2vw,18px) clamp(10px,2vw,14px);
  background:rgba(124,92,252,.09);border-radius:14px;
  border:1px solid rgba(124,92,252,.25);
  letter-spacing:-.3px;flex-shrink:0;
}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,1.3vw,11px);flex:1}
@media(max-width:400px){.choices-grid{grid-template-columns:1fr}}
.choice{
  border:none;cursor:pointer;font-family:var(--font);
  font-size:clamp(17px,2.8vw,24px);font-weight:700;
  color:white;padding:clamp(12px,2vw,17px) clamp(12px,2vw,16px);
  display:flex;align-items:center;gap:10px;
  transition:transform .12s cubic-bezier(.34,1.56,.64,1),filter .12s;
  position:relative;overflow:hidden;text-align:left;
  min-height:clamp(60px,9.5vh,82px);
  line-height:1.3;
}
.choice:nth-child(1){background:#C02040;border-radius:40px 14px 40px 14px}
.choice:nth-child(2){background:#1450A8;border-radius:14px 40px 14px 40px}
.choice:nth-child(3){background:#15703A;border-radius:40px 14px 40px 14px}
.choice:nth-child(4){background:#A05800;border-radius:14px 40px 14px 40px}
.choice::before{content:'';position:absolute;inset:0;background:linear-gradient(150deg,rgba(255,255,255,.18) 0%,transparent 50%);pointer-events:none}
.choice:hover:not(:disabled){transform:scale(1.03);filter:brightness(1.12)}
.choice:disabled{cursor:default}
.choice.correct{outline:3px solid #00FFD1;outline-offset:2px;animation:cbounce .4s cubic-bezier(.34,1.56,.64,1)}
.choice.wrong{opacity:.22;filter:grayscale(.85)}
@keyframes cbounce{0%{transform:scale(1)}45%{transform:scale(1.06)}80%{transform:scale(.98)}100%{transform:scale(1)}}
.choice .csym{
  width:clamp(32px,4.5vw,42px);height:clamp(32px,4.5vw,42px);
  border-radius:50%;background:rgba(0,0,0,.32);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(14px,2.2vw,19px);font-weight:900;flex-shrink:0;
  font-family:var(--jua);
}
.feedback{display:none}/* 기존 피드백 숨김 — ox-overlay로 대체 */

/* ── O/X 전체화면 오버레이 ── */
#oxOverlay{
  position:fixed;inset:0;z-index:800;
  display:none;align-items:center;justify-content:center;
  pointer-events:none;
}
#oxOverlay.show{display:flex}
.ox-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  animation:oxPop .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes oxPop{
  0%{opacity:0;transform:scale(.3)}
  60%{transform:scale(1.12)}
  100%{opacity:1;transform:scale(1)}
}
.ox-symbol{
  font-family:var(--jua);
  font-size:clamp(130px,28vw,220px);
  line-height:1;
  filter:drop-shadow(0 0 40px currentColor);
  margin-bottom:8px;
}
.ox-symbol.ok{ color:#00FFD1; text-shadow:0 0 60px rgba(0,255,200,.8),0 0 120px rgba(0,255,200,.4); }
.ox-symbol.no{ color:#FF4F6A; text-shadow:0 0 60px rgba(255,79,106,.8),0 0 120px rgba(255,79,106,.4); }
.ox-msg{
  font-family:var(--jua);
  font-size:clamp(18px,3.5vw,28px);
  padding:8px 24px;
  border-radius:50px;
  font-weight:700;
}
.ox-msg.ok{ background:rgba(0,255,200,.15);color:#00FFD1;border:2px solid rgba(0,255,200,.4); }
.ox-msg.no{ background:rgba(255,79,106,.15);color:#FF8FA3;border:2px solid rgba(255,79,106,.4); }
.ox-hp{
  font-size:clamp(14px,2.5vw,20px);
  margin-top:8px;
  font-weight:700;
  color:#FFB800;
}

/* BONUS FLASH */
.bonus-flash{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--jua);font-size:clamp(22px,5vw,48px);color:var(--amber);
  pointer-events:none;z-index:999;text-shadow:0 0 20px rgba(255,184,0,.7);
  display:none;white-space:nowrap;
}
@keyframes bonusAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}40%{opacity:1;transform:translate(-50%,-80%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-130%) scale(1)}}

/* ══ RESULT ══ */
#s-result{background:var(--bg);align-items:center;justify-content:center;overflow-y:auto}
.result-inner{text-align:center;padding:clamp(20px,4vw,32px) clamp(16px,4vw,24px);max-width:520px;width:100%}
.result-rank{font-family:var(--jua);font-size:clamp(40px,8vw,60px);margin-bottom:4px}
.result-title{font-family:var(--jua);font-size:clamp(18px,3.5vw,24px);margin-bottom:4px}
.result-sub{font-size:clamp(12px,2vw,14px);color:var(--text2);margin-bottom:20px;line-height:1.6}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.rs-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:clamp(10px,2vw,14px) 8px;text-align:center}
.rs-val{font-family:var(--jua);font-size:clamp(18px,3.5vw,26px);margin-bottom:2px}
.rs-val.amber{color:var(--amber)}.rs-val.teal{color:var(--teal)}.rs-val.coral{color:var(--coral)}
.rs-label{font-size:clamp(9px,1.5vw,11px);color:var(--text2);letter-spacing:.5px}
.wrong-list{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:clamp(12px,2vw,16px);margin-bottom:20px;text-align:left;max-height:40vh;overflow-y:auto}
.wrong-list h3{font-size:clamp(12px,2vw,14px);font-weight:700;color:var(--coral);margin-bottom:8px}
.wrong-item{font-size:clamp(11px,1.8vw,13px);color:var(--text2);padding:7px 0;border-bottom:1px solid var(--border);line-height:1.5}
.wrong-item:last-child{border-bottom:none}
.wrong-item strong{color:var(--teal);display:block;font-size:clamp(10px,1.6vw,12px);margin-top:2px}
.result-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.rbtn{border-radius:50px;padding:clamp(10px,1.8vw,12px) clamp(20px,4vw,28px);font-size:clamp(13px,2vw,15px);font-weight:700;font-family:var(--font);cursor:pointer;transition:.2s}
.rbtn.primary{background:var(--purple);color:white;border:none}
.rbtn.secondary{background:transparent;color:var(--text2);border:2px solid var(--border)}
.rbtn:hover{transform:scale(1.04)}

/* ══ HINT POPUP (오답 팁) ══ */
#hintPopup{
  position:fixed;inset:0;z-index:700;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
}
#hintPopup.show{display:flex}
.hint-box{
  background:linear-gradient(145deg,#0A1A2E,#0E2240);
  border:2px solid rgba(255,184,0,.45);
  border-radius:28px;
  padding:clamp(20px,4vw,36px) clamp(20px,4vw,36px);
  max-width:480px;width:92%;
  text-align:center;
  box-shadow:0 0 60px rgba(255,184,0,.15), 0 0 120px rgba(0,80,160,.2);
  animation:hintBoxIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes hintBoxIn{
  0%{opacity:0;transform:scale(.7) translateY(24px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.hint-x-badge{
  font-family:var(--jua);
  font-size:clamp(52px,12vw,80px);
  color:#FF4F6A;
  text-shadow:0 0 30px rgba(255,79,106,.7);
  line-height:1;
  margin-bottom:6px;
  display:block;
}
.hint-label{
  font-size:clamp(11px,1.8vw,13px);
  letter-spacing:2px;
  font-weight:700;
  color:var(--text3);
  margin-bottom:10px;
}
.hint-correct-row{
  background:rgba(0,212,168,.1);
  border:1.5px solid rgba(0,212,168,.3);
  border-radius:14px;
  padding:10px 16px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.hint-correct-icon{font-size:22px;flex-shrink:0}
.hint-correct-text{
  font-size:clamp(14px,2.5vw,18px);
  font-weight:700;
  color:#00FFD1;
  text-align:left;
}
.hint-tip-box{
  background:rgba(255,184,0,.07);
  border:1.5px solid rgba(255,184,0,.25);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:18px;
  text-align:left;
}
.hint-tip-title{
  font-size:clamp(11px,1.8vw,13px);
  font-weight:700;
  color:var(--amber);
  letter-spacing:1px;
  margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.hint-tip-text{
  font-size:clamp(13px,2.2vw,16px);
  color:var(--text2);
  line-height:1.75;
  word-break:keep-all;
}
.hint-tip-text strong{color:var(--text);font-weight:700}
.hint-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hint-btn{
  border:none;border-radius:50px;
  padding:clamp(12px,2.5vw,16px) clamp(20px,4vw,32px);
  font-family:var(--font);font-size:clamp(14px,2.5vw,18px);font-weight:700;
  cursor:pointer;transition:.18s cubic-bezier(.34,1.56,.64,1);
}
.hint-btn:hover{transform:scale(1.05)}
.hint-btn.retry{
  background:linear-gradient(135deg,#1A6ED4,#2E90FF);
  color:white;
  box-shadow:0 4px 20px rgba(30,110,212,.4);
}
.hint-btn.next{
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.18);
  color:var(--text2);
}
.hint-btn.next:hover{color:var(--text);background:rgba(255,255,255,.12)}
#overlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(6px)}
#overlay.show{display:flex}
.overlay-box{text-align:center;padding:clamp(20px,4vw,32px);max-width:380px;width:90%}
.overlay-icon{font-size:clamp(48px,10vw,80px);margin-bottom:10px;animation:iconBounce .5s cubic-bezier(.34,1.56,.64,1);display:block}
@keyframes iconBounce{0%{transform:scale(0)}100%{transform:scale(1)}}
.overlay-title{font-family:var(--jua);font-size:clamp(22px,4vw,30px);margin-bottom:6px}
.overlay-sub{font-size:clamp(13px,2vw,15px);color:var(--text2);margin-bottom:18px;line-height:1.6;white-space:pre-line}
.overlay-btn{background:var(--purple);color:white;border:none;border-radius:50px;padding:clamp(10px,2vw,13px) clamp(28px,5vw,36px);font-size:clamp(14px,2.2vw,17px);font-weight:700;font-family:var(--jua);cursor:pointer;transition:.2s}
.overlay-btn:hover{transform:scale(1.05)}

/* ══ DEATH CHOICE POPUP ══ */
#deathPopup{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(10px);
}
#deathPopup.show{display:flex}
.death-box{
  background:linear-gradient(145deg,#140820,#1E0A2E);
  border:2px solid rgba(255,79,106,.5);
  border-radius:28px;
  padding:clamp(24px,5vw,40px) clamp(24px,5vw,40px);
  max-width:440px;width:92%;
  text-align:center;
  box-shadow:0 0 60px rgba(255,20,60,.25), 0 0 120px rgba(100,0,50,.2);
  animation:deathBoxIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes deathBoxIn{
  0%{opacity:0;transform:scale(.7) translateY(30px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.death-icon{font-size:clamp(56px,12vw,88px);display:block;margin-bottom:10px;animation:deathIconWobble 1s ease infinite alternate}
@keyframes deathIconWobble{0%{transform:rotate(-8deg) scale(.97)}100%{transform:rotate(8deg) scale(1.03)}}
.death-title{
  font-family:var(--jua);
  font-size:clamp(26px,5vw,38px);
  color:#FF4F6A;
  margin-bottom:6px;
  text-shadow:0 0 20px rgba(255,79,106,.6);
}
.death-nick{
  font-size:clamp(14px,2.5vw,18px);
  color:var(--text2);
  margin-bottom:20px;
  line-height:1.6;
}
.death-nick strong{color:#FFB800}
.death-divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,79,106,.4),transparent);
  margin:18px 0;
}
.death-choice-label{
  font-size:clamp(12px,2vw,14px);
  color:var(--text3);
  letter-spacing:1px;
  font-weight:700;
  margin-bottom:14px;
}
.death-btns{display:flex;flex-direction:column;gap:12px}
.death-btn{
  border:none;border-radius:18px;
  padding:clamp(15px,3vw,20px) clamp(20px,4vw,28px);

<body>

<!-- ══ TITLE ══ -->
<div id="s-title" class="screen active">

      <div class="tp-item"><div class="tp-icon">👾</div><div class="tp-label">몬스터<br>추격!</div></div>

      <button class="diff-btn easy" onclick="selectDiff('easy',this)">🌱 하</button>

      <button class="diff-btn hard" onclick="selectDiff('hard',this)">💀 상</button>

<div id="s-game" class="screen">

  </div>
</div>

    <div class="overlay-sub" id="overlaySub"></div>

    </div>
  </div>
</div>

<div id="oxOverlay">

let deathSnapshot=null; // {currentQ, score, combo, maxCombo, hp, fartCharges, correctCount, wrongList[]}

function initCanvas(){
  /* 실제 남은 공간을 계산: 전체 화면 - HUD 높이 - q-panel 최소 높이 */
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  const hudEl=document.querySelector('.hud');
  const hudH=hudEl?hudEl.offsetHeight:50;

  /* q-panel: 문제 + 보기 4개가 들어갈 최소 높이
     모바일: vh*0.42, 태블릿: vh*0.38, 데스크탑: vh*0.35 */
  let qPanelMin;
  if(vw<480)      qPanelMin=Math.round(vh*0.44);
  else if(vw<900) qPanelMin=Math.round(vh*0.40);
  else            qPanelMin=Math.round(vh*0.36);
  qPanelMin=Math.max(200,qPanelMin);

  /* 캔버스 높이 = 전체 - HUD - q-panel */
  let canvasH=vh-hudH-qPanelMin;
  /* 캔버스 최소 높이: 몬스터 2배 스케일 전신이 보이려면
     몬스터 원본 높이 = 뿔끝(-68) ~ 발(+10) = 78px, mScale = canvasH/200*2
     필요: (78 * mScale) + 여백 < canvasH
     => canvasH >= 78 * (canvasH/200*2) + 30  => canvasH >= 180px */
  canvasH=Math.max(200,canvasH);

  canvas.style.height=canvasH+'px';
  canvas.width=canvas.offsetWidth||vw;
  canvas.height=canvasH;
  cw=canvas.width; ch=canvasH;

  if(!gameReady){
    heroX=cw*0.65; targetHeroX=heroX;
    monsterX=cw*0.08; targetMonsterX=cw*0.10;
  }
}

/* HP 단계별 몬스터 절대 위치 상한선 — heroX 기반이 아닌 화면 비율 기준
   HP3: 화면 35%까지 (멀리서)
   HP2: 화면 48%까지 (중간)
   HP1: 화면 56%까지 (바짝) — 단, 영웅보다 항상 왼쪽 */
function getMonsterCap(){
  const base = hp>=3 ? cw*0.35
             : hp===2 ? cw*0.48
             : cw*0.56;
  const extra = consWrong * cw * 0.02;
  /* 항상 영웅보다 최소 ch*0.07 왼쪽에 위치 */
  return Math.min(base + extra, heroX - ch*0.07);
}

function updatePositions(correct){
  if(correct){
    targetHeroX = Math.min(cw*0.85, heroX + cw*0.08);
    if(monsterStunned<=0){
      const cap = getMonsterCap();
      targetMonsterX = Math.min(cap, monsterX + cw*0.008);
    }
  } else {
    const cap = getMonsterCap();
    const jump = monsterX + cw*0.18;
    targetMonsterX = Math.min(cap, jump);
    /* 영웅은 살짝 후퇴하되 화면 밖으로 나가지 않게 */
    targetHeroX = Math.max(cw*0.30, heroX - cw*0.03);
    shakeAmt=10; shakeTimer=22;
  }
}

function applyFartEffect(){
  monsterStunned=100;
  /* 방귀: 현재 HP 단계보다 한 단계 뒤로 밀어냄 */
  const pushBack = hp>=3 ? cw*0.06 : hp===2 ? cw*0.12 : cw*0.18;
  targetMonsterX = Math.max(cw*0.04, monsterX - pushBack);
  for(let i=0;i<28;i++){
    particles.push({
      x:heroX-20, y:ch*(0.55+Math.random()*0.1),
      vx:-(Math.random()*5+2), vy:(Math.random()-0.5)*3,
      life:75, maxLife:75, size:Math.random()*16+8,
      color:`hsl(${75+Math.random()*55},88%,58%)`
    });
  }
  fartAnim=70;
}

/* ── GAME LOOP ── */
function gameLoop(t){
  if(!gameReady)return;
  const dt=Math.min((t-lastT)/16,3); lastT=t;
  heroX+=(targetHeroX-heroX)*0.07*dt;
  monsterX+=(targetMonsterX-monsterX)*0.07*dt;
  heroAnim+=0.13*dt; monsterAnim+=0.11*dt;
  bgOffset=(bgOffset+0.9*dt)%cw;
  if(shakeTimer>0){shakeTimer-=dt;if(shakeTimer<=0)shakeAmt=0;}
  if(monsterStunned>0)monsterStunned-=dt;
  if(fartAnim>0)fartAnim-=dt;
  if(deathAnim){deathT+=dt;heroEatenPct=Math.min(1,deathT/60);}
  if(speedBoostTimer>0)speedBoostTimer-=dt;
  if(lightningTimer>0){lightningTimer-=dt; if(lightningTimer<=0)lightningMode=false;}
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=dt;});
  draw();
  requestAnimationFrame(gameLoop);
}

function draw(){
  const sx=shakeTimer>0?(Math.random()-0.5)*shakeAmt:0;
  const sy=shakeTimer>0?(Math.random()-0.5)*shakeAmt*0.4:0;
  ctx.save(); ctx.translate(sx,sy);
  ctx.clearRect(-20,-20,cw+40,ch+40);

  const theme = hp>=3?0 : hp===2?1 : 2;
  const groundY = ch*0.70;

  /* ══════════════════════════════════
     테마 0: 🌲 밤의 숲 (Night Forest)
  ══════════════════════════════════ */
  if(theme===0){
    /* 하늘 — 깊은 남색 그라디언트 */
    const sky=ctx.createLinearGradient(0,0,0,groundY);
    sky.addColorStop(0,'#03071A'); sky.addColorStop(0.5,'#0A1535'); sky.addColorStop(1,'#122040');
    ctx.fillStyle=sky; ctx.fillRect(0,0,cw,groundY);

    /* 달 */
    const moonX=cw*0.82, moonY=ch*0.12, moonR=ch*0.09;
    const moonGlow=ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*3);
    moonGlow.addColorStop(0,'rgba(200,220,255,.12)'); moonGlow.addColorStop(1,'transparent');
    ctx.fillStyle=moonGlow; ctx.fillRect(0,0,cw,groundY);
    ctx.fillStyle='#D8E8FF';
    ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
    /* 달 크레이터 */
    ctx.fillStyle='rgba(160,180,220,.5)';
    [[moonX-moonR*.2,moonY+moonR*.1,moonR*.18],[moonX+moonR*.3,moonY-moonR*.2,moonR*.12],[moonX-moonR*.1,moonY-moonR*.3,moonR*.08]].forEach(([x,y,r])=>{
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    });

    /* 별 (반짝임) */
    for(let i=0;i<80;i++){
      const bx=((i*137+13)%cw);
      const by=((i*61+7)%(groundY*0.85));
      const a=(0.3+Math.sin(i*2.3+heroAnim*(0.5+i%3*0.3))*0.4)*( Math.random()<0.02?0.1:1);
      ctx.globalAlpha=a; ctx.fillStyle=i%5===0?'#AAD4FF':'#FFFFFF';
      const r=i%7===0?1.4:0.7;
      ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    /* 유성 (가끔) */
    if(Math.sin(heroAnim*0.07)*Math.cos(heroAnim*0.13)>0.95){
      const mx=(heroAnim*80)%cw;
      ctx.save(); ctx.globalAlpha=0.7;
      ctx.strokeStyle='white'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(mx,ch*0.05); ctx.lineTo(mx+40,ch*0.12); ctx.stroke();
      ctx.restore();
    }

    /* 먼 산 실루엣 (3레이어) */
    [['#0B1C3A',0.55,0.14,0.16],['#0E2245',0.62,0.18,0.12],['#112850',0.67,0.22,0.09]].forEach(([col,gy,mh,spd],li)=>{
      ctx.fillStyle=col;
      for(let i=0;i<12;i++){
        const mx=((i*160-bgOffset*spd*cw)%(cw+200))-100;
        const mhh=ch*mh+((i*43+li*17)%(ch*0.07));
        ctx.beginPath(); ctx.moveTo(mx,ch*gy); ctx.lineTo(mx+80,ch*gy-mhh); ctx.lineTo(mx+160,ch*gy); ctx.fill();
      }
    });

    /* 안개 (땅 근처) */
    const fogGrd=ctx.createLinearGradient(0,groundY-ch*0.1,0,groundY);
    fogGrd.addColorStop(0,'transparent'); fogGrd.addColorStop(1,'rgba(20,40,80,.4)');
    ctx.fillStyle=fogGrd; ctx.fillRect(0,groundY-ch*0.1,cw,ch*0.1);

    /* 땅 */
    const g1=ctx.createLinearGradient(0,groundY,0,ch);
    g1.addColorStop(0,'#1E4A18'); g1.addColorStop(0.3,'#163A12'); g1.addColorStop(1,'#0E2A0A');
    ctx.fillStyle=g1; ctx.fillRect(0,groundY,cw,ch-groundY);
    /* 풀 라인 */
    const grassGrd=ctx.createLinearGradient(0,groundY-4,0,groundY+10);
    grassGrd.addColorStop(0,'#2E6B22'); grassGrd.addColorStop(1,'#1E4A18');
    ctx.fillStyle=grassGrd; ctx.fillRect(0,groundY-2,cw,14);

    /* 나무 — 3종류 레이어 */
    /* 뒷배경 소나무 */
    for(let i=0;i<20;i++){
      const tx=((i*113+55-bgOffset*0.6)%(cw+80))-40;
      const th=ch*(0.18+((i*31)%(0.14)));
      ctx.fillStyle=`rgba(${10+i%8},${30+i%15},${20+i%10},.85)`;
      ctx.beginPath(); ctx.moveTo(tx,groundY); ctx.lineTo(tx+8,groundY-th); ctx.lineTo(tx+16,groundY); ctx.fill();
    }
    /* 앞 나무 */
    for(let i=0;i<14;i++){
      const tx=((i*140+20-bgOffset*1.2)%(cw+90))-45;
      const th=ch*(0.20+((i*37)%0.12));
      const tw=20+i%8;
      /* 나무 몸통 */
      ctx.fillStyle='#3A1A08';
      ctx.fillRect(tx+tw/2-3,groundY-th*0.4,6,th*0.45);
      /* 잎 3단 */
      [[0,0,tw],[0.3,-th*0.25,tw*.75],[0.55,-th*0.5,tw*.5]].forEach(([fr,dy,w])=>{
        ctx.fillStyle=i%4===0?'#1A5C14':'#1E6818';
        ctx.beginPath(); ctx.moveTo(tx,groundY-th*fr+dy); ctx.lineTo(tx+tw/2,groundY-th*fr+dy-th*0.28); ctx.lineTo(tx+tw,groundY-th*fr+dy); ctx.fill();
      });
    }

    /* 반딧불 */
    for(let i=0;i<12;i++){
      const fbx=((i*173+bgOffset*0.8+Math.sin(heroAnim*(0.3+i*.1))*20)%cw);
      const fby=groundY-ch*0.05-((i*47)%(ch*0.25))+Math.sin(heroAnim*(0.4+i*.07))*ch*0.03;
      const fa=0.4+Math.sin(heroAnim*2+i*1.4)*0.4;
      ctx.globalAlpha=fa;
      ctx.fillStyle='#AAFF60';
      ctx.beginPath(); ctx.arc(fbx,fby,2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(150,255,80,.2)';
      ctx.beginPath(); ctx.arc(fbx,fby,6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  /* ══════════════════════════════════
     테마 1: 🌅 황혼의 숲 (Twilight)
  ══════════════════════════════════ */
  else if(theme===1){
    /* 하늘 — 황혼 */
    const sky=ctx.createLinearGradient(0,0,0,groundY);
    sky.addColorStop(0,'#0D0520'); sky.addColorStop(0.3,'#2D0A00'); sky.addColorStop(0.65,'#8B2500'); sky.addColorStop(0.85,'#E04000'); sky.addColorStop(1,'#F06020');
    ctx.fillStyle=sky; ctx.fillRect(0,0,cw,groundY);

    /* 태양 (지평선 위) */
    const sunX=cw*0.72, sunY=groundY*0.85;
    const sunGlow=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,ch*0.3);
    sunGlow.addColorStop(0,'rgba(255,180,0,.5)'); sunGlow.addColorStop(0.4,'rgba(255,80,0,.2)'); sunGlow.addColorStop(1,'transparent');
    ctx.fillStyle=sunGlow; ctx.fillRect(0,0,cw,groundY);
    ctx.fillStyle='#FFA000';
    ctx.beginPath(); ctx.arc(sunX,sunY,ch*0.06,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFCC00';
    ctx.beginPath(); ctx.arc(sunX,sunY,ch*0.04,0,Math.PI*2); ctx.fill();

    /* 구름 (황혼빛) */
    for(let i=0;i<6;i++){
      const cx2=((i*190+bgOffset*0.3)%(cw+200))-100;
      const cy=ch*(0.1+i%3*0.08);
      const cw2=80+i%4*30; const cha=10+i%3*6;
      ctx.globalAlpha=0.35+i%3*0.1;
      ctx.fillStyle=i%2===0?'#FF6030':'#CC3010';
      ctx.beginPath(); ctx.ellipse(cx2,cy,cw2,cha,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,150,60,.4)';
      ctx.beginPath(); ctx.ellipse(cx2-cw2*.3,cy,cw2*.6,cha*.8,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    /* 산 실루엣 — 어두운 보라/검정 */
    [['#1A0828',0.60,0.20,0.12],['#220A32',0.65,0.25,0.08]].forEach(([col,gy,mh,spd])=>{
      ctx.fillStyle=col;
      for(let i=0;i<10;i++){
        const mx=((i*170-bgOffset*spd*cw)%(cw+200))-100;
        const mhh=ch*mh+((i*47)%(ch*0.08));
        ctx.beginPath(); ctx.moveTo(mx,ch*gy); ctx.lineTo(mx+90,ch*gy-mhh); ctx.lineTo(mx+180,ch*gy); ctx.fill();
      }
    });

    /* 땅 */
    const g2=ctx.createLinearGradient(0,groundY,0,ch);
    g2.addColorStop(0,'#2A1200'); g2.addColorStop(0.5,'#1A0A00'); g2.addColorStop(1,'#100600');
    ctx.fillStyle=g2; ctx.fillRect(0,groundY,cw,ch-groundY);
    /* 메마른 땅 라인 */
    ctx.fillStyle='#3D1800'; ctx.fillRect(0,groundY-2,cw,10);
    /* 균열 */
    ctx.strokeStyle='rgba(80,30,0,.6)'; ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      const cx3=((i*130-bgOffset*0.8)%cw);
      ctx.beginPath(); ctx.moveTo(cx3,groundY+2); ctx.lineTo(cx3+20,groundY+12); ctx.lineTo(cx3+10,groundY+22); ctx.stroke();
    }

    /* 앙상한 나무 */
    for(let i=0;i<12;i++){
      const tx=((i*140+30-bgOffset*1.1)%(cw+90))-45;
      const th=ch*(0.22+((i*29)%0.12));
      /* 줄기 */
      ctx.strokeStyle=i%3===0?'#2A0A00':'#1A0800';
      ctx.lineWidth=3+i%3;
      ctx.beginPath(); ctx.moveTo(tx+10,groundY); ctx.lineTo(tx+10,groundY-th); ctx.stroke();
      /* 가지 */
      ctx.lineWidth=1.5;
      [[-15,-0.7],[-22,-0.5],[12,-0.6],[18,-0.45],[-8,-0.3],[10,-0.2]].forEach(([dx,fr])=>{
        ctx.beginPath(); ctx.moveTo(tx+10,groundY-th*( -fr)); ctx.lineTo(tx+10+dx,groundY-th*(-fr)-ch*0.06); ctx.stroke();
      });
    }

    /* 불씨/재 파티클 */
    for(let i=0;i<20;i++){
      const ex=((i*97+bgOffset*1.5)%cw);
      const ey=groundY-((i*73+bgOffset*0.8)%(ch*0.5));
      const ea=0.4+Math.sin(i*1.8+heroAnim)*0.35;
      ctx.globalAlpha=ea;
      ctx.fillStyle=i%3===0?'#FF8020':'#FFAA00';
      ctx.beginPath(); ctx.arc(ex,ey,1.5+Math.sin(i*2.2)*0.8,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  /* ══════════════════════════════════
     테마 2: 🌋 용암 지대 (Lava)
  ══════════════════════════════════ */
  else {
    /* 하늘 — 연기 낀 붉은 하늘 */
    const sky=ctx.createLinearGradient(0,0,0,groundY);
    sky.addColorStop(0,'#050000'); sky.addColorStop(0.4,'#1A0000'); sky.addColorStop(0.75,'#3D0000'); sky.addColorStop(1,'#5A0000');
    ctx.fillStyle=sky; ctx.fillRect(0,0,cw,groundY);

    /* 화산 연기 구름 */
    for(let i=0;i<8;i++){
      const scx=((i*150+bgOffset*0.5)%(cw+200))-100;
      const scy=ch*(0.05+i%4*0.06);
      const sr=40+i%3*25;
      ctx.globalAlpha=0.18+i%3*0.07;
      ctx.fillStyle=i%2===0?'#2A1010':'#1A0808';
      ctx.beginPath(); ctx.arc(scx,scy,sr,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(scx+sr*.5,scy-sr*.3,sr*.7,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    /* 용암 빛 환경광 */
    const lavaGlow=ctx.createRadialGradient(cw*0.5,groundY,0,cw*0.5,groundY,ch*0.8);
    lavaGlow.addColorStop(0,'rgba(255,80,0,.18)'); lavaGlow.addColorStop(1,'transparent');
    ctx.fillStyle=lavaGlow; ctx.fillRect(0,0,cw,groundY);

    /* 화산 (배경) */
    for(let i=0;i<5;i++){
      const vx=((i*220-bgOffset*0.12)%(cw+300))-150;
      const vh=ch*(0.30+((i*41)%0.20));
      /* 화산체 */
      ctx.fillStyle=i%2===0?'#1A0400':'#220600';
      ctx.beginPath(); ctx.moveTo(vx,groundY*0.85); ctx.lineTo(vx+ch*0.25,groundY*0.85-vh); ctx.lineTo(vx+ch*0.5,groundY*0.85); ctx.fill();
      /* 분화구 */
      ctx.fillStyle='#440800';
      ctx.beginPath(); ctx.ellipse(vx+ch*0.25,groundY*0.85-vh,ch*0.06,ch*0.03,0,0,Math.PI*2); ctx.fill();
      /* 용암 흘러내리기 */
      const lavaFlowGrd=ctx.createLinearGradient(0,groundY*0.85-vh,0,groundY*0.85);
      lavaFlowGrd.addColorStop(0,'rgba(255,100,0,.8)'); lavaFlowGrd.addColorStop(1,'rgba(180,40,0,.3)');
      ctx.fillStyle=lavaFlowGrd;
      ctx.beginPath();
      ctx.moveTo(vx+ch*0.22,groundY*0.85-vh+5);
      ctx.quadraticCurveTo(vx+ch*0.21,groundY*0.85-vh*0.5,vx+ch*0.20,groundY*0.85);
      ctx.quadraticCurveTo(vx+ch*0.28,groundY*0.85-vh*0.5,vx+ch*0.28,groundY*0.85-vh+5);
      ctx.fill();
    }

    /* 땅 — 용암 균열 */
    const g3=ctx.createLinearGradient(0,groundY,0,ch);
    g3.addColorStop(0,'#2A0800'); g3.addColorStop(0.3,'#1A0400'); g3.addColorStop(1,'#0D0200');
    ctx.fillStyle=g3; ctx.fillRect(0,groundY,cw,ch-groundY);
    /* 용암 균열 선들 */
    for(let i=0;i<10;i++){
      const cx4=((i*110-bgOffset*1.8)%(cw+80))-40;
      const glowAlpha=0.5+Math.sin(heroAnim*2+i*1.2)*0.35;
      ctx.globalAlpha=glowAlpha;
      /* 균열 빛 */
      const crackGrd=ctx.createLinearGradient(cx4,groundY,cx4+30,groundY+30);
      crackGrd.addColorStop(0,'#FF6000'); crackGrd.addColorStop(0.5,'#FF3000'); crackGrd.addColorStop(1,'#CC1000');
      ctx.strokeStyle=crackGrd; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(cx4,groundY); ctx.lineTo(cx4+15,groundY+18); ctx.lineTo(cx4+8,groundY+35); ctx.stroke();
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx4+15,groundY+18); ctx.lineTo(cx4+30,groundY+28); ctx.stroke();
    }
    ctx.globalAlpha=1;
    /* 용암 표면 라인 */
    const lavaSurface=ctx.createLinearGradient(0,groundY-4,0,groundY+8);
    lavaSurface.addColorStop(0,'#FF5000'); lavaSurface.addColorStop(0.5,'#CC2000'); lavaSurface.addColorStop(1,'transparent');
    ctx.fillStyle=lavaSurface; ctx.fillRect(0,groundY-3,cw,12);

    /* 용암 웅덩이 */
    for(let i=0;i<6;i++){
      const px=((i*180+40-bgOffset*0.9)%(cw+100))-50;
      const pa=0.55+Math.sin(heroAnim*1.5+i)*0.3;
      ctx.globalAlpha=pa;
      const poolGrd=ctx.createRadialGradient(px,groundY+8,0,px,groundY+8,25+i%8*3);
      poolGrd.addColorStop(0,'#FF8000'); poolGrd.addColorStop(0.4,'#FF3000'); poolGrd.addColorStop(1,'rgba(150,20,0,.3)');
      ctx.fillStyle=poolGrd;
      ctx.beginPath(); ctx.ellipse(px,groundY+8,25+i%8*3,10+i%4*2,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    /* 불씨 상승 파티클 */
    for(let i=0;i<40;i++){
      const ex=((i*89+bgOffset*2.5)%cw);
      const ey=ch-((i*71+bgOffset*3)%(ch*0.65));
      const ea=0.5+Math.sin(i*1.6+heroAnim*2)*0.4;
      ctx.globalAlpha=ea;
      ctx.fillStyle=i%4===0?'#FF9000':i%4===1?'#FF4000':'#FFCC00';
      ctx.beginPath(); ctx.arc(ex,ey,1.2+Math.sin(i)*0.8,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    /* 용암 튀기기 이펙트 */
    if(Math.sin(heroAnim*0.3)*Math.cos(heroAnim*0.7)>0.9){
      const spx=Math.random()*cw; const spy=groundY;
      for(let s=0;s<6;s++){
        const ang=Math.random()*Math.PI;
        const spd=ch*0.05+Math.random()*ch*0.08;
        ctx.globalAlpha=0.7;
        ctx.fillStyle='#FF6000';
        ctx.beginPath(); ctx.arc(spx+Math.cos(ang)*spd*.3,spy-Math.sin(ang)*spd*.3,3,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }

  /* ══ 번개 이펙트 (2콤보마다 짧고 강렬하게) ══ */
  if(lightningMode&&lightningTimer>0){
    const lt=lightningTimer;
    /* 노란 플래시 오버레이 — 터질 때 강하고 빠르게 */
    ctx.fillStyle=`rgba(255,230,0,${(lt/40)*0.18})`; ctx.fillRect(0,0,cw,ch);
    /* 번개 볼트 2~3개 */
    const boltCount=lt>25?3:lt>12?2:1;
    for(let b=0;b<boltCount;b++){
      ctx.save();
      ctx.strokeStyle=`rgba(255,255,80,${(lt/40)*0.85})`;
      ctx.lineWidth=1.5+b*0.5;
      ctx.shadowColor='#FFFF00'; ctx.shadowBlur=12;
      ctx.beginPath();
      let lx=cw*(0.2+b*0.3)+( Math.random()-0.5)*40, ly=0;
      ctx.moveTo(lx,ly);
      for(let s=0;s<8;s++){
        lx+=(Math.random()-0.5)*55;
        ly+=ch/8;
        ctx.lineTo(lx,ly);
      }
      ctx.stroke(); ctx.restore();
    }
    /* 화면 테두리 번쩍 */
    ctx.save();
    ctx.strokeStyle=`rgba(255,230,0,${(lt/40)*0.6})`;
    ctx.lineWidth=6;
    ctx.strokeRect(3,3,cw-6,ch-6);
    ctx.restore();
  }

  /* ══ 방귀 구름 ══ */
  if(fartAnim>0){
    const alpha=(fartAnim/70)*0.78;
    ctx.save(); ctx.globalAlpha=alpha;
    for(let i=0;i<6;i++){
      const cr=ch*(0.10-i*0.013);
      ctx.fillStyle=`hsl(${76+i*16},80%,55%)`;
      ctx.beginPath(); ctx.arc(heroX-32-i*ch*0.065,groundY-ch*0.16,cr,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  /* ══ 아이템 이모지 ══ */
  collectibles=collectibles.filter(c=>c.life>0);
  collectibles.forEach(it=>{
    it.y+=it.vy; it.life--;
    ctx.save(); ctx.globalAlpha=Math.min(1,it.life/18);
    ctx.font=`${ch*0.09}px serif`; ctx.textAlign='center';
    ctx.fillText(it.emoji,it.x,it.y); ctx.restore();
  });

  /* ══ 파티클 ══ */
  particles.filter(p=>p.life>0).forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.5,p.size*(p.life/p.maxLife)),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  /* ══ 위험 플래시 ══ */
  const dangerGap=heroX-monsterX;
  const dangerThreshold = hp>=3 ? cw*0.25 : hp===2 ? cw*0.32 : cw*0.42;
  const dangerPct=Math.max(0,Math.min(1, 1-dangerGap/dangerThreshold));
  if(dangerPct>0&&monsterStunned<=0){
    ctx.fillStyle=`rgba(255,15,15,${dangerPct*0.28})`; ctx.fillRect(0,0,cw,ch);
  }

  /* ══ 스케일 계산 ══
     몬스터 원본: 뿔끝 y=-68, 발 y=+10 → 높이=78, 중심 y=-29
     영웅 원본:   머리 y=-72, 발 y=+9  → 높이=81, 중심 y=-32
     mScale로 키울 때 뿔끝이 캔버스 상단을 넘지 않아야 함
     최대 mScale = (groundY - 8) / (68 + 10)  (8px 여백)           */
  const groundY2=ch*0.70;  /* draw 내부의 groundY와 동일하게 맞춤 */
  const maxMScale=(groundY2-10)/78;
  const rawScale=Math.min(cw,ch)/200;
  const hScale=Math.max(0.45,Math.min(rawScale,2.0));
  /* mScale: 영웅의 2배이되, 캔버스 높이 한계를 초과하지 않음 */
  const mScale=Math.min(hScale*2.0, maxMScale);
  const mBob=monsterStunned>0?0:Math.sin(monsterAnim*1.3)*ch*0.014;
  const mStunRot=monsterStunned>0?Math.sin(monsterStunned*0.17)*0.22:0;

  /* 몬스터 Y: 발(+10*mScale)이 groundY에 닿도록 */
  const monsterDrawY = groundY2 - 10*mScale + mBob;

  /* ══ 몬스터 그림자 ══ */
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(monsterX,groundY2+5,mScale*28,mScale*6,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* ══ 몬스터 ══ */
  ctx.save();
  ctx.translate(monsterX, monsterDrawY);
  ctx.rotate(mStunRot);
  ctx.scale(mScale,mScale);
  drawMonster(ctx,monsterStunned>0);
  ctx.restore();

  /* 기절 별 */
  if(monsterStunned>0){
    for(let i=0;i<4;i++){
      const ang=monsterStunned*0.09+i*1.57;
      const sx3=monsterX+Math.cos(ang)*mScale*30;
      const sy3=monsterDrawY-68*mScale-8+Math.sin(ang)*mScale*12;
      ctx.fillStyle='#FFD700'; ctx.font=`${Math.max(12,ch*0.07)}px serif`;
      ctx.textAlign='center'; ctx.fillText('★',sx3,sy3);
    }
  }

  /* ══ 영웅 그림자 ══ */
  /* 영웅 Y: 발(+9*hScale)이 groundY에 닿도록 */
  const hBob=Math.sin(heroAnim*1.5)*ch*0.015;
  const heroDrawY = groundY2 - 9*hScale + hBob;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(heroX,groundY2+3,hScale*15,hScale*4,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* 실드 */
  if(shieldActive){
    ctx.save();
    ctx.strokeStyle=`rgba(100,200,255,${0.5+Math.sin(heroAnim*4)*0.3})`;
    ctx.lineWidth=3; ctx.globalAlpha=0.75;
    ctx.beginPath(); ctx.arc(heroX,heroDrawY-30*hScale,hScale*32,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.12; ctx.fillStyle='#64C8FF';
    ctx.beginPath(); ctx.arc(heroX,heroDrawY-30*hScale,hScale*32,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if(shieldFlash>0){
    shieldFlash--;
    ctx.save(); ctx.globalAlpha=shieldFlash/14;
    ctx.fillStyle='#64C8FF'; ctx.fillRect(0,0,cw,ch); ctx.restore();
  }

  /* ══ 영웅 ══ */
  ctx.save();
  if(deathAnim){
    ctx.globalAlpha=Math.max(0,1-heroEatenPct*0.85);
    const eatX=monsterX+(hScale*12)*(1-heroEatenPct*0.8);
    const eatY=monsterDrawY+(heroEatenPct*10);
    ctx.translate(eatX,eatY);
    const ds=Math.max(0.01,hScale*(1-heroEatenPct*0.65));
    ctx.scale(ds,ds);
  } else {
    ctx.translate(heroX,heroDrawY);
    ctx.scale(hScale,hScale);
  }
  drawHero(ctx,heroAnim);
  ctx.restore();

  /* 속도 부스트 잔상 */
  if(speedBoostTimer>0){
    for(let t=1;t<=3;t++){
      ctx.save(); ctx.globalAlpha=Math.max(0,0.11*(1-t*0.3));
      ctx.translate(heroX-t*hScale*8, heroDrawY);
      ctx.scale(hScale*0.88,hScale*0.88);
      drawHero(ctx,heroAnim-t*0.5); ctx.restore();
    }
  }

  /* ══ DISTANCE BAR ══ */
  const barW=Math.min(cw*0.35,220); const barX=cw/2-barW/2; const barY=8;
  const gap=heroX-monsterX;
  const safeRatio=Math.max(0,Math.min(1,gap/(cw*0.62)));
  ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.beginPath(); ctx.roundRect(barX-2,barY-2,barW+4,14,6); ctx.fill();
  const barColor=safeRatio>0.55?'#00D4A8':safeRatio>0.28?'#FFB800':'#FF4F6A';
  if(safeRatio>0.01){ ctx.fillStyle=barColor; ctx.beginPath(); ctx.roundRect(barX,barY,barW*safeRatio,10,5); ctx.fill(); }
  ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(barX,barY,barW,10,5); ctx.stroke();
  ctx.font=`${Math.max(11,ch*0.058)}px serif`;
  ctx.fillText('👾',barX-26,barY+10);
  ctx.fillText('🧒',barX+barW+4,barY+10);

  /* 테마 이름 */
  const themeLabels=['🌲 밤의 숲','🌅 황혼의 숲','🌋 용암 지대'];
  const themeColors=['#5588AA','#CC6030','#FF5020'];
  ctx.save(); ctx.globalAlpha=0.6;
  ctx.fillStyle=themeColors[theme];
  ctx.font=`bold ${Math.max(11,ch*0.058)}px sans-serif`;
  ctx.textAlign='right'; ctx.fillText(themeLabels[theme],cw-8,ch-7);
  ctx.restore();

  ctx.restore(); /* main save */
}

function drawHero(c,anim){
  const bob=Math.sin(anim*1.5)*3;
  /* shadow */
  c.fillStyle='rgba(0,0,0,.25)'; c.beginPath(); c.ellipse(0,8,14,4,0,0,Math.PI*2); c.fill();
  /* body */
  c.fillStyle='#3A80D4'; c.beginPath(); c.roundRect(-13,-48,26,30,6); c.fill();
  /* head */
  c.fillStyle='#F5C49A'; c.beginPath(); c.arc(0,-56,13,0,Math.PI*2); c.fill();
  /* hair */
  c.fillStyle='#2A1500'; c.beginPath(); c.arc(0,-64,11,Math.PI,0); c.fill();
  /* hair sides */
  c.fillStyle='#2A1500'; c.beginPath(); c.arc(-12,-58,4,0,Math.PI*2); c.fill();
  /* eyes */
  c.fillStyle='#1A1A1A'; c.beginPath(); c.arc(-4,-56,2.2,0,Math.PI*2); c.arc(4,-56,2.2,0,Math.PI*2); c.fill();
  /* shine */
  c.fillStyle='white'; c.beginPath(); c.arc(-3,-57,0.8,0,Math.PI*2); c.arc(5,-57,0.8,0,Math.PI*2); c.fill();
  /* mouth smile */
  c.strokeStyle='#7A3A1A'; c.lineWidth=1.5;
  c.beginPath(); c.arc(0,-52,5,0.2,Math.PI-0.2); c.stroke();
  /* backpack */
  c.fillStyle='#D4921C'; c.beginPath(); c.roundRect(10,-46,11,22,4); c.fill();
  c.fillStyle='rgba(255,255,255,.2)'; c.beginPath(); c.roundRect(12,-44,7,8,2); c.fill();
  /* legs */
  const lt=Math.sin(anim*1.3)*10;
  c.fillStyle='#2A5590';
  c.beginPath(); c.roundRect(-11,-18,9,22+lt,3); c.fill();
  c.beginPath(); c.roundRect(2,-18,9,22-lt,3); c.fill();
  /* shoes */
  c.fillStyle='#111';
  c.beginPath(); c.roundRect(-13,4+lt,12,5,2); c.fill();
  c.beginPath(); c.roundRect(1,4-lt,12,5,2); c.fill();
}

function drawMonster(c,stunned){
  const pulse=stunned?1:0.96+Math.sin(monsterAnim*2.2)*0.04;
  c.scale(pulse,pulse);
  /* shadow */
  c.fillStyle='rgba(0,0,0,.3)'; c.beginPath(); c.ellipse(0,10,28,7,0,0,Math.PI*2); c.fill();
  /* body */
  c.fillStyle=stunned?'#5A4070':'#9038D8';
  c.beginPath(); c.ellipse(0,-22,24,28,0,0,Math.PI*2); c.fill();
  /* belly */
  c.fillStyle=stunned?'#6A5080':'#AA50E8';
  c.beginPath(); c.ellipse(0,-18,14,16,0,0,Math.PI*2); c.fill();
  /* arms / claws */
  c.fillStyle=stunned?'#6A5080':'#AA50E8';
  c.beginPath(); c.ellipse(-28,-16,12,7,-.35,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(28,-16,12,7,.35,0,Math.PI*2); c.fill();
  /* claw tips */
  c.fillStyle='#0D0D0D';
  [[-36,-22],[-32,-13],[-26,-10],[36,-22],[32,-13],[26,-10]].forEach(([x,y])=>{
    c.beginPath(); c.ellipse(x,y,3.5,5,.2,0,Math.PI*2); c.fill();
  });
  /* horns */
  c.fillStyle=stunned?'#6A5080':'#6C18A8';
  c.beginPath(); c.moveTo(-10,-48); c.lineTo(-18,-68); c.lineTo(-3,-48); c.fill();
  c.beginPath(); c.moveTo(10,-48); c.lineTo(18,-68); c.lineTo(3,-48); c.fill();
  /* horn glow */
  if(!stunned){c.fillStyle='rgba(180,80,255,.3)'; c.beginPath(); c.arc(-13,-64,5,0,Math.PI*2); c.arc(13,-64,5,0,Math.PI*2); c.fill();}
  /* eyes */
  if(stunned){
    c.strokeStyle='#FFD700'; c.lineWidth=2.5;
    c.beginPath(); c.moveTo(-9,-30); c.lineTo(-4,-25); c.moveTo(-4,-30); c.lineTo(-9,-25); c.stroke();
    c.beginPath(); c.moveTo(4,-30); c.lineTo(9,-25); c.moveTo(9,-30); c.lineTo(4,-25); c.stroke();
  } else {
    c.fillStyle='#FF2040'; c.beginPath(); c.arc(-7,-28,7,0,Math.PI*2); c.arc(7,-28,7,0,Math.PI*2); c.fill();
    c.fillStyle='white'; c.beginPath(); c.arc(-7,-28,3.5,0,Math.PI*2); c.arc(7,-28,3.5,0,Math.PI*2); c.fill();
    c.fillStyle='#100600'; c.beginPath(); c.arc(-5.5,-27,2,0,Math.PI*2); c.arc(8.5,-27,2,0,Math.PI*2); c.fill();
    /* angry brow */
    c.strokeStyle='#CC0020'; c.lineWidth=2.5;
    c.beginPath(); c.moveTo(-13,-36); c.lineTo(-2,-33); c.stroke();
    c.beginPath(); c.moveTo(13,-36); c.lineTo(2,-33); c.stroke();
  }
  /* mouth */
  c.strokeStyle=stunned?'#887799':'#FF0055'; c.lineWidth=stunned?2:3;
  c.beginPath();
  if(stunned){c.arc(0,-8,12,0.3,Math.PI-0.3);}
  else{c.arc(0,-11,13,0.15,Math.PI-0.15);}
  c.stroke();
  /* teeth */
  if(!stunned){
    c.fillStyle='#EEEEEE';
    [[-9,-11],[-4,-11],[2,-11],[8,-11]].forEach(([x,y])=>{
      c.beginPath(); c.moveTo(x,y); c.lineTo(x-2.5,y+7); c.lineTo(x+2.5,y+7); c.fill();
    });
  }
  /* drool */
  if(!stunned){
    c.strokeStyle='rgba(180,50,200,.5)'; c.lineWidth=2;
    c.beginPath(); c.moveTo(-4,0); c.quadraticCurveTo(-2,8,-4,14); c.stroke();
  }
}

/* ── TITLE CANVAS ── */
(function(){
  const c=document.getElementById('titleCanvas');
  const cx=c.getContext('2d');
  let t=0;
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  function loop(){
    cx.clearRect(0,0,c.width,c.height); t+=0.012;
    for(let i=0;i<70;i++){
      const x=((i*167+t*18)%(c.width+40))-20;
      const y=((i*83+t*7)%(c.height+40))-20;
      const a=0.08+Math.sin(i*2.1+t)*0.12;
      cx.globalAlpha=a; cx.fillStyle='white';
      cx.beginPath(); cx.arc(x,y,0.8,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=0.04+Math.sin(t)*0.015;
    cx.fillStyle='#7C5CFC'; cx.beginPath(); cx.arc(c.width*.25,c.height*.4,280,0,Math.PI*2); cx.fill();
    cx.fillStyle='#00D4A8'; cx.beginPath(); cx.arc(c.width*.78,c.height*.65,180,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ── UI LOGIC ── */
function checkNick(){
  /* 버튼은 항상 활성 — 닉네임 없으면 시작할 때 기본값 사용 */
  const val=document.getElementById('nickInput').value.trim();
  const btn=document.getElementById('startBtn');
  btn.style.opacity=val.length>0?'1':'0.7';
}
function selectDiff(d,el){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function tryStart(){
  try{
    let val=document.getElementById('nickInput').value.trim();
    if(!val) val='탐험가';
    nickname=val;
    startGame();
  }catch(e){
    console.error('startGame error:',e);
    alert('오류: '+e.message);
  }
}
function startGame(){
  const pool=[...QBANK[difficulty]];
  questions=shuffle(pool).slice(0,20);
  currentQ=0; score=0; combo=0; maxCombo=0; hp=3; consWrong=0;
  answered=false; fartCharges=1; correctCount=0; wrongList=[];
  deathAnim=false; deathT=0; heroEatenPct=0;
  speedBoostTimer=0; shieldActive=false; shieldFlash=0;
  collectibles=[]; lightningMode=false; lightningTimer=0;
  document.getElementById('hudNick').textContent=nickname;
  updateHUD(); updateHP(); updateFartBtn();
  showScreen('s-game');
  setTimeout(()=>{
    initCanvas();
    gameReady=true;
    lastT=performance.now();
    requestAnimationFrame(gameLoop);
    showQuestion();
  },60);
}

function showQuestion(){
  if(currentQ>=questions.length){endGame();return;}
  const q=questions[currentQ];
  answered=false;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('hudQnum').textContent=`${currentQ+1}/20`;
  document.getElementById('feedback').className='feedback';
  const grid=document.getElementById('choicesGrid');
  grid.innerHTML='';
  q.c.forEach((ch,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="csym">${SYMS[i]}</span><span>${ch}</span>`;
    btn.onclick=()=>handleAnswer(i,btn);
    grid.appendChild(btn);
  });
  updateFartBtn();
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval); timeLeft=TIME_LIMIT; updateTimerUI();
  timerInterval=setInterval(()=>{timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(timerInterval);if(!answered)handleTimeout();}},1000);
}

function updateTimerUI(){
  const arc=document.getElementById('timerArc');
  const txt=document.getElementById('timerTxt');
  const circ=2*Math.PI*16;
  arc.style.strokeDasharray=circ;
  arc.style.strokeDashoffset=circ*(1-timeLeft/TIME_LIMIT);
  arc.style.stroke=timeLeft<=4?'#FF4F6A':timeLeft<=8?'#FFB800':'#00D4A8';
  txt.textContent=timeLeft;
  txt.style.fill=timeLeft<=4?'#FF4F6A':timeLeft<=8?'#FFB800':'white';
}

function handleAnswer(idx,btn){
  if(answered)return;
  answered=true; clearInterval(timerInterval);
  const q=questions[currentQ];
  const correct=idx===q.a;
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a)b.classList.add('correct');
    else b.classList.add('wrong');
  });
  if(correct){
    /* HP +1 (최대 3) */
    const oldHp=hp;
    if(hp<3){ hp++; updateHP(); }
    const hpGained=hp>oldHp;

    const pts=Math.round(SCORE_BASE*(timeLeft/TIME_LIMIT));
    combo++; correctCount++; consWrong=0;
    if(combo>maxCombo)maxCombo=combo;
    let bonus=0;
    COMBO_THRESH.forEach((t,i)=>{if(combo===t){bonus=COMBO_BONUS[i];showBonus(`🔥 ${combo}콤보! +${bonus}`)}});
    score+=pts+bonus;
    showOX(true,`정답! +${pts}점${bonus?' +'+bonus+'콤보!':''}`, hpGained?1:0);

    /* 방귀 충전 */
    if(correctCount%3===0){fartCharges=Math.min(fartCharges+1,3);showBonus('💨 방귀 충전!');}
    /* 실드 : 연속 정답 3개마다 자동 지급 (콤보 3, 6, 9, 12...) */
    if(combo%3===0&&!shieldActive){shieldActive=true;showBonus('🛡️ 실드 획득! 오답 1회 막아줄게요!');}
    /* 번개 모드: 2콤보마다 화면 이펙트 */
    if(combo%2===0&&combo>0){lightningMode=true;lightningTimer=40;}
    /* 속도 부스트 파티클 */
    speedBoostTimer=40;
    for(let i=0;i<8;i++){
      particles.push({x:heroX,y:ch*0.65+Math.random()*ch*0.1,
        vx:(Math.random()-0.5)*3,vy:-(Math.random()*2+1),
        life:30,maxLife:30,size:4+Math.random()*4,
        color:`hsl(${150+Math.random()*60},100%,70%)`});
    }
    /* 정답 아이템 이모지 스폰 */
    const emojis=['⭐','✨','💫','🎯','🎉','💎'];
    for(let i=0;i<2;i++){
      collectibles.push({
        x:heroX+(Math.random()-0.5)*80,
        y:ch*0.55,vy:-(1.5+Math.random()*1.5),
        emoji:emojis[Math.floor(Math.random()*emojis.length)],
        life:45
      });
    }
    updatePositions(true);
    updateHUD(); updateFartBtn();
    /* O 연출 1.6초 → 닫고 다음 문제 */
    setTimeout(()=>{ hideOX(); currentQ++; showQuestion(); }, 1600);
    return;

  } else {
    /* 실드가 있으면 오답 1회 막기 */
    if(shieldActive){
      shieldActive=false; shieldFlash=12;
      combo=0; consWrong=0;
      showOX(false,'🛡️ 실드 발동! 오답 막음!', 0);
      updatePositions(false);
      updateHUD(); updateFartBtn();
      setTimeout(()=>{ hideOX(); currentQ++; showQuestion(); }, 1600);
      return;
    }
    combo=0; hp--; consWrong++;
    updateHP();
    wrongList.push({q:q.q, correct:q.c[q.a], ex:q.ex});
    /* 오답 파티클 */
    for(let i=0;i<10;i++){
      particles.push({x:heroX, y:ch*0.62,
        vx:(Math.random()-0.5)*4, vy:-(Math.random()*3),
        life:25, maxLife:25, size:5+Math.random()*5,
        color:`hsl(${Math.random()*20},100%,60%)`});
    }
    updatePositions(false);
    updateHUD(); updateFartBtn();

    if(consWrong>=3||hp<=0){
      /* 잡아먹힘 — X 연출 후 death */
      showOX(false,'❌ 틀렸어요!', -1);
      setTimeout(()=>{ hideOX(); triggerDeath(); }, 1100);
      return;
    }
    /* 일반 오답 — X 연출 900ms → 힌트 팝업 */
    showOX(false,'❌ 틀렸어요!', -1);
    setTimeout(()=>showHintPopup(questions[currentQ]), 900);
    return;
  } // end else
} // end handleAnswer

function handleTimeout(){
  answered=true;
  const q=questions[currentQ];
  combo=0; hp--; consWrong++;
  updateHP();
  wrongList.push({q:q.q,correct:q.c[q.a],ex:'(시간초과) '+q.ex});
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a)b.classList.add('correct'); else b.classList.add('wrong');
  });
  updatePositions(false);
  updateHUD(); updateFartBtn();
  if(consWrong>=3||hp<=0){
    showOX(false,'⏰ 시간 초과!', -1);
    setTimeout(()=>{ hideOX(); triggerDeath(); },1100); return;
  }
  showOX(false,'⏰ 시간 초과!', -1);
  setTimeout(()=>showHintPopup(q), 900);
}


function triggerDeath(){
  clearInterval(timerInterval);

  /* ── 잡힌 시점 스냅샷 저장 ── */
  deathSnapshot = {
    currentQ:   currentQ,          // 잡힌 문제 번호 (이 문제부터 재시작)
    score:      score,
    combo:      combo,
    maxCombo:   maxCombo,
    hp:         3,                  // HP는 완전 회복
    fartCharges:fartCharges,
    correctCount:correctCount,
    wrongList:  [...wrongList],     // 오답 기록 복사
    consWrong:  0,
  };

  /* monster rushes to hero */
  targetMonsterX=heroX+10;
  monsterStunned=0;
  shakeAmt=0; shakeTimer=0;
  let flashes=0;
  const flashInterval=setInterval(()=>{
    shakeAmt=14; shakeTimer=8; flashes++;
    if(flashes>=3){clearInterval(flashInterval);deathAnim=true;deathT=0;heroEatenPct=0;}
  },220);
  setTimeout(()=>showDeathPopup(),2300);
}

function showDeathPopup(){
  gameReady=false; clearInterval(timerInterval);
  /* 닉네임 메시지 */
  document.getElementById('deathNickMsg').innerHTML=
    `<strong>${nickname}</strong>이(가) 몬스터에게 잡히고 말았어요!<br>어떻게 할까요?`;
  /* 직전 재도전 설명에 몇 번 문제인지 표시 */
  document.getElementById('resumeDesc').innerHTML=
    `<b style="color:#7EB8FF">Q${deathSnapshot.currentQ+1}</b>번 문제부터 다시 시작<br>현재 점수 <b style="color:#FFB800">${score.toLocaleString()}점</b> · 콤보 유지`;
  document.getElementById('deathPopup').classList.add('show');
}

function resumeFromDeath(){
  /* 직전 문제부터 재시작 — 스냅샷 복원 */
  document.getElementById('deathPopup').classList.remove('show');
  if(!deathSnapshot)return;
  currentQ      = deathSnapshot.currentQ;
  score         = deathSnapshot.score;
  combo         = deathSnapshot.combo;
  maxCombo      = deathSnapshot.maxCombo;
  hp            = deathSnapshot.hp;
  fartCharges   = Math.max(1, deathSnapshot.fartCharges);
  correctCount  = deathSnapshot.correctCount;
  wrongList     = [...deathSnapshot.wrongList];
  consWrong     = 0;
  deathAnim=false; deathT=0; heroEatenPct=0;
  shieldActive=false; shieldFlash=0;
  speedBoostTimer=0; lightningMode=false; lightningTimer=0;
  /* 위치 리셋: 영웅 중간, 몬스터 멀리 */
  heroX=cw*0.65; targetHeroX=heroX;
  monsterX=cw*0.08; targetMonsterX=cw*0.10;
  updateHUD(); updateHP(); updateFartBtn();
  gameReady=true;
  lastT=performance.now();
  requestAnimationFrame(gameLoop);
  showQuestion();
}

function restartFromDeath(){
  /* 처음부터 완전 초기화 */
  document.getElementById('deathPopup').classList.remove('show');
  deathSnapshot=null;
  startGame();
}

/* ── 방귀 BGM (Web Audio API 합성) ── */
function playFartSound(){
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();

    /* 방귀 특유의 "뿌지직" 소리:
       노이즈 버스트 + 급격히 내려가는 피치의 오실레이터 레이어 합성 */

    const duration = 0.85; // 총 재생 시간(초)
    const now = ctx.currentTime;

    /* ① 노이즈 레이어 — "뽀글뽀글" 질감 */
    const bufLen = ctx.sampleRate * duration;
    const noiseBuffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for(let i = 0; i < bufLen; i++){
      data[i] = (Math.random() * 2 - 1);
    }
    const noiseSource = ctx.createBufferSource();
    noiseSource.buffer = noiseBuffer;

    /* 노이즈 밴드패스 필터 — 방귀 주파수대만 통과 */
    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(320, now);
    bpf.frequency.exponentialRampToValueAtTime(80, now + duration);
    bpf.Q.value = 1.8;

    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0, now);
    noiseGain.gain.linearRampToValueAtTime(1.1, now + 0.02);  // 빠른 어택
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

    noiseSource.connect(bpf);
    bpf.connect(noiseGain);

    /* ② 오실레이터 레이어 — "뿌~" 음정 하강 */
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(210, now);
    osc.frequency.exponentialRampToValueAtTime(55, now + duration * 0.7);

    /* 오실레이터 웨이블 — 방귀 떨림 */
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 18;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 22;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0, now);
    oscGain.gain.linearRampToValueAtTime(0.55, now + 0.03);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.8);

    osc.connect(oscGain);

    /* ③ 마스터 컴프레서 + 출력 */
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.ratio.value = 6;

    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;

    noiseGain.connect(compressor);
    oscGain.connect(compressor);
    compressor.connect(masterGain);
    masterGain.connect(ctx.destination);

    /* 재생 시작 */
    noiseSource.start(now);
    noiseSource.stop(now + duration);
    osc.start(now);
    osc.stop(now + duration * 0.8);
    lfo.start(now);
    lfo.stop(now + duration * 0.8);

    /* AudioContext 정리 */
    setTimeout(() => ctx.close(), (duration + 0.2) * 1000);

  } catch(e){
    /* Web Audio API 미지원 환경 — 무시 */
    console.warn('Web Audio not supported:', e);
  }
}

function useFart(){
  if(fartCharges<=0||monsterStunned>0)return;
  fartCharges--; applyFartEffect(); updateFartBtn();
  playFartSound();
  showBonus('💨 방귀 발사! 몬스터 기절!');
  showOverlay('💨','방귀 스킬 발동!','몬스터가 방귀 냄새에 쓰러졌다!\n거리가 다시 멀어진다!','계속!',()=>hideOverlay());
}

function updateHP(){
  document.querySelectorAll('.hp-heart').forEach((h,i)=>h.classList.toggle('lost',i>=hp));
}
function updateHUD(){
  document.getElementById('hudScore').textContent=score.toLocaleString();
  const el=document.getElementById('hudCombo');
  el.textContent=`콤보 ${combo}`;
  el.className='hud-combo'+(combo>=3?' hot':'');
}
function updateFartBtn(){
  document.getElementById('fartBtn').disabled=fartCharges<=0;
  document.getElementById('fartCount').textContent=`x${fartCharges}`;
}
function showOX(correct, msg, hpChange){
  const overlay = document.getElementById('oxOverlay');
  document.getElementById('oxSymbol').textContent = correct ? 'O' : 'X';
  document.getElementById('oxSymbol').className   = 'ox-symbol ' + (correct ? 'ok' : 'no');
  document.getElementById('oxMsg').textContent    = msg;
  document.getElementById('oxMsg').className      = 'ox-msg '    + (correct ? 'ok' : 'no');
  const hpEl = document.getElementById('oxHp');
  if(hpChange > 0){ hpEl.textContent = '❤️ 생명력 +1 !'; hpEl.style.display = 'block'; }
  else if(hpChange < 0){ hpEl.textContent = '💔 생명력 -1'; hpEl.style.display = 'block'; }
  else { hpEl.style.display = 'none'; }
  overlay.classList.add('show');
}
function hideOX(){ document.getElementById('oxOverlay').classList.remove('show'); }

/* 하위호환 */
function showFeedback(ok, msg){ showOX(ok, msg, 0); }

/* ── 힌트 팝업 ── */
function showHintPopup(q){
  hideOX();
  document.getElementById('hintCorrectText').textContent = '정답: ' + q.c[q.a];
  document.getElementById('hintTipText').innerHTML =
    q.ex.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('hintPopup').classList.add('show');
}

/* 다시 풀어보기 */
function retryCurrentQ(){
  document.getElementById('hintPopup').classList.remove('show');
  hideOX();
  answered = false;
  /* 보기 버튼 초기화 */
  document.querySelectorAll('.choice').forEach(b => {
    b.disabled = false;
    b.className = 'choice';
  });
  /* 타이머 절반으로 재시작 (패널티) */
  timeLeft = Math.max(5, Math.ceil(TIME_LIMIT / 2));
  updateTimerUI();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--; updateTimerUI();
    if(timeLeft <= 0){ clearInterval(timerInterval); if(!answered) handleTimeout(); }
  }, 1000);
  showBonus('⏱ ' + timeLeft + '초로 재도전!');
}

/* 힌트 확인 후 다음 문제 */
function skipToNextQ(){
  document.getElementById('hintPopup').classList.remove('show');
  hideOX();
  currentQ++;
  showQuestion();
}
function showBonus(msg){
  const el=document.getElementById('bonusFlash');
  el.textContent=msg; el.style.display='block';
  el.style.animation='none'; void el.offsetWidth;
  el.style.animation='bonusAnim .95s ease forwards';
  setTimeout(()=>el.style.display='none',1000);
}
function endGame(){
  gameReady=false; clearInterval(timerInterval);
  showScreen('s-result');
  const total=questions.length, wrong=wrongList.length, correct=total-wrong;
  const acc=Math.round(correct/total*100);
  let rank,title,sub;
  if(acc>=95){rank='🏆';title='그래프 마스터!';sub=nickname+'의 완벽한 실력! 본 단원 자신있게 도전하세요.';}
  else if(acc>=80){rank='🥇';title='그래프 탐험가!';sub='훌륭해요! 틀린 부분만 복습하면 완벽합니다.';}
  else if(acc>=60){rank='🥈';title='그래프 견습생';sub='절반 이상 맞았어요! 조금 더 복습해봐요.';}
  else{rank='📚';title='그래프 입문자';sub='선수학습을 다시 살펴보고 도전해보세요!';}
  document.getElementById('resultRank').textContent=rank;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent=sub;
  document.getElementById('rScore').textContent=score.toLocaleString()+'점';
  document.getElementById('rAcc').textContent=acc+'%';
  document.getElementById('rMaxCombo').textContent=maxCombo+'콤보';
  const wl=document.getElementById('wrongList');
  if(!wrongList.length){wl.innerHTML='<h3 style="color:var(--teal)">✅ 모두 정답! 완벽해요!</h3>';}
  else{wl.innerHTML=`<h3>❌ 틀린 문제 (${wrongList.length}개)</h3>`+wrongList.map(w=>`<div class="wrong-item">${w.q}<br><strong>정답: ${w.correct} | ${w.ex}</strong></div>`).join('');}
}
function showOverlay(icon,title,sub,btn,cb){
  document.getElementById('overlayIcon').textContent=icon;
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlaySub').textContent=sub;
  document.getElementById('overlayBtn').textContent=btn;
  overlayCallback=cb;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}
function overlayAction(){if(overlayCallback)overlayCallback();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goTitle(){
  gameReady=false; clearInterval(timerInterval);
  document.getElementById('deathPopup').classList.remove('show');
  hideOverlay();
  showScreen('s-title');
}
function retryGame(){
  hideOverlay();
  document.getElementById('deathPopup').classList.remove('show');
  deathSnapshot=null;
  startGame();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* Responsive resize */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(!gameReady)return;
    const oldCw=cw;
    const heroRatio=heroX/oldCw;
    const monRatio=monsterX/oldCw;
    initCanvas();
    heroX=cw*heroRatio; targetHeroX=heroX;
    monsterX=cw*monRatio; targetMonsterX=monsterX;
  },200);
});
</script>
