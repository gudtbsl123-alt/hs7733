<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER TANK: GEOGRAPHY WARS</title>
  <style>
    :root {
      --bg: #050510;
      --neon-blue: #00f3ff;
      --neon-red: #ff003c;
      --neon-green: #39ff14;
      --neon-yellow: #fffb00;
      --neon-purple: #b700ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
    
    body {
      background-color: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #gameCanvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
    }

    #tensionOverlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, transparent 40%, rgba(255, 0, 0, 0.4) 100%);
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #tensionOverlay.active { animation: pulseAlert 1s infinite alternate; }
    @keyframes pulseAlert { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }

    #flashOverlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff;
      opacity: 0;
      z-index: 15;
      pointer-events: none;
    }

    #uiLayer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 3; display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none;
    }

    .hud {
      display: flex; justify-content: space-between; padding: 15px 20px;
      font-weight: 900; font-size: 1.2rem; text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }
    .hp-bar-container {
      width: 40%; height: 20px; background: rgba(255,255,255,0.1);
      border: 2px solid #fff; border-radius: 10px; overflow: hidden; position: relative;
    }
    .hp-fill { height: 100%; transition: width 0.3s ease; }
    #bossHp { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); width: 100%; float: right; }
    #playerHp { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); width: 100%; }
    .hp-labels { display: flex; justify-content: space-between; width: 100%; position: absolute; top: 45px; padding: 0 20px; font-size: 1rem;}

    /* Combo & Special Attack UI */
    .combo-container {
      position: absolute; top: 80px; left: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .combo-text { font-size: 1.5rem; font-weight: 900; color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }
    .special-btn {
      background: rgba(0,0,0,0.6); border: 2px solid #555; color: #555;
      padding: 5px 15px; border-radius: 8px; font-weight: 900; text-align: left;
      transition: all 0.3s;
    }
    .special-btn.ready-z { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); animation: pulseZ 1s infinite alternate;}
    .special-btn.ready-x { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); animation: pulseX 1s infinite alternate;}
    .special-btn.ready-c { border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 20px var(--neon-yellow); animation: pulseC 0.5s infinite alternate; background: rgba(255,251,0,0.2);}
    
    @keyframes pulseZ { to { box-shadow: 0 0 20px var(--neon-green); text-shadow: 0 0 10px var(--neon-green); } }
    @keyframes pulseX { to { box-shadow: 0 0 20px var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); } }
    @keyframes pulseC { to { box-shadow: 0 0 40px var(--neon-yellow); text-shadow: 0 0 20px var(--neon-yellow); transform: scale(1.05); } }

    #tauntBox {
      position: absolute; top: 15%; left: 50%; transform: translateX(-50%) scale(0);
      background: rgba(255, 0, 60, 0.9); border: 2px solid #fff; padding: 10px 20px;
      border-radius: 20px; font-weight: 900; font-size: 1.2rem; text-align: center;
      box-shadow: 0 0 20px var(--neon-red); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #tauntBox.show { transform: translateX(-50%) scale(1); }

    .control-panel {
      padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0));
      pointer-events: auto;
    }
    .question-box {
      text-align: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 20px;
      text-shadow: 0 0 10px var(--neon-blue); background: rgba(0, 243, 255, 0.1);
      padding: 15px; border-radius: 15px; border: 1px solid rgba(0, 243, 255, 0.3);
      word-break: keep-all;
    }
    .answers-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 0 auto;
    }
    .answer-btn {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 1.3rem; font-weight: 800; padding: 15px 10px;
      border-radius: 10px; cursor: pointer; transition: all 0.1s;
      word-break: keep-all;
    }
    .answer-btn:active { transform: translateY(4px); }
    .answer-btn.correct { background: rgba(57, 255, 20, 0.3); border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
    .answer-btn.wrong { background: rgba(255, 0, 60, 0.3); border-color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); }

    /* Screens & Modals */
    .screen {
      position: absolute; inset: 0; background: rgba(5,5,16,0.98);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; pointer-events: auto;
    }
    .screen.hidden { display: none; }
    h1 { font-size: 4rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-bottom: 10px; text-align: center; line-height: 1.1;}
    
    .lobby-box {
      background: rgba(255,255,255,0.05); border: 2px solid var(--neon-blue);
      border-radius: 20px; padding: 30px; text-align: center; width: 90%; max-width: 600px;
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
    }
    input[type="text"], select {
      background: rgba(0,0,0,0.5); border: 2px solid var(--neon-blue); color: #fff;
      font-size: 1.5rem; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 20px;
      text-align: center; font-weight: 900; outline: none;
    }
    input[type="text"]:focus { box-shadow: 0 0 15px var(--neon-blue); }
    
    .tank-selector {
      display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px;
    }
    .arrow-btn {
      background: transparent; border: none; color: var(--neon-yellow); font-size: 3rem;
      cursor: pointer; text-shadow: 0 0 10px var(--neon-yellow);
    }
    .arrow-btn:active { transform: scale(0.8); }
    #previewCanvas { background: rgba(0,0,0,0.5); border-radius: 15px; border: 1px solid #555; }

    .start-btn {
      background: transparent; color: var(--neon-yellow); border: 3px solid var(--neon-yellow);
      padding: 15px 40px; font-size: 2rem; font-weight: 900; border-radius: 50px;
      cursor: pointer; box-shadow: 0 0 20px rgba(255,251,0,0.4); transition: all 0.2s; width: 100%;
    }
    .start-btn:active { transform: scale(0.95); }

    /* Hint Popup */
    .hint-box {
      background: rgba(255, 0, 60, 0.15); border: 2px solid var(--neon-red);
      border-radius: 15px; padding: 30px; text-align: center; max-width: 600px; width: 90%;
      box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
      backdrop-filter: blur(10px);
    }
    .hint-box h2 { color: var(--neon-red); margin-bottom: 15px; text-shadow: 0 0 10px var(--neon-red); }
    .hint-box p { font-size: 1.3rem; line-height: 1.5; margin-bottom: 25px; word-break: keep-all; }
    .hint-btn {
      background: rgba(255, 0, 60, 0.2); color: #fff; border: 2px solid var(--neon-red);
      padding: 15px 30px; font-size: 1.5rem; font-weight: 900; border-radius: 30px;
      cursor: pointer; box-shadow: 0 0 15px var(--neon-red); transition: all 0.2s;
    }
    .hint-btn:active { transform: scale(0.95); }

    @media (max-width: 600px) {
      h1 { font-size: 2.5rem; }
      .question-box { font-size: 1.3rem; }
      .answer-btn { font-size: 1.1rem; padding: 10px 5px; }
      .combo-text { font-size: 1.2rem; }
      .hint-box p { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>
  <div id="tensionOverlay"></div>
  <div id="flashOverlay"></div>

  <div id="uiLayer">
    <div class="hud">
      <div class="hp-bar-container"><div id="playerHp" class="hp-fill"></div></div>
      <div class="hp-bar-container"><div id="bossHp" class="hp-fill"></div></div>
    </div>
    <div class="hp-labels">
      <span id="playerNicknameDisplay" style="color:var(--neon-blue);">PLAYER</span>
      <span style="color:var(--neon-red);">우리나라 국토여행 보스</span>
    </div>

    <div class="combo-container">
      <div class="combo-text" id="comboText">COMBO: 0</div>
      <div class="special-btn" id="btnZ">[Z] 하이퍼 플라즈마 (3연속)</div>
      <div class="special-btn" id="btnX">[X] 융단 폭격 (4연속)</div>
      <div class="special-btn" id="btnC">[C] 아마겟돈 스트라이크 (5연속)</div>
    </div>

    <div id="tauntBox"></div>

    <div class="control-panel" id="controls">
      <div class="question-box" id="questionText">Ready?</div>
      <div class="answers-grid" id="answersGrid"></div>
    </div>
  </div>

  <div id="lobbyScreen" class="screen">
    <h1>CYBER TANK<br><span style="color:var(--neon-yellow);">GEOGRAPHY WARS</span></h1>
    <div class="lobby-box">
      <input type="text" id="nicknameInput" placeholder="닉네임을 입력하세요" maxlength="10">
      
      <select id="difficultySelect">
        <option value="all">난이도: 전체 섞기 (60문제)</option>
        <option value="low">난이도: 하 (기초 개념)</option>
        <option value="mid">난이도: 중 (특징 이해)</option>
        <option value="high">난이도: 상 (심화 해결)</option>
      </select>

      <div style="color:#aaa; margin-bottom:5px;">기체 선택 (30종)</div>
      <div class="tank-selector">
        <button class="arrow-btn" onclick="changeTank(-1)">◀</button>
        <canvas id="previewCanvas" width="120" height="120"></canvas>
        <button class="arrow-btn" onclick="changeTank(1)">▶</button>
      </div>
      <div id="tankName" style="color:var(--neon-blue); font-weight:bold; margin-bottom: 20px;">모델 NO. 1</div>

      <button class="start-btn" id="startBtn">SYSTEM START</button>
    </div>
  </div>

  <div id="hintModal" class="screen hidden" style="z-index: 30; background: rgba(0,0,0,0.85);">
    <div class="hint-box">
      <h2>⚠️ 시스템 해킹 경고 (오답)</h2>
      <p id="hintText">힌트 텍스트가 여기에 표시됩니다.</p>
      <button class="hint-btn" onclick="closeHint()">데이터 복구 (다음 문제)</button>
    </div>
  </div>

  <div id="endScreen" class="screen hidden">
    <h1 id="endTitle">MISSION FAILED</h1>
    <p style="color:#aaa; font-size:1.2rem; margin-bottom:30px;" id="endSub">보스에게 지리 데이터를 모두 빼앗겼습니다.</p>
    <button class="start-btn" id="restartBtn">REBOOT</button>
  </div>

<script>
  // --- Question Database (5th Grade Social Studies 1-1, Geography & Population) ---
  const qDB = [
    { d: 'low', q: "한 지역에서 오랫동안 나타나는 평균적인 대기 상태를 무엇이라고 하나요?", a: "기후", options: ["기후", "날씨", "계절", "지형"], hint: "날씨는 매일 변하지만, '이것'은 일 년 내내 비슷한 상태를 말해요." },
    { d: 'low', q: "우리나라의 여름철 기후 특징으로 알맞은 것은?", a: "덥고 비가 많이 온다.", options: ["덥고 비가 많이 온다.", "춥고 눈이 많이 온다.", "따뜻하고 건조하다.", "서늘하고 비가 적다."], hint: "여름방학 때 에어컨을 틀고 장마를 겪었던 기억을 떠올려보세요!" },
    { d: 'low', q: "우리나라의 겨울철에 주로 부는 바람의 방향은?", a: "북서풍", options: ["북서풍", "남동풍", "북동풍", "남서풍"], hint: "겨울에는 시베리아 쪽(북서쪽)에서 차갑고 건조한 바람이 불어와요." },
    { d: 'low', q: "여름철에 주로 불어오는 따뜻하고 습한 바람의 방향은?", a: "남동풍", options: ["남동풍", "북서풍", "편서풍", "무역풍"], hint: "여름에는 적도 바다 쪽(남동쪽)에서 덥고 습한 바람이 불어와요." },
    { d: 'low', q: "일정한 공간에 사람들이 흩어져 있거나 모여 있는 상태를 무엇이라고 하나요?", a: "인구 분포", options: ["인구 분포", "인구 밀도", "인구 이동", "인구 성장"], hint: "사람들(인구)이 어떻게 나뉘어(분포) 살고 있는지를 묻는 말이에요." },
    { d: 'low', q: "산지, 하천, 평야 등 땅의 생김새를 이르는 말은?", a: "지형", options: ["지형", "기후", "산업", "교통"], hint: "땅(지)의 모양(형)을 뜻하는 단어입니다." },
    { d: 'low', q: "여름부터 가을 사이에 발생하며, 강한 바람과 많은 비를 동반하는 자연재해는?", a: "태풍", options: ["태풍", "폭설", "지진", "가뭄"], hint: "뉴스에서 '매미', '루사' 같은 이름으로 불리며 큰 바람을 몰고 오는 재해예요." },
    { d: 'low', q: "오랫동안 비가 오지 않아 물이 부족해지는 자연재해는?", a: "가뭄", options: ["가뭄", "홍수", "한파", "폭염"], hint: "땅이 쩍쩍 갈라지고 농작물이 말라 죽는 현상이에요." },
    { d: 'low', q: "짧은 시간에 많은 비가 내려 하천이 넘치고 땅이 물에 잠기는 자연재해는?", a: "홍수", options: ["홍수", "폭설", "지진", "황사"], hint: "물이 넘쳐서 집과 도로가 잠기는 무서운 재해입니다." },
    { d: 'low', q: "우리나라에서 사람들이 가장 많이 모여 사는 지역은 어디인가요?", a: "수도권", options: ["수도권", "강원도 산간", "제주도", "호남 평야"], hint: "서울, 인천, 경기도를 하나로 묶어서 부르는 이름이에요." },
    { d: 'low', q: "겨울철에 눈이 아주 많이 내리는 자연재해는?", a: "폭설", options: ["폭설", "우박", "장마", "태풍"], hint: "눈(설)이 폭발하듯(폭) 엄청나게 쏟아지는 현상입니다." },
    { d: 'low', q: "땅이 몹시 흔들리고 갈라지는 자연재해는?", a: "지진", options: ["지진", "가뭄", "홍수", "폭염"], hint: "땅(지)이 흔들리는(진) 현상이에요. 책상 밑으로 숨어야 해요!" },
    { d: 'low', q: "우리나라는 어느 계절에 강수량(비나 눈이 내린 양)이 가장 집중되나요?", a: "여름", options: ["여름", "봄", "가을", "겨울"], hint: "장마와 태풍이 오는 덥고 습한 계절에 비가 가장 많이 와요." },
    { d: 'low', q: "봄철에 중국이나 몽골의 사막에서 날아오는 모래 먼지를 무엇이라고 하나요?", a: "황사", options: ["황사", "태풍", "장마", "한파"], hint: "누런(황) 모래(사) 먼지가 날아오는 현상이에요." },
    { d: 'low', q: "인구가 빽빽하게 모여 있는 정도를 나타내는 말은?", a: "인구 밀도", options: ["인구 밀도", "인구 성장률", "인구 이동", "인구 수"], hint: "얼마나 빽빽한가(밀도)를 나타내는 말이에요." },
    { d: 'low', q: "여름철에 비가 며칠 동안 계속해서 많이 내리는 현상은?", a: "장마", options: ["장마", "가뭄", "소나기", "이슬비"], hint: "보통 6월 하순부터 한 달 정도 비가 오락가락하는 시기예요." },
    { d: 'low', q: "매우 심한 추위가 찾아오는 현상을 무엇이라고 하나요?", a: "한파", options: ["한파", "폭염", "냉해", "결빙"], hint: "차가운(한) 파도(파)처럼 갑자기 추워지는 현상입니다." },
    { d: 'low', q: "매우 심한 더위가 계속되는 현상을 무엇이라고 하나요?", a: "폭염", options: ["폭염", "가뭄", "열대야", "온난화"], hint: "폭발하듯 심한 더위(염)를 뜻해요." },
    { d: 'low', q: "지구의 평균 기온이 점차 높아지는 현상은?", a: "지구 온난화", options: ["지구 온난화", "오존층 파괴", "사막화", "엘니뇨"], hint: "지구가 점점 따뜻해지는(온난) 현상입니다." },

  // --- Audio Context ---
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx;

  function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'shoot') {
      osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
      gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'hit') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.2);
      gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'error') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.setValueAtTime(100, now + 0.1);
      gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'alarm') {
      osc.type = 'square'; osc.frequency.setValueAtTime(400, now);
      gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    } else if (type === 'laser') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); 
      osc.frequency.exponentialRampToValueAtTime(50, now + 1.0);
      gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
      osc.start(now); osc.stop(now + 1.0);
    } else if (type === 'carpet') {
      osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
      gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now); osc.stop(now + 0.8);
    } else if (type === 'orbital') {
      osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(10, now + 2.0);
      gainNode.gain.setValueAtTime(0.4, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 2.0);
      osc.start(now); osc.stop(now + 2.0);
    } else if (type === 'boss_boom') { 
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now + 1.5);
      gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
      osc.start(now); osc.stop(now + 1.5);
    } else if (type === 'fanfare') { 
      const notes = [
        { f: 392.00, d: 0.15 }, 
        { f: 392.00, d: 0.15 }, 
        { f: 392.00, d: 0.15 }, 
        { f: 523.25, d: 0.40 }, 
        { f: 392.00, d: 0.15 }, 
        { f: 523.25, d: 0.60 }  
      ];
      let timeOffset = 0;
      notes.forEach(note => {
        setTimeout(() => {
          const fnOsc = audioCtx.createOscillator();
          const fnGain = audioCtx.createGain();
          fnOsc.type = 'square';
          fnOsc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
          fnGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          fnGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + note.d);
          fnOsc.connect(fnGain);
          fnGain.connect(audioCtx.destination);
          fnOsc.start(); fnOsc.stop(audioCtx.currentTime + note.d);
        }, timeOffset * 1000);
        timeOffset += note.d + 0.05;
      });
    }
  }

  // --- Tank Designer (30 variants) ---
  const tankColors = ['#00f3ff', '#39ff14', '#fffb00', '#ff003c', '#b700ff'];
  function drawTankPreview(ctx, id, w, h) {
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w/2, h/2 + 10);
    ctx.scale(1.5, 1.5);
    renderTankModel(ctx, id);
    ctx.restore();
  }

  function renderTankModel(ctx, id, isPanicking = false) {
    const color = tankColors[id % 5];
    const barrelType = Math.floor(id / 5) % 3;
    const bodyType = Math.floor(id / 15) % 2;

    ctx.fillStyle = isPanicking ? '#555' : '#111';
    ctx.strokeStyle = isPanicking ? varNeon('red') : color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = isPanicking ? 15 : 10;
    ctx.shadowColor = ctx.strokeStyle;

    ctx.fillRect(-30, -15, 12, 45); ctx.strokeRect(-30, -15, 12, 45);
    ctx.fillRect(18, -15, 12, 45); ctx.strokeRect(18, -15, 12, 45);

    ctx.beginPath();
    if(bodyType === 0) {
      ctx.rect(-20, -10, 40, 35);
    } else {
      ctx.moveTo(0, -15); ctx.lineTo(22, 10); ctx.lineTo(15, 30); ctx.lineTo(-15, 30); ctx.lineTo(-22, 10); ctx.closePath();
    }
    ctx.fill(); ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 8, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    if (barrelType === 0) {
      ctx.fillRect(-3, -30, 6, 38); ctx.strokeRect(-3, -30, 6, 38);
    } else if (barrelType === 1) {
      ctx.fillRect(-7, -25, 4, 33); ctx.strokeRect(-7, -25, 4, 33);
      ctx.fillRect(3, -25, 4, 33); ctx.strokeRect(3, -25, 4, 33);
    } else {
      ctx.fillRect(-5, -35, 10, 43); ctx.strokeRect(-5, -35, 10, 43);
      ctx.fillStyle = color; ctx.fillRect(-2, -35, 4, 20); ctx.fillStyle = isPanicking ? '#555' : '#111';
    }
  }

  function varNeon(colorName) {
    return getComputedStyle(document.documentElement).getPropertyValue(`--neon-${colorName}`).trim();
  }

  let selectedTankId = 0;
  const previewCanvas = document.getElementById('previewCanvas');
  const previewCtx = previewCanvas.getContext('2d');
  
  function changeTank(dir) {
    selectedTankId = (selectedTankId + dir + 30) % 30;
    document.getElementById('tankName').innerText = `모델 NO. ${selectedTankId + 1}`;
    drawTankPreview(previewCtx, selectedTankId, previewCanvas.width, previewCanvas.height);
  }
  changeTank(0);

  // --- Game Engine ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  const player = { x: 0, y: 0, hp: 100, maxHp: 100, isPanicking: false, panicTimer: 0, combo: 0 };
  const boss = { x: 0, y: 0, hp: 400, maxHp: 400, targetY: 0, deathTimer: 0 }; 
  let activeQuestions = [];
  let currentQuestion = null;

  const taunts = [
    "사회 실력이 겨우 이 정도인가? ㅋㅋㅋ",

  ];

  function resize() {
    W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;
    player.x = W / 2; 
    // 🔥 위치 및 원근법 조정 (거리 증가)
    player.y = H * 0.65; 
    boss.x = W / 2; 
    boss.y = H * 0.12; 
    boss.targetY = boss.y;
  }
  window.addEventListener('resize', resize);

  // Drawing
  let gridOffset = 0;
  function drawBackground(dt) {
    ctx.fillStyle = `rgba(5, 5, ${16 + tensionLevel * 40}, 0.8)`; ctx.fillRect(0, 0, W, H);
    gridOffset = (gridOffset + (50 + tensionLevel * 150) * dt) % 40;
    ctx.strokeStyle = `rgba(0, 243, 255, ${0.1 + tensionLevel * 0.1})`; ctx.lineWidth = 1; ctx.beginPath();
    for (let i = -10; i <= 10; i++) {
      ctx.moveTo(W / 2 + i * 40, H * 0.3); ctx.lineTo(W / 2 + i * (100 + tensionLevel * 50), H);
    }
    for (let i = 0; i < 20; i++) {
      const y = H * 0.3 + Math.pow(i / 15, 2) * (H * 0.7) + gridOffset;
      if (y < H) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    }
    ctx.stroke();
    ctx.strokeStyle = tensionLevel > 0.5 ? varNeon('red') : varNeon('blue');
    ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = ctx.strokeStyle;
    ctx.beginPath(); ctx.moveTo(0, H * 0.3); ctx.lineTo(W, H * 0.3); ctx.stroke(); ctx.shadowBlur = 0;
  }

  function drawPlayer() {
    ctx.save();
    let drawX = player.x; let drawY = player.y;
    if (player.isPanicking) {
      drawX += Math.sin(Date.now() * 0.05) * 8; drawY += Math.cos(Date.now() * 0.05) * 3;
      ctx.font = "26px Arial"; 
      ctx.fillText("💦", drawX + 70, drawY - 50); 
      ctx.fillText("❗", drawX - 70, drawY - 60);
    }
    ctx.translate(drawX, drawY);
    ctx.scale(2.0, 2.0); // 🔥 거대한 스케일 유지하되 화면 밸런스에 맞춤
    renderTankModel(ctx, selectedTankId, player.isPanicking);
    ctx.restore();
  }

  function drawBoss(dt) {
    if (state === 'gameover' && boss.hp <= 0) return; 

    ctx.save();
    let pulse = Math.abs(Math.sin(Date.now() * 0.005));

    if (state === 'boss_dying') {
      const progress = 1 - (boss.deathTimer / 3.5); 
      ctx.translate(boss.x + (Math.random()-0.5)*40, boss.y + (Math.random()-0.5)*40); 
      ctx.scale(1 + progress*0.5, 1 - progress*0.3); 
      ctx.globalAlpha = Math.max(0, 1 - progress); 
      pulse = Math.random() * 2; 
    } else {
      boss.y += (boss.targetY - boss.y) * 2 * dt;
      const hoverY = boss.y + Math.sin(Date.now() * 0.002) * 15;
      ctx.translate(boss.x, hoverY);
    }
    
    ctx.shadowBlur = 30 + pulse * 20; ctx.shadowColor = varNeon('red');
    ctx.fillStyle = '#111'; ctx.strokeStyle = varNeon('red'); ctx.lineWidth = 4;
    ctx.beginPath();
    
    // 🔥 원근법 적용: 보스 사이즈 축소
    for (let i = 0; i < 8; i++) {
      const angle = (i * Math.PI) / 4 + (Date.now() * 0.0005);
      const px = Math.cos(angle) * 45; const py = Math.sin(angle) * 45;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    
    ctx.fillStyle = (tensionLevel > 0.5 || state === 'boss_dying') ? '#fff' : varNeon('red');
    ctx.shadowBlur = 20; ctx.beginPath(); ctx.arc(0, 0, 12 + pulse * 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      let p = projectiles[i];
      p.y += p.vy * dt; p.x += p.vx * dt;
      ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
      
      if(p.type === 'player' || p.type === 'carpet') {
        ctx.fillRect(p.x - 4, p.y, 8, p.type === 'carpet' ? 30 : 20);
        // 🔥 보스 피격 판정 (축소된 보스 사이즈 반영)
        if (p.y < boss.y + 45 && Math.abs(p.x - boss.x) < 50) {
          createParticles(p.x, boss.y + 45, p.color, p.type === 'carpet' ? 30 : 15);
          boss.hp -= p.dmg;
          playSound('hit'); updateHpUI(); projectiles.splice(i, 1);
          if (boss.hp <= 0) triggerBossDeath(); 
        }
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
        // 🔥 플레이어 피격 판정 (확대된 주인공 사이즈 반영)
        if (p.y > player.y - 60 && Math.abs(p.x - player.x) < 80) {
          createParticles(p.x, player.y - 60, p.color, 20);
          player.hp -= 20;
          playSound('hit'); updateHpUI(); triggerScreenShake(20); projectiles.splice(i, 1);
          if (player.hp <= 0) gameOver(false);
        }
      }
    }
  }

  function drawSpecialBeams(dt) {
    for (let i = specialBeams.length - 1; i >= 0; i--) {
      let b = specialBeams[i];
      b.life -= dt;
      if (b.life <= 0) { specialBeams.splice(i, 1); continue; }
      
      const progress = 1 - (b.life / b.maxLife); 
      ctx.save();
      
      if (b.type === 'z') {
        const width = Math.sin(progress * Math.PI) * 120;
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 40; ctx.shadowColor = varNeon('green');
        ctx.fillStyle = `rgba(57, 255, 20, ${Math.sin(progress * Math.PI)})`;
        ctx.fillRect(b.x - width, boss.y, width * 2, player.y - boss.y);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(b.x - width/3, boss.y, width*(2/3), player.y - boss.y);

        ctx.beginPath();
        ctx.strokeStyle = '#fffb00';
        ctx.lineWidth = 4;
        let ly = player.y;
        ctx.moveTo(b.x, ly);
        while(ly > boss.y) {
            ly -= 30 + Math.random()*30;
            let lx = b.x + (Math.random() - 0.5) * width * 2;
            ctx.lineTo(lx, ly);
        }
        ctx.stroke();
        
        if(Math.random() > 0.5) createParticles(boss.x + (Math.random()-0.5)*100, boss.y + 30, varNeon('green'), 5);

      } else if (b.type === 'c') {
        ctx.globalCompositeOperation = 'lighter';
        if (progress < 0.2) {
            ctx.fillStyle = `rgba(255, 0, 60, ${progress * 5})`;
            ctx.fillRect(boss.x - 2, 0, 4, H);
            ctx.fillRect(boss.x - 40, 0, 2, H);
            ctx.fillRect(boss.x + 40, 0, 2, H);
        } else if (progress < 0.5) {
            let beamW = (progress - 0.2) * 5 * W;
            ctx.fillStyle = `rgba(255, 255, 255, 0.95)`;
            ctx.shadowBlur = 100; ctx.shadowColor = varNeon('yellow');
            ctx.fillRect(boss.x - beamW/2, 0, beamW, H);
        } else {
            let alpha = 1 - ((progress - 0.5) * 2);
            ctx.strokeStyle = `rgba(0, 243, 255, ${alpha})`;
            ctx.lineWidth = 20;
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, Math.pow((progress - 0.5)*3, 2) * 1500, 0, Math.PI*2);
            ctx.stroke();
            ctx.strokeStyle = `rgba(255, 251, 0, ${alpha * 0.5})`;
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, (progress - 0.5) * 2000, 0, Math.PI*2);
            ctx.stroke();
            if(Math.random() > 0.7) createParticles(boss.x, boss.y, '#ffffff', 20);
        }
      }
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();
    }
  }

  function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++){
      particles.push({
        x: x, y: y, vx: (Math.random() - 0.5) * 800, vy: (Math.random() - 0.5) * 800,
        life: 1 + Math.random(), color: color
      });
    }
  }
  function drawParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 2;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = Math.min(1, p.life); 
      ctx.fillStyle = p.color; 
      ctx.shadowBlur = 10; ctx.shadowColor = p.color;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6); 
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
  }

  function triggerScreenShake(amount) { cameraShake = Math.max(cameraShake, amount); }
  function updateHpUI() {
    document.getElementById('playerHp').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
    document.getElementById('bossHp').style.width = Math.max(0, (boss.hp / boss.maxHp) * 100) + '%';
  }
  function showTaunt() {
    const box = document.getElementById('tauntBox');
    box.innerText = taunts[Math.floor(Math.random() * taunts.length)];
    box.classList.add('show'); setTimeout(() => box.classList.remove('show'), 3000);
  }

  function updateComboUI() {
    document.getElementById('comboText').innerText = `COMBO: ${player.combo}`;
    document.getElementById('btnZ').className = `special-btn ${player.combo >= 3 ? 'ready-z' : ''}`;
    document.getElementById('btnX').className = `special-btn ${player.combo >= 4 ? 'ready-x' : ''}`;
    document.getElementById('btnC').className = `special-btn ${player.combo >= 5 ? 'ready-c' : ''}`;
  }

  function triggerBossDeath() {
    if(state === 'boss_dying' || state === 'gameover') return;
    state = 'boss_dying';
    boss.hp = 0;
    boss.deathTimer = 3.5; 
    document.getElementById('uiLayer').style.pointerEvents = 'none';
    playSound('boss_boom');
  }

  function useSpecial(type) {
    if (state !== 'playing') return;
    if (type === 'z' && player.combo >= 3) {
      player.combo -= 3;
      playSound('laser'); 
      triggerScreenShake(40);
      specialBeams.push({ type: 'z', x: player.x, maxLife: 1.0, life: 1.0 });
      boss.hp -= 50;
    } else if (type === 'x' && player.combo >= 4) {
      player.combo -= 4;
      playSound('carpet'); triggerScreenShake(40);
      for(let i=0; i<15; i++) {
        setTimeout(() => {
          // 🔥 융단폭격 비행속도 조절
          projectiles.push({ x: boss.x + (Math.random()-0.5)*300, y: H, vy: -1000, vx: 0, color: varNeon('purple'), type: 'carpet', dmg: 10 });
        }, i * 80);
      }
    } else if (type === 'c' && player.combo >= 5) {
      player.combo -= 5;
      playSound('orbital'); 
      triggerScreenShake(100);
      specialBeams.push({ type: 'c', maxLife: 2.0, life: 2.0 });
      boss.hp -= 150;
      
      const flash = document.getElementById('flashOverlay');
      setTimeout(() => {
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.transition = 'opacity 1s ease'; flash.style.opacity = '0'; }, 100);
      }, 400);
      setTimeout(() => { flash.style.transition = 'none'; }, 1500); 
    } else {
      return; 
    }
    
    updateComboUI(); updateHpUI();
    if (boss.hp <= 0) triggerBossDeath(); 
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'z' || e.key === 'Z') useSpecial('z');
    if (e.key === 'x' || e.key === 'X') useSpecial('x');
    if (e.key === 'c' || e.key === 'C') useSpecial('c');
  });

  document.getElementById('btnZ').addEventListener('click', () => useSpecial('z'));
  document.getElementById('btnX').addEventListener('click', () => useSpecial('x'));
  document.getElementById('btnC').addEventListener('click', () => useSpecial('c'));

  function getQuestionPool() {
    const diff = document.getElementById('difficultySelect').value;
    let pool = [];
    if (diff === 'all') pool = [...qDB];
    else pool = qDB.filter(q => q.d === diff);
    return pool.sort(() => Math.random() - 0.5);
  }

  function generateNextQuestion() {
    if (activeQuestions.length === 0) activeQuestions = getQuestionPool(); 
    currentQuestion = activeQuestions.pop();
    
    document.getElementById('questionText').innerText = currentQuestion.q;
    const grid = document.getElementById('answersGrid');
    grid.innerHTML = '';
    
    let opts = [...currentQuestion.options].sort(() => Math.random() - 0.5);
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn'; btn.innerText = opt;
      btn.onclick = () => handleAnswer(opt, btn);
      grid.appendChild(btn);
    });
  }

  function handleAnswer(selected, btnElement) {
    if (state !== 'playing') return;
    initAudio();
    document.querySelectorAll('.answer-btn').forEach(b => b.style.pointerEvents = 'none');

    if (selected === currentQuestion.a) {
      btnElement.classList.add('correct'); playSound('shoot');
      player.combo++; updateComboUI();
      // 🔥 포탄 발사 속도와 높이를 스케일/원근법에 맞게 조정
      projectiles.push({ x: player.x, y: player.y - 85, vy: -900, vx: 0, color: tankColors[selectedTankId%5], type: 'player', dmg: 15 });
      
      tensionLevel = Math.max(0, tensionLevel - 0.2);
      boss.targetY = Math.max(H * 0.12, boss.targetY - 20);
      document.getElementById('tensionOverlay').classList.remove('active');
      player.isPanicking = false;

      setTimeout(() => { if(state === 'playing') generateNextQuestion(); }, 400);

    } else {
      btnElement.classList.add('wrong'); playSound('error'); triggerScreenShake(15);
      player.combo = 0; updateComboUI();
      player.isPanicking = true; player.panicTimer = 2.0;
      tensionLevel = Math.min(1, tensionLevel + 0.3);
      boss.targetY = Math.min(H * 0.25, boss.targetY + 30);
      
      if (tensionLevel >= 0.6) { document.getElementById('tensionOverlay').classList.add('active'); playSound('alarm'); }
      showTaunt();

      setTimeout(() => {
        playSound('shoot');
        // 🔥 보스 발사 속도 및 높이 조정
        projectiles.push({ x: boss.x, y: boss.y + 45, vy: 500, vx: (player.x - boss.x)*0.4, color: varNeon('red'), type: 'boss', dmg: 20 });
      }, 300);

      activeQuestions.unshift(currentQuestion);

      setTimeout(() => {
        document.getElementById('hintText').innerText = currentQuestion.hint || "교과서를 다시 한번 꼼꼼히 확인해 보세요!";
        document.getElementById('hintModal').classList.remove('hidden');
      }, 1000); 
    }
  }

  function closeHint() {
    document.getElementById('hintModal').classList.add('hidden');
    if (state === 'playing') {
        generateNextQuestion();
    }
  }

  // --- Main Loop ---
  function update(dt) {
    if (state === 'playing') {
      if (player.isPanicking) {
        player.panicTimer -= dt;
        if (player.panicTimer <= 0) player.isPanicking = false;
      }
    } else if (state === 'boss_dying') { 
      boss.deathTimer -= dt;
      triggerScreenShake(20);
      
      if (Math.random() < 0.2) {
        playSound('hit');
        createParticles(boss.x + (Math.random()-0.5)*90, boss.y + (Math.random()-0.5)*90, ['#ff003c', '#fffb00', '#ffffff'][Math.floor(Math.random()*3)], 20);
      }
      
      if (boss.deathTimer <= 0) {
        const flash = document.getElementById('flashOverlay');
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.transition = 'opacity 2s ease'; flash.style.opacity = '0'; }, 100);
        setTimeout(() => { flash.style.transition = 'none'; }, 2200); 
        gameOver(true);
      }
    }
  }

  function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, W, H);
    if (cameraShake > 0) {
      ctx.translate((Math.random() - 0.5) * cameraShake, (Math.random() - 0.5) * cameraShake);
      cameraShake *= 0.9; if (cameraShake < 0.5) cameraShake = 0;
    }
    const now = performance.now(); const dt = (now - lastTime) / 1000; lastTime = now;

    drawBackground(dt);
    if (state === 'playing' || state === 'boss_dying') {
      update(dt); drawSpecialBeams(dt); drawBoss(dt); drawPlayer(); drawProjectiles(dt); drawParticles(dt);
    }
    animationId = requestAnimationFrame(draw);
  }

  function startGame() {
    initAudio();
    const nick = document.getElementById('nicknameInput').value || "인천장도초 요원";
    document.getElementById('playerNicknameDisplay').innerText = nick;
    
    state = 'playing'; player.hp = player.maxHp; boss.hp = boss.maxHp;
    player.isPanicking = false; player.combo = 0; tensionLevel = 0; boss.targetY = H * 0.12;
    projectiles = []; particles = []; specialBeams = []; activeQuestions = getQuestionPool();
    
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('hintModal').classList.add('hidden');
    document.getElementById('uiLayer').style.pointerEvents = 'auto';
    document.getElementById('tensionOverlay').classList.remove('active');
    
    updateHpUI(); updateComboUI(); generateNextQuestion();
  }

  function gameOver(isWin) {
    state = 'gameover'; document.getElementById('uiLayer').style.pointerEvents = 'none';
    const nick = document.getElementById('playerNicknameDisplay').innerText; 

    document.getElementById('endScreen').classList.remove('hidden');
    
    if(isWin) {
      playSound('fanfare'); 
      document.getElementById('endTitle').innerText = "MISSION ACCOMPLISHED";
      document.getElementById('endTitle').style.color = varNeon('green');
      document.getElementById('endSub').innerText = `${nick}의 완벽한 승리입니다!`; 
      
      for(let i=0; i<100; i++) {
          createParticles(W/2, H/2, ['#39ff14', '#00f3ff', '#fffb00'][Math.floor(Math.random()*3)], 1);
      }
    } else {
      document.getElementById('endTitle').innerText = "MISSION FAILED";
      document.getElementById('endTitle').style.color = varNeon('red');
      document.getElementById('endSub').innerText = "보스에게 지리 데이터를 모두 빼앗겼습니다...";
    }
  }

  resize(); lastTime = performance.now(); requestAnimationFrame(draw);
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('lobbyScreen').classList.remove('hidden');
  });
</script>
</body>
</html>
