<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등학생 그림 넌센스 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(-45deg, #FFB6C1, #FFE4E1, #E0FFFF, #87CEFA, #DDA0DD);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }

        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite;
        }

        .emoji-art {
            font-size: 3.5rem; 
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
            letter-spacing: 0.1em;
        }

        @media (min-width: 400px) { .emoji-art { font-size: 5rem; } }
        @media (min-width: 640px) { .emoji-art { font-size: 6.5rem; } }

        .timer-warning {
            color: #ef4444;
            animation: pulse-fast 0.5s infinite;
        }

        @keyframes pulse-fast {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        .combo-text {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .hint-circle {
            color: #cbd5e1; /* slate-300 */
            letter-spacing: 0.3em;
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex items-center justify-center p-3 sm:p-4">

    <div id="start-screen" class="screen active flex-col items-center max-w-md w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-8 text-center border-4 border-yellow-400 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-4 bg-yellow-400"></div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl text-blue-600 mb-6 drop-shadow-md animate-bounce-subtle mt-2">
            🎨 그림 넌센스<br><span class="text-yellow-500 text-5xl sm:text-6xl">QUIZ</span>
        </h1>
        
        <div class="bg-gray-100 rounded-xl p-3 sm:p-4 mb-6 text-left border-2 border-dashed border-gray-300 w-full">
            <h2 class="text-lg sm:text-xl text-gray-800 mb-3 text-center border-b pb-2">📌 게임 알아두기</h2>
            <ul class="text-base sm:text-lg text-gray-700 space-y-2">
                <li><span class="bg-yellow-300 px-2 rounded-full mr-1">1</span> 총 <b>20문제</b>! (하5/중10/상5)</li>
                <li><span class="bg-yellow-300 px-2 rounded-full mr-1">2</span> 제한 시간은 <b>30초</b>!</li>
                <li><span class="bg-yellow-300 px-2 rounded-full mr-1">3</span> 3연속 정답 시 <b>+100점 보너스</b>!</li>
                <li><span class="bg-yellow-300 px-2 rounded-full mr-1">4</span> 틀려도 시간 내 무한 재도전!</li>
            </ul>
        </div>

        <label class="flex items-center justify-center gap-2 sm:gap-3 mb-6 cursor-pointer bg-blue-50 py-3 px-4 sm:px-6 rounded-2xl border-2 border-blue-200 hover:bg-blue-100 transition-colors w-full">
            <input type="checkbox" id="use-hint-checkbox" class="w-5 h-5 sm:w-6 sm:h-6 accent-blue-500 cursor-pointer" checked>
            <span class="text-lg sm:text-xl text-gray-800 font-bold select-none">💡 초성 힌트 보기</span>
        </label>

        <button onclick="startGame()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-xl sm:text-2xl py-4 rounded-2xl shadow-[0_6px_0_#2563eb] hover:shadow-[0_2px_0_#2563eb] hover:translate-y-1 transition-all">
            게임 시작하기 🚀
        </button>
    </div>

    <div id="game-screen" class="screen flex-col items-center w-full max-w-2xl">
        
        <div class="w-full flex justify-between items-center mb-3 sm:mb-4 px-1 gap-1 sm:gap-2">
            <div class="bg-yellow-400 text-blue-900 text-base sm:text-xl md:text-3xl px-2 sm:px-4 py-1 sm:py-2 rounded-t-xl sm:rounded-t-2xl rounded-br-xl sm:rounded-br-2xl shadow-md border border-yellow-500 flex flex-col sm:flex-row items-center justify-center flex-1 sm:flex-none">
                <span class="font-bold whitespace-nowrap"><span id="question-number">1</span>번</span>
                <span id="difficulty-badge" class="sm:ml-2 text-[10px] sm:text-xs md:text-base px-2 py-0.5 sm:py-1 rounded-full text-white font-bold bg-green-500 shadow-sm border border-white/50 whitespace-nowrap mt-1 sm:mt-0">하</span>
            </div>
            
            <div class="relative flex flex-col items-center justify-center bg-white px-2 sm:px-4 h-12 sm:h-14 md:h-16 rounded-xl sm:rounded-2xl shadow-sm border-2 border-blue-200 min-w-[90px] sm:min-w-[120px] md:min-w-[160px] flex-1 sm:flex-none">
                <div class="text-xs sm:text-sm md:text-lg font-bold text-gray-700 relative z-10 flex items-center gap-1">
                    점수: <span id="score-display" class="text-blue-600 text-base sm:text-lg md:text-2xl">0</span>
                </div>
                <div id="combo-display" class="absolute bottom-0.5 sm:bottom-1 text-[8px] sm:text-[10px] md:text-xs font-extrabold text-orange-500 transition-all opacity-0 whitespace-nowrap"></div>
            </div>

            <div class="flex items-center justify-center bg-white px-2 sm:px-3 md:px-4 py-1 sm:py-2 rounded-full shadow-md border-2 border-gray-200 flex-1 sm:flex-none">
                <span class="text-sm sm:text-lg md:text-xl mr-1">⏳</span>
                <span id="timer" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 w-6 sm:w-8 text-center">30</span>
            </div>
        </div>

        <div class="w-full bg-white rounded-2xl sm:rounded-3xl shadow-xl p-4 sm:p-6 md:p-8 border-4 border-white flex flex-col items-center">
            
            <div class="w-full h-40 sm:h-48 md:h-64 bg-blue-50 rounded-xl sm:rounded-2xl flex flex-col items-center justify-center mb-4 sm:mb-6 relative border-2 border-blue-100 overflow-hidden">
                <div id="picture-emoji" class="emoji-art">🪟🚪</div>
            </div>

            <div class="w-full bg-gray-50 p-3 sm:p-4 rounded-xl sm:rounded-2xl flex flex-col items-center border border-gray-200">
                <div id="hint-container" class="text-yellow-500 text-xl sm:text-3xl mb-2 flex items-center gap-2">
                    💡 <span id="hint-text" class="tracking-[0.2em] text-blue-600 font-bold">ㅊㅁ</span>
                </div>
                
                <form id="answer-form" class="w-full max-w-sm sm:max-w-xs flex flex-col gap-2 mt-2" onsubmit="submitAnswer(event)">
                    <div class="flex gap-2 w-full">
                        <input type="text" id="answer-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="정답 입력" 
                               class="w-full text-center text-lg sm:text-2xl py-2 sm:py-3 rounded-xl border-2 border-gray-300 bg-white text-gray-800 placeholder-gray-400 shadow-inner transition-transform">
                        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white text-base sm:text-xl px-4 sm:px-6 rounded-xl shadow-[0_4px_0_#16a34a] hover:shadow-[0_0px_0_#16a34a] hover:translate-y-1 transition-all whitespace-nowrap">
                            확인
                        </button>
                    </div>
                    <div id="wrong-message" class="text-red-500 text-center text-xs sm:text-sm font-bold h-4 sm:h-5 opacity-0 transition-opacity">
                        오답입니다! 다시 시도해 보세요.
                    </div>
                </form>
            </div>
        </div>
        
        <div class="w-full max-w-2xl mt-4 sm:mt-6 bg-white/50 rounded-full h-3 sm:h-4 shadow-inner overflow-hidden border border-white/60">
            <div id="progress-bar" class="bg-green-400 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div id="feedback-screen" class="screen flex-col items-center max-w-md w-full">
        <div id="feedback-box" class="w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 text-center border-4">
            <div id="feedback-icon" class="text-6xl sm:text-8xl mb-2 sm:mb-4">⭕</div>
            <h2 id="feedback-title" class="text-3xl sm:text-4xl mb-3 sm:mb-4">정답입니다!</h2>
            <div class="bg-gray-100 rounded-xl p-3 sm:p-4 mb-5 sm:mb-6">
                <p class="text-gray-600 mb-1 text-sm sm:text-base">정답은</p>
                <p id="correct-answer-text" class="text-3xl sm:text-4xl text-blue-600 font-bold">-</p>
            </div>
            <button onclick="nextQuestion()" class="w-full bg-blue-500 text-white text-xl sm:text-2xl py-3 sm:py-4 rounded-2xl shadow-[0_6px_0_#2563eb] hover:translate-y-1 transition-all">
                다음 문제 👉
            </button>
        </div>
    </div>

    <div id="result-screen" class="screen flex-col items-center max-w-md w-full bg-white rounded-3xl shadow-2xl p-5 sm:p-8 text-center border-4 border-blue-400 overflow-hidden relative">
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>'); background-size: 50px;"></div>
        
        <h1 class="text-3xl sm:text-4xl text-blue-600 mb-4 z-10 relative font-bold">게임 종료!</h1>
        
        <div class="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-full py-2 sm:py-3 px-4 sm:px-8 mb-5 sm:mb-6 z-10 relative border-4 border-yellow-300 shadow-lg inline-block transform transition-transform hover:scale-105">
            <p id="rank-badge" class="text-xl sm:text-2xl md:text-3xl mb-0 font-black drop-shadow-md whitespace-nowrap">👑 넌센스 마스터 👑</p>
        </div>
        
        <div class="grid grid-cols-2 gap-2 sm:gap-3 w-full mb-5 sm:mb-6 relative z-10">
            <div class="bg-gray-50 rounded-xl p-2 sm:p-3 border-2 border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="block text-gray-500 text-xs sm:text-sm mb-1">맞힌 문제</span>
                <span id="result-correct" class="font-bold text-blue-600 text-lg sm:text-xl">0개</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-2 sm:p-3 border-2 border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="block text-gray-500 text-xs sm:text-sm mb-1">정답률</span>
                <span id="result-accuracy" class="font-bold text-green-600 text-lg sm:text-xl">0%</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-2 sm:p-3 border-2 border-gray-200 shadow-sm col-span-2 flex flex-col justify-center">
                <span class="block text-gray-500 text-xs sm:text-sm mb-1">걸린 소요시간</span>
                <span id="result-time" class="font-bold text-purple-600 text-lg sm:text-xl">0초</span>
            </div>
        </div>
        
        <div class="bg-yellow-100 rounded-2xl w-full p-3 sm:p-4 mb-5 sm:mb-6 border-4 border-yellow-400 z-10 relative shadow-inner">
            <p class="text-gray-600 mb-1 font-bold text-sm sm:text-base">최종 점수</p>
            <div class="flex items-center justify-center">
                <span class="text-4xl sm:text-5xl text-yellow-600 font-black" id="final-score">0</span>
                <span class="text-lg sm:text-xl text-yellow-700 font-bold mt-1 sm:mt-2 ml-1">점</span>
            </div>
        </div>

        <button onclick="initGame()" class="w-full bg-green-500 hover:bg-green-600 text-white text-xl sm:text-2xl py-3 sm:py-4 rounded-2xl shadow-[0_6px_0_#16a34a] hover:shadow-[0_2px_0_#16a34a] hover:translate-y-1 transition-all z-10 relative">
            다시 하기 🔄
        </button>
    </div>

    <script>
        const quizData = [
            // 난이도 하 (5개)
            { emojis: '🐘🩸', hint: 'ㅋㅍ', answer: '코피', difficulty: '하' },
            { emojis: '👑📏', hint: 'ㅇㅈ', answer: '왕자', difficulty: '하' },
            { emojis: '👁️💧', hint: 'ㄴㅁ', answer: '눈물', difficulty: '하' },
            { emojis: '🌙💡', hint: 'ㄷㅂ', answer: '달빛', difficulty: '하' },
            { emojis: '🚪🐟', hint: 'ㅁㅇ', answer: '문어', difficulty: '하' },
            
            // 난이도 중 (10개)
            { emojis: '🔥🐶', hint: 'ㅂㄷ', answer: '불독', difficulty: '중' },
            { emojis: '☀️💧', hint: 'ㅎㅁ', answer: '해물', difficulty: '중' },
            { emojis: '👑🐝', hint: 'ㅇㅂ', answer: '왕벌', difficulty: '중' },
            { emojis: '🌙📝', hint: 'ㄷㄹ', answer: '달력', difficulty: '중' },
            { emojis: '🌧️🕊️', hint: 'ㅂㄷㄱ', answer: '비둘기', difficulty: '중' },
            { emojis: '5️⃣🔔🐟', hint: 'ㅇㅈㅇ', answer: '오징어', difficulty: '중' },
            { emojis: '🩸🚗💋', hint: 'ㅍㅋㅊ', answer: '피카츄', difficulty: '중' },
            { emojis: '🌊🪰', hint: 'ㅎㅍㄹ', answer: '해파리', difficulty: '중' },
            { emojis: '🌳🐴', hint: 'ㅁㅁ', answer: '목마', difficulty: '중' },
            { emojis: '🍯🐖', hint: 'ㄲㄷㅈ', answer: '꿀돼지', difficulty: '중' },

            // 난이도 상 (5개)
            { emojis: '🐄🌲', hint: 'ㅅㄴㅁ', answer: '소나무', difficulty: '상' },
            { emojis: '🐍🔥', hint: 'ㅂㅍㅇㅇ', answer: '뱀파이어', difficulty: '상' },
            { emojis: '🐢🚢', hint: 'ㄱㅂㅅ', answer: '거북선', difficulty: '상' },
            { emojis: '🎿🌿🦷➕👨', hint: 'ㅅㅍㅇㄷㅁ', answer: '스파이더맨', difficulty: '상' },
            { emojis: '👶🎿🖼️', hint: 'ㅇㅇㅅㅋㄹ', answer: '아이스크림', difficulty: '상' }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let currentCombo = 0;
        let timeLeft = 30;
        let timerInterval;
        let correctAnswersCount = 0;
        let gameStartTime = 0;
        let useHint = true;

        const sounds = {
            correct: null,
            wrong: null,
            init: function() {
                if (!this.correct) {
                    this.correct = new Tone.PolySynth(Tone.Synth).toDestination();
                    this.wrong = new Tone.Synth().toDestination();
                    this.correct.volume.value = -5;
                    this.wrong.volume.value = -5;
                }
            },
            playCorrect: function() {
                if(Tone.context.state !== 'running') Tone.context.resume();
                this.correct.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n");
            },
            playWrong: function() {
                if(Tone.context.state !== 'running') Tone.context.resume();
                this.wrong.triggerAttackRelease("C3", "16n");
            }
        };

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            feedback: document.getElementById('feedback-screen'),
            result: document.getElementById('result-screen')
        };

        const elements = {
            questionNumber: document.getElementById('question-number'),
            difficultyBadge: document.getElementById('difficulty-badge'),
            scoreDisplay: document.getElementById('score-display'),
            comboDisplay: document.getElementById('combo-display'),
            timer: document.getElementById('timer'),
            pictureEmoji: document.getElementById('picture-emoji'),
            hintContainer: document.getElementById('hint-container'),
            hintText: document.getElementById('hint-text'),
            answerInput: document.getElementById('answer-input'),
            wrongMessage: document.getElementById('wrong-message'),
            progressBar: document.getElementById('progress-bar'),
            feedbackBox: document.getElementById('feedback-box'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackTitle: document.getElementById('feedback-title'),
            correctAnswerText: document.getElementById('correct-answer-text'),
            finalScore: document.getElementById('final-score'),
            rankBadge: document.getElementById('rank-badge'),
            resultCorrect: document.getElementById('result-correct'),
            resultAccuracy: document.getElementById('result-accuracy'),
            resultTime: document.getElementById('result-time'),
            useHintCheckbox: document.getElementById('use-hint-checkbox')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function updateScoreBoard() {
            elements.scoreDisplay.innerText = score;
            if (currentCombo >= 3) {
                elements.comboDisplay.innerText = `${currentCombo} COMBO! 🔥 (+100)`;
                elements.comboDisplay.classList.remove('opacity-0');
                elements.comboDisplay.classList.add('opacity-100', 'combo-text');
                void elements.comboDisplay.offsetWidth; 
            } else if (currentCombo > 0) {
                elements.comboDisplay.innerText = `${currentCombo} COMBO!`;
                elements.comboDisplay.classList.remove('opacity-0');
                elements.comboDisplay.classList.add('opacity-100');
            } else {
                elements.comboDisplay.innerText = '';
                elements.comboDisplay.classList.remove('opacity-100');
                elements.comboDisplay.classList.add('opacity-0');
            }
        }

        async function startGame() {
            // 사용자 제스처 이벤트 내에서 AudioContext 초기화 보장
            await Tone.start();
            sounds.init();

            score = 0;
            currentCombo = 0;
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            gameStartTime = Date.now();
            useHint = elements.useHintCheckbox.checked;

            loadQuestion();
            showScreen('game');
        }

        function loadQuestion() {
            const q = quizData[currentQuestionIndex];
            
            elements.questionNumber.innerText = currentQuestionIndex + 1;
            elements.difficultyBadge.innerText = `난이도: ${q.difficulty}`;
            
            elements.difficultyBadge.className = 'sm:ml-2 text-[10px] sm:text-xs md:text-base px-2 py-0.5 sm:py-1 rounded-full text-white font-bold shadow-sm border border-white/50 whitespace-nowrap mt-1 sm:mt-0';
            if (q.difficulty === '하') {
                elements.difficultyBadge.classList.add('bg-green-500');
            } else if (q.difficulty === '중') {
                elements.difficultyBadge.classList.add('bg-orange-500');
            } else if (q.difficulty === '상') {
                elements.difficultyBadge.classList.add('bg-red-500');
            }

            elements.pictureEmoji.innerText = q.emojis;
            
            if (useHint) {
                elements.hintText.innerText = q.hint;
                elements.hintText.className = 'tracking-[0.2em] text-blue-600 font-bold';
            } else {
                const circleCount = q.answer.length;
                const circles = Array(circleCount).fill('◯').join('');
                elements.hintText.innerText = circles;
                elements.hintText.className = 'hint-circle';
            }

            elements.answerInput.value = '';
            elements.answerInput.classList.remove('animate-shake');
            elements.wrongMessage.style.opacity = '0';
            elements.answerInput.focus();
            
            updateScoreBoard();
            
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            elements.progressBar.style.width = `${progress}%`;

            resetTimer();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            elements.timer.innerText = timeLeft;
            elements.timer.classList.remove('timer-warning');

            timerInterval = setInterval(() => {
                timeLeft--;
                elements.timer.innerText = timeLeft;

                if (timeLeft <= 3) {
                    elements.timer.classList.add('timer-warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    currentCombo = 0;
                    updateScoreBoard();
                    processAnswer(false, true);
                }
            }, 1000);
        }

        function submitAnswer(event) {
            event.preventDefault();
            if(elements.answerInput.value.trim() === '') return;
            
            const userAnswer = elements.answerInput.value.trim().replace(/\s/g, "");
            const correctAnswer = quizData[currentQuestionIndex].answer.replace(/\s/g, "");
            
            if (userAnswer === correctAnswer) {
                sounds.playCorrect();
                correctAnswersCount++;
                clearInterval(timerInterval);
                
                currentCombo++;
                let earnedPoints = 100;
                if (currentCombo >= 3) {
                    earnedPoints += 100;
                }
                score += earnedPoints;
                updateScoreBoard();
                
                processAnswer(true, false);
            } else {
                sounds.playWrong();
                currentCombo = 0;
                updateScoreBoard();
                
                elements.answerInput.classList.remove('animate-shake');
                void elements.answerInput.offsetWidth; 
                elements.answerInput.classList.add('animate-shake');
                
                elements.answerInput.value = '';
                elements.answerInput.focus();
                
                elements.wrongMessage.style.opacity = '1';
                setTimeout(() => {
                    elements.wrongMessage.style.opacity = '0';
                }, 1500);
            }
        }

        function processAnswer(isCorrect, isTimeout) {
            const q = quizData[currentQuestionIndex];
            elements.correctAnswerText.innerText = q.answer;

            if (isCorrect) {
                elements.feedbackIcon.innerText = '⭕';
                elements.feedbackTitle.innerText = '정답입니다!';
                elements.feedbackTitle.className = 'text-3xl sm:text-4xl mb-3 sm:mb-4 text-green-500 font-bold';
                elements.feedbackBox.className = 'w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 text-center border-4 border-green-400';
            } else {
                elements.feedbackIcon.innerText = isTimeout ? '⏰' : '❌';
                elements.feedbackTitle.innerText = isTimeout ? '시간 초과!' : '아쉽네요, 땡!';
                elements.feedbackTitle.className = 'text-3xl sm:text-4xl mb-3 sm:mb-4 text-red-500 font-bold';
                elements.feedbackBox.className = 'w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 text-center border-4 border-red-400';
            }

            showScreen('feedback');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
                showScreen('game');
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            elements.finalScore.innerText = score;
            
            const timeTakenSec = Math.floor((Date.now() - gameStartTime) / 1000);
            const minutes = Math.floor(timeTakenSec / 60);
            const seconds = timeTakenSec % 60;
            const timeString = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            
            const totalQuestions = quizData.length;
            const accuracy = Math.round((correctAnswersCount / totalQuestions) * 100);
            
            elements.resultCorrect.innerText = `${correctAnswersCount}개 / ${totalQuestions}문제`;
            elements.resultAccuracy.innerText = `${accuracy}%`;
            elements.resultTime.innerText = timeString;

            let rankName = "";
            let rankColor = "";
            
            if (correctAnswersCount >= 18) {
                rankName = "👑 넌센스 마스터 👑";
                rankColor = "text-pink-600";
            } else if (correctAnswersCount >= 13) {
                rankName = "🌟 센스쟁이 기대주 🌟";
                rankColor = "text-blue-600";
            } else if (correctAnswersCount >= 8) {
                rankName = "👍 노력파 넌센서 👍";
                rankColor = "text-green-600";
            } else {
                rankName = "🌱 넌센스 새싹 🌱";
                rankColor = "text-orange-600";
            }
            
            elements.rankBadge.className = `text-xl sm:text-2xl md:text-3xl mb-0 font-black drop-shadow-md combo-text whitespace-nowrap ${rankColor}`;
            elements.rankBadge.innerText = rankName;
            
            showScreen('result');
        }

        initGame();
    </script>
</body>
</html>
