<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등학생 그림 넌센스 퀴즈 5탄 (1.3배 황금폭발판)</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 구글 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Tone.js 로드 (효과음용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Canvas Confetti 로드 (폭죽 효과용) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(-45deg, #FFB6C1, #FFE4E1, #E0FFFF, #87CEFA, #DDA0DD);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
            transition: background 0.3s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🌟 황금 문제 등장 시 화면 전체 배경 일렁임 효과 */
        .golden-bg {
            background: linear-gradient(-45deg, #facc15, #eab308, #ca8a04, #fde047) !important;
            background-size: 400% 400% !important;
            animation: gradientBG 1s ease infinite !important;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }

        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite;
        }

        /* 1.3배 최적화 이모티콘 폰트 사이즈 */
        .emoji-art {
            font-size: min(15vw, 4.5rem); 
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
            letter-spacing: 0.1em;
            white-space: nowrap; 
        }

        @media (min-width: 400px) { .emoji-art { font-size: min(15vw, 6rem); } }
        @media (min-width: 640px) { .emoji-art { font-size: 8rem; } }

        .timer-warning {
            color: #ef4444;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.5);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        .combo-text {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .hint-circle {
            color: #cbd5e1; 
            letter-spacing: 0.3em;
        }

        /* 🔥 피버 타임 이펙트 */
        .fever-mode {
            animation: feverBorder 0.8s infinite alternate !important;
        }
        @keyframes feverBorder {
            from { box-shadow: 0 0 15px 5px #fbbf24, inset 0 0 15px 5px #fbbf24; border-color: #fbbf24; }
            to { box-shadow: 0 0 25px 5px #ef4444, inset 0 0 25px 5px #ef4444; border-color: #ef4444; }
        }

        /* 🌟 황금 문제 컨테이너 이펙트 (두근거리는 폭발적 효과) */
        @keyframes goldenPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px 10px #fde047, inset 0 0 20px 10px #fde047; }
            50% { transform: scale(1.02); box-shadow: 0 0 50px 20px #eab308, inset 0 0 30px 10px #eab308; border-color: #facc15; }
            100% { transform: scale(1); box-shadow: 0 0 20px 10px #fde047, inset 0 0 20px 10px #fde047; }
        }
        .golden-mode {
            animation: goldenPulse 0.6s infinite alternate !important;
            background: linear-gradient(135deg, #fef08a, #fef9c3) !important;
            border-color: #facc15 !important;
        }

        /* 😱 긴장감 심장 박동 이펙트 */
        .tension-pulse {
            animation: heartbeat 0.8s infinite !important;
        }
        @keyframes heartbeat {
            0%, 100% { box-shadow: inset 0 0 0px transparent; background-color: inherit; }
            50% { box-shadow: inset 0 0 40px 15px rgba(239, 68, 68, 0.4); background-color: #fef2f2; }
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex items-center justify-center p-3 sm:p-5">

    <!-- 시작 화면 (1.3배) -->
    <div id="start-screen" class="screen active flex-col items-center max-w-3xl w-full bg-white rounded-3xl shadow-2xl p-8 sm:p-10 text-center border-4 border-yellow-400 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-5 bg-yellow-400"></div>
        <h1 class="text-4xl sm:text-5xl md:text-6xl text-blue-600 mb-5 drop-shadow-md animate-bounce-subtle mt-3">
            🎨 그림 넌센스<br><span class="text-yellow-500 text-6xl sm:text-7xl">QUIZ 5탄</span>
        </h1>
        
        <div class="bg-blue-50 rounded-full px-5 py-2 mb-6 border-2 border-blue-200 shadow-sm">
            <span class="text-gray-600 text-base sm:text-xl font-bold">👑 나의 최고 점수: <span id="best-score-display" class="text-blue-600 text-xl sm:text-2xl">0</span>점</span>
        </div>
        
        <div class="bg-gray-100 rounded-2xl p-4 sm:p-6 mb-6 text-left border-[3px] border-dashed border-gray-300 w-full">
            <h2 class="text-xl sm:text-2xl text-gray-800 mb-3 text-center border-b-[3px] pb-2">📌 게임 알아두기</h2>
            <ul class="text-base sm:text-xl text-gray-700 space-y-2.5">
                <li><span class="bg-yellow-300 px-2.5 rounded-full mr-1.5">1</span> <b>20문제</b>가 무작위로 등장!</li>
                <li><span class="bg-yellow-300 px-2.5 rounded-full mr-1.5">2</span> 돌발 🌟<b>황금 문제</b>는 <b>15초, 점수 2배!</b></li>
                <li><span class="bg-yellow-300 px-2.5 rounded-full mr-1.5">3</span> 3연속 정답 시 🔥<b>피버 타임! (+보너스)</b></li>
                <li><span class="bg-yellow-300 px-2.5 rounded-full mr-1.5">4</span> 5초 남으면 😱<b>심장 쫄깃 긴장 모드!</b></li>
            </ul>
        </div>

        <label class="flex items-center justify-center gap-3 sm:gap-4 mb-7 cursor-pointer bg-blue-50 py-3 px-5 sm:px-8 rounded-2xl border-[3px] border-blue-200 hover:bg-blue-100 transition-colors w-full">
            <input type="checkbox" id="use-hint-checkbox" class="w-6 h-6 sm:w-8 sm:h-8 accent-blue-500 cursor-pointer" checked>
            <span class="text-xl sm:text-2xl text-gray-800 font-bold select-none">💡 초성 힌트 보기</span>
        </label>

        <button onclick="startGame()" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl sm:text-3xl py-5 rounded-2xl shadow-[0_6px_0_#2563eb] hover:shadow-[0_2px_0_#2563eb] hover:translate-y-1 transition-all font-bold">
            게임 시작하기 🚀
        </button>
    </div>

    <!-- 게임 화면 (1.3배) -->
    <div id="game-screen" class="screen flex-col items-center w-full max-w-3xl">
        
        <div class="w-full flex justify-between items-center mb-4 sm:mb-6 px-1.5 gap-1.5 sm:gap-3">
            <div class="bg-yellow-400 text-blue-900 text-lg sm:text-2xl md:text-4xl px-3 sm:px-6 py-2 rounded-t-2xl rounded-br-2xl shadow-md border-2 border-yellow-500 flex flex-col sm:flex-row items-center justify-center flex-1 sm:flex-none">
                <span class="font-bold whitespace-nowrap"><span id="question-number">1</span>/20</span>
                <span id="difficulty-badge" class="sm:ml-3 text-xs sm:text-sm md:text-lg px-2.5 py-1 rounded-full text-white font-bold bg-green-500 shadow-sm border-2 border-white/50 whitespace-nowrap mt-1 sm:mt-0">하</span>
                <span id="golden-badge" class="hidden sm:ml-2 text-xs sm:text-sm md:text-lg px-2.5 py-1 rounded-full text-white font-bold bg-yellow-500 shadow-sm border-2 border-white/50 whitespace-nowrap mt-1 sm:mt-0 animate-pulse">🌟황금!</span>
            </div>
            
            <div class="relative flex flex-col items-center justify-center bg-white px-3 sm:px-6 h-14 sm:h-16 md:h-20 rounded-xl sm:rounded-2xl shadow-sm border-[3px] border-blue-200 min-w-[120px] sm:min-w-[160px] md:min-w-[220px] flex-1 sm:flex-none">
                <div class="text-sm sm:text-lg md:text-2xl font-bold text-gray-700 relative z-10 flex items-center gap-1.5">
                    점수: <span id="score-display" class="text-blue-600 text-xl sm:text-3xl md:text-4xl">0</span>
                </div>
                <div id="combo-display" class="absolute bottom-0.5 sm:bottom-1 text-[10px] sm:text-sm md:text-base font-extrabold text-red-500 transition-all opacity-0 whitespace-nowrap"></div>
            </div>

            <div class="flex items-center justify-center bg-white px-3 sm:px-5 md:px-6 py-1.5 sm:py-2.5 rounded-full shadow-md border-[3px] border-gray-200 flex-1 sm:flex-none">
                <span class="text-lg sm:text-2xl md:text-3xl mr-1.5">⏳</span>
                <span id="timer" class="text-2xl sm:text-4xl md:text-5xl font-bold text-gray-800 w-10 sm:w-14 text-center">30</span>
            </div>
        </div>

        <div id="game-container" class="w-full bg-white rounded-2xl sm:rounded-3xl shadow-xl p-5 sm:p-8 md:p-10 border-[5px] border-white flex flex-col items-center transition-all duration-300">
            
            <div class="w-full h-48 sm:h-64 md:h-[22rem] bg-blue-50 rounded-xl sm:rounded-2xl flex flex-col items-center justify-center mb-5 sm:mb-8 relative border-[3px] border-blue-100 overflow-hidden">
                <div id="picture-emoji" class="emoji-art">🪟🚪</div>
            </div>

            <div class="w-full bg-gray-50 p-4 sm:p-6 rounded-xl sm:rounded-2xl flex flex-col items-center border-2 border-gray-200">
                <div id="hint-container" class="text-yellow-500 text-2xl sm:text-4xl mb-3 flex items-center gap-2.5">
                    💡 <span id="hint-text" class="tracking-[0.2em] text-blue-600 font-bold">ㅊㅁ</span>
                </div>
                
                <form id="answer-form" class="w-full max-w-sm sm:max-w-md flex flex-col gap-2.5 mt-3" onsubmit="submitAnswer(event)">
                    <div class="flex gap-2.5 w-full">
                        <input type="text" id="answer-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="정답 입력" 
                               class="w-full text-center text-xl sm:text-3xl py-3 sm:py-5 rounded-xl border-[3px] border-gray-300 bg-white text-gray-800 placeholder-gray-400 shadow-inner transition-transform">
                        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white text-xl sm:text-3xl px-6 sm:px-10 rounded-xl shadow-[0_5px_0_#16a34a] hover:shadow-[0_2px_0_#16a34a] hover:translate-y-1 transition-all whitespace-nowrap font-bold">
                            확인
                        </button>
                    </div>
                    <div id="wrong-message" class="text-red-500 text-center text-sm sm:text-lg font-bold h-5 sm:h-6 opacity-0 transition-opacity mt-1">
                        오답입니다! 다시 시도해 보세요.
                    </div>
                </form>

                <div class="flex gap-2.5 w-full mt-3 sm:mt-5 justify-center">
                    <button id="btn-item-time" onclick="useTimeItem()" type="button" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white text-sm sm:text-lg font-bold py-3 rounded-lg shadow-md border-b-[3px] border-purple-700 active:border-b-0 active:translate-y-1 transition-all">
                        ⏰ +10초 (남음: <span id="cnt-item-time">3</span>)
                    </button>
                    <button id="btn-item-hint" onclick="useHintItem()" type="button" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-sm sm:text-lg font-bold py-3 rounded-lg shadow-md border-b-[3px] border-orange-700 active:border-b-0 active:translate-y-1 transition-all">
                        🔍 한 글자 (남음: <span id="cnt-item-hint">3</span>)
                    </button>
                </div>
            </div>
        </div>
        
        <div class="w-full max-w-3xl mt-5 sm:mt-8 bg-white/50 rounded-full h-3 sm:h-5 shadow-inner overflow-hidden border border-white/60">
            <div id="progress-bar" class="bg-green-400 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- 결과 피드백 화면 -->
    <div id="feedback-screen" class="screen flex-col items-center max-w-3xl w-full">
        <div id="feedback-box" class="w-full bg-white rounded-3xl shadow-2xl p-8 sm:p-12 text-center border-[5px]">
            <div id="feedback-icon" class="text-7xl sm:text-8xl mb-3 sm:mb-5">⭕</div>
            <h2 id="feedback-title" class="text-4xl sm:text-5xl mb-3 sm:mb-5 font-bold">정답입니다!</h2>
            <div class="bg-gray-100 rounded-xl p-4 sm:p-6 mb-6 sm:mb-8">
                <p class="text-gray-600 mb-1.5 text-lg sm:text-xl">정답은</p>
                <p id="correct-answer-text" class="text-4xl sm:text-5xl text-blue-600 font-bold">-</p>
            </div>
            <button onclick="nextQuestion()" class="w-full bg-blue-500 text-white text-2xl sm:text-3xl py-4 sm:py-5 rounded-2xl shadow-[0_6px_0_#2563eb] hover:translate-y-1 transition-all font-bold">
                다음 문제 👉
            </button>
        </div>
    </div>

    <!-- 최종 결과 화면 -->
    <div id="result-screen" class="screen flex-col items-center max-w-3xl w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 text-center border-[5px] border-blue-400 overflow-hidden relative">
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>'); background-size: 60px;"></div>
        
        <h1 class="text-4xl sm:text-5xl text-blue-600 mb-5 z-10 relative font-bold">게임 종료!</h1>
        
        <div class="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-full py-3 sm:py-4 px-6 sm:px-10 mb-6 sm:mb-8 z-10 relative border-[3px] border-yellow-300 shadow-lg inline-block transform transition-transform hover:scale-105">
            <p id="rank-badge" class="text-2xl sm:text-3xl md:text-4xl mb-0 font-black drop-shadow-md whitespace-nowrap">👑 넌센스 마스터 👑</p>
        </div>
        
        <div class="grid grid-cols-2 gap-3 sm:gap-5 w-full mb-6 sm:mb-8 relative z-10">
            <div class="bg-gray-50 rounded-xl p-3 sm:p-5 border-2 border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="block text-gray-500 text-sm sm:text-lg mb-1.5">맞힌 문제</span>
                <span id="result-correct" class="font-bold text-blue-600 text-xl sm:text-2xl">0개</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 sm:p-5 border-2 border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="block text-gray-500 text-sm sm:text-lg mb-1.5">정답률</span>
                <span id="result-accuracy" class="font-bold text-green-600 text-xl sm:text-2xl">0%</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 sm:p-5 border-2 border-gray-200 shadow-sm col-span-2 flex flex-col justify-center">
                <span class="block text-gray-500 text-sm sm:text-lg mb-1.5">걸린 소요시간</span>
                <span id="result-time" class="font-bold text-purple-600 text-xl sm:text-2xl">0초</span>
            </div>
        </div>
        
        <div class="bg-yellow-100 rounded-2xl w-full p-5 sm:p-7 mb-6 sm:mb-8 border-[5px] border-yellow-400 z-10 relative shadow-inner">
            <p class="text-gray-600 mb-1.5 font-bold text-lg sm:text-xl">최종 점수</p>
            <div class="flex items-center justify-center">
                <span class="text-5xl sm:text-6xl text-yellow-600 font-black" id="final-score">0</span>
                <span class="text-xl sm:text-2xl text-yellow-700 font-bold mt-1.5 sm:mt-3 ml-1.5">점</span>
            </div>
        </div>

        <button onclick="initGame()" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl sm:text-3xl py-4 sm:py-5 rounded-2xl shadow-[0_6px_0_#16a34a] hover:shadow-[0_2px_0_#16a34a] hover:translate-y-1 transition-all z-10 relative font-bold">
            다시 하기 🔄
        </button>
    </div>

    <script>
        const originalQuizData = [
            // 🎈 난이도 하 (5개)
            { emojis: '💧🐶', hint: 'ㅁㄱ', answer: '물개', difficulty: '하' }, 
            { emojis: '👁️🦷', hint: 'ㄴㅊ', answer: '눈치', difficulty: '하' }, 
            { emojis: '🔥🌺', hint: 'ㅂㄲ', answer: '불꽃', difficulty: '하' }, 
            { emojis: '🥇🥄', hint: 'ㄱㅅㅈ', answer: '금수저', difficulty: '하' }, 
            { emojis: '🩸📏', hint: 'ㅍㅈ', answer: '피자', difficulty: '하' }, 
            
            // 🤣 난이도 중 (10개)
            { emojis: '🎋🐶', hint: 'ㄷㄱ', answer: '대게', difficulty: '중' }, 
            { emojis: '💥🐟🍞', hint: 'ㅂㅇㅃ', answer: '붕어빵', difficulty: '중' }, 
            { emojis: '💧👏', hint: 'ㅅㅂ', answer: '수박', difficulty: '중' }, 
            { emojis: '🍊📏', hint: 'ㄱㅈ', answer: '감자', difficulty: '중' }, 
            { emojis: '🕰️🚗', hint: 'ㅅㄱㅊ', answer: '시간차', difficulty: '중' }, 
            { emojis: '🐯👏', hint: 'ㅎㅂ', answer: '호박', difficulty: '중' }, 
            { emojis: '✅🛢️', hint: 'ㅊㄱㄹ', answer: '참기름', difficulty: '중' }, 
            { emojis: '🔵👖', hint: 'ㅊㅂㅈ', answer: '청바지', difficulty: '중' }, 
            { emojis: '4️⃣🔥', hint: 'ㅅㅍㅇㅇ', answer: '사파이어', difficulty: '중' },
            { emojis: '🩸🚗🐄', hint: 'ㅍㅋㅅ', answer: '피카소', difficulty: '중' }, 

            // 🤯 난이도 상 (5개)
            { emojis: '🐦🚗', hint: 'ㅅㅊ', answer: '세차', difficulty: '상' }, 
            { emojis: '🧅💍', hint: 'ㅇㅍㄹ', answer: '양파링', difficulty: '상' }, 
            { emojis: '☀️😭', hint: 'ㅎㅇㄷ', answer: '해운대', difficulty: '상' },
            { emojis: '🍎⌚', hint: 'ㅇㅍㅇㅊ', answer: '애플워치', difficulty: '상' }, 
            { emojis: '🌲👁️', hint: 'ㅅㅇㄴ', answer: '솔의눈', difficulty: '상' }  
        ];

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let currentCombo = 0;
        let timeLeft = 30;
        let timerInterval;
        let correctAnswersCount = 0;
        let gameStartTime = 0;
        let useHint = true;
        let isFeverMode = false;
        let isGoldenQuestion = false;
        let goldenIndices = []; 

        let timeItemCount = 3;
        let hintItemCount = 3;
        let revealedLetters = []; 

        let bestScore = localStorage.getItem('catchmindBestScore') || 0;
        document.getElementById('best-score-display').innerText = bestScore;

        const sounds = {
            correct: null,
            wrong: null,
            tick: null,
            init: function() {
                if (!this.correct) {
                    this.correct = new Tone.PolySynth(Tone.Synth).toDestination();
                    this.wrong = new Tone.Synth().toDestination();
                    this.tick = new Tone.MembraneSynth().toDestination();
                    this.correct.volume.value = -5;
                    this.wrong.volume.value = -5;
                    this.tick.volume.value = -10;
                }
            },
            playCorrect: function() {
                if(Tone.context.state !== 'running') Tone.context.resume();
                this.correct.triggerAttackRelease(["C5", "E5", "G5", "C6"], "8n");
            },
            playWrong: function() {
                if(Tone.context.state !== 'running') Tone.context.resume();
                this.wrong.triggerAttackRelease("C3", "16n");
            },
            playTick: function() {
                if(Tone.context.state !== 'running') Tone.context.resume();
                this.tick.triggerAttackRelease("C2", "32n");
            }
        };

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            feedback: document.getElementById('feedback-screen'),
            result: document.getElementById('result-screen')
        };

        const elements = {
            questionNumber: document.getElementById('question-number'),
            difficultyBadge: document.getElementById('difficulty-badge'),
            goldenBadge: document.getElementById('golden-badge'),
            scoreDisplay: document.getElementById('score-display'),
            comboDisplay: document.getElementById('combo-display'),
            timer: document.getElementById('timer'),
            pictureEmoji: document.getElementById('picture-emoji'),
            hintContainer: document.getElementById('hint-container'),
            hintText: document.getElementById('hint-text'),
            answerInput: document.getElementById('answer-input'),
            wrongMessage: document.getElementById('wrong-message'),
            progressBar: document.getElementById('progress-bar'),
            feedbackBox: document.getElementById('feedback-box'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackTitle: document.getElementById('feedback-title'),
            correctAnswerText: document.getElementById('correct-answer-text'),
            finalScore: document.getElementById('final-score'),
            rankBadge: document.getElementById('rank-badge'),
            resultCorrect: document.getElementById('result-correct'),
            resultAccuracy: document.getElementById('result-accuracy'),
            resultTime: document.getElementById('result-time'),
            useHintCheckbox: document.getElementById('use-hint-checkbox'),
            gameContainer: document.getElementById('game-container')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                zIndex: 9999
            });
        }

        function updateScoreBoard() {
            elements.scoreDisplay.innerText = score;
            
            if (currentCombo >= 3) {
                isFeverMode = true;
                elements.gameContainer.classList.add('fever-mode');
                elements.comboDisplay.innerText = `${currentCombo} COMBO! 🔥 피버 타임!`;
                elements.comboDisplay.classList.remove('opacity-0');
                elements.comboDisplay.classList.add('opacity-100', 'combo-text');
                void elements.comboDisplay.offsetWidth; 
            } else {
                isFeverMode = false;
                elements.gameContainer.classList.remove('fever-mode');
                if (currentCombo > 0) {
                    elements.comboDisplay.innerText = `${currentCombo} COMBO!`;
                    elements.comboDisplay.classList.remove('opacity-0', 'text-red-500');
                    elements.comboDisplay.classList.add('opacity-100', 'text-orange-500');
                } else {
                    elements.comboDisplay.innerText = '';
                    elements.comboDisplay.classList.remove('opacity-100');
                    elements.comboDisplay.classList.add('opacity-0');
                }
            }
        }

        async function startGame() {
            await Tone.start();
            sounds.init();

            document.body.classList.remove('golden-bg');

            quizData = shuffleArray(originalQuizData);
            
            let tempIndices = [];
            for(let i=0; i<quizData.length; i++) tempIndices.push(i);
            goldenIndices = shuffleArray(tempIndices).slice(0, 3);

            score = 0;
            currentCombo = 0;
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            gameStartTime = Date.now();
            useHint = elements.useHintCheckbox.checked;
            
            timeItemCount = 3;
            hintItemCount = 3;
            document.getElementById('cnt-item-time').innerText = timeItemCount;
            document.getElementById('cnt-item-hint').innerText = hintItemCount;
            document.getElementById('btn-item-time').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-item-hint').classList.remove('opacity-50', 'cursor-not-allowed');

            loadQuestion();
            showScreen('game');
        }

        function loadQuestion() {
            const q = quizData[currentQuestionIndex];
            revealedLetters = []; 
            
            isGoldenQuestion = goldenIndices.includes(currentQuestionIndex);

            elements.questionNumber.innerText = currentQuestionIndex + 1;
            elements.difficultyBadge.innerText = `난이도: ${q.difficulty}`;
            
            elements.difficultyBadge.className = 'sm:ml-3 text-xs sm:text-sm md:text-lg px-2.5 py-1 rounded-full text-white font-bold shadow-sm border-2 border-white/50 whitespace-nowrap mt-1 sm:mt-0';
            if (q.difficulty === '하') elements.difficultyBadge.classList.add('bg-green-500');
            else if (q.difficulty === '중') elements.difficultyBadge.classList.add('bg-orange-500');
            else if (q.difficulty === '상') elements.difficultyBadge.classList.add('bg-red-500');

            // 🌟 황금 문제 시 화면 전체 배경 변경
            if(isGoldenQuestion) {
                document.body.classList.add('golden-bg');
                elements.goldenBadge.classList.remove('hidden');
                elements.goldenBadge.classList.add('inline-block');
                elements.gameContainer.classList.add('golden-mode');
            } else {
                document.body.classList.remove('golden-bg');
                elements.goldenBadge.classList.add('hidden');
                elements.goldenBadge.classList.remove('inline-block');
                elements.gameContainer.classList.remove('golden-mode');
            }

            elements.pictureEmoji.innerText = q.emojis;
            
            renderHintText(); 

            elements.answerInput.value = '';
            elements.answerInput.classList.remove('animate-shake');
            elements.wrongMessage.style.opacity = '0';
            elements.answerInput.focus();
            
            updateScoreBoard();
            
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            elements.progressBar.style.width = `${progress}%`;

            resetTimer(isGoldenQuestion ? 15 : 30);
        }

        function renderHintText() {
            const q = quizData[currentQuestionIndex];
            let displayText = '';
            
            for(let i=0; i<q.answer.length; i++) {
                if(revealedLetters.includes(i)) {
                    displayText += q.answer[i]; 
                } else {
                    displayText += useHint ? q.hint[i] : '◯';
                }
            }
            
            elements.hintText.innerText = displayText;
            elements.hintText.className = useHint && revealedLetters.length === 0 ? 'tracking-[0.2em] text-blue-600 font-bold' : 'hint-circle font-bold';
            if(revealedLetters.length > 0) elements.hintText.classList.add('text-orange-500');
        }

        function useTimeItem() {
            if(timeItemCount > 0) {
                timeItemCount--;
                timeLeft += 10;
                elements.timer.innerText = timeLeft;
                
                if(timeLeft > 5) {
                    elements.timer.classList.remove('timer-warning');
                    elements.gameContainer.classList.remove('tension-pulse');
                }
                
                document.getElementById('cnt-item-time').innerText = timeItemCount;
                if(timeItemCount === 0) document.getElementById('btn-item-time').classList.add('opacity-50', 'cursor-not-allowed');
                elements.answerInput.focus();
            }
        }

        function useHintItem() {
            if(hintItemCount > 0) {
                const q = quizData[currentQuestionIndex];
                let unrevealed = [];
                for(let i=0; i<q.answer.length; i++) {
                    if(!revealedLetters.includes(i)) unrevealed.push(i);
                }
                
                if(unrevealed.length > 0) {
                    revealedLetters.push(unrevealed[0]);
                    hintItemCount--;
                    document.getElementById('cnt-item-hint').innerText = hintItemCount;
                    
                    if(hintItemCount === 0) document.getElementById('btn-item-hint').classList.add('opacity-50', 'cursor-not-allowed');
                    renderHintText();
                }
                elements.answerInput.focus();
            }
        }

        function resetTimer(limit) {
            clearInterval(timerInterval);
            timeLeft = limit;
            elements.timer.innerText = timeLeft;
            elements.timer.classList.remove('timer-warning');
            elements.gameContainer.classList.remove('tension-pulse'); 

            timerInterval = setInterval(() => {
                timeLeft--;
                elements.timer.innerText = timeLeft;

                if (timeLeft <= 5 && timeLeft > 0) {
                    elements.timer.classList.add('timer-warning');
                    elements.gameContainer.classList.add('tension-pulse');
                    sounds.playTick(); 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    elements.gameContainer.classList.remove('tension-pulse');
                    currentCombo = 0;
                    updateScoreBoard();
                    processAnswer(false, true);
                }
            }, 1000);
        }

        function submitAnswer(event) {
            event.preventDefault();
            if(elements.answerInput.value.trim() === '') return;
            
            const userAnswer = elements.answerInput.value.trim().replace(/\s/g, "");
            const correctAnswer = quizData[currentQuestionIndex].answer.replace(/\s/g, "");
            
            if (userAnswer === correctAnswer) {
                sounds.playCorrect();
                correctAnswersCount++;
                clearInterval(timerInterval);
                elements.gameContainer.classList.remove('tension-pulse'); 
                
                currentCombo++;
                
                let earnedPoints = isGoldenQuestion ? 200 : 100;
                if (isFeverMode) earnedPoints += 50; 
                if (currentCombo >= 3) earnedPoints += 100;
                
                score += earnedPoints;
                updateScoreBoard();
                fireConfetti(); 
                
                processAnswer(true, false);
            } else {
                sounds.playWrong();
                currentCombo = 0;
                updateScoreBoard();
                
                elements.answerInput.classList.remove('animate-shake');
                void elements.answerInput.offsetWidth; 
                elements.answerInput.classList.add('animate-shake');
                
                elements.answerInput.value = '';
                elements.answerInput.focus();
                
                elements.wrongMessage.style.opacity = '1';
                setTimeout(() => { elements.wrongMessage.style.opacity = '0'; }, 1500);
            }
        }

        function processAnswer(isCorrect, isTimeout) {
            document.body.classList.remove('golden-bg'); // 피드백 화면에서 눈부심 방지
            
            const q = quizData[currentQuestionIndex];
            elements.correctAnswerText.innerText = q.answer;

            if (isCorrect) {
                elements.feedbackIcon.innerText = '⭕';
                elements.feedbackTitle.innerText = '정답입니다!';
                elements.feedbackTitle.className = 'text-4xl sm:text-5xl mb-3 sm:mb-5 text-green-500 font-bold';
                elements.feedbackBox.className = 'w-full bg-white rounded-3xl shadow-2xl p-8 sm:p-12 text-center border-[5px] border-green-400';
            } else {
                elements.feedbackIcon.innerText = isTimeout ? '⏰' : '❌';
                elements.feedbackTitle.innerText = isTimeout ? '시간 초과!' : '아쉽네요, 땡!';
                elements.feedbackTitle.className = 'text-4xl sm:text-5xl mb-3 sm:mb-5 text-red-500 font-bold';
                elements.feedbackBox.className = 'w-full bg-white rounded-3xl shadow-2xl p-8 sm:p-12 text-center border-[5px] border-red-400';
            }

            showScreen('feedback');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
                showScreen('game');
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            elements.finalScore.innerText = score;
            
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('catchmindBestScore', bestScore);
                document.getElementById('best-score-display').innerText = bestScore;
            }
            
            const timeTakenSec = Math.floor((Date.now() - gameStartTime) / 1000);
            const minutes = Math.floor(timeTakenSec / 60);
            const seconds = timeTakenSec % 60;
            const timeString = minutes > 0 ? `${minutes}분 ${seconds}초` : `${seconds}초`;
            
            const totalQuestions = quizData.length;
            const accuracy = Math.round((correctAnswersCount / totalQuestions) * 100);
            
            elements.resultCorrect.innerText = `${correctAnswersCount}개 / ${totalQuestions}문제`;
            elements.resultAccuracy.innerText = `${accuracy}%`;
            elements.resultTime.innerText = timeString;

            let rankName = "";
            let rankColor = "";
            
            if (correctAnswersCount >= 18) {
                rankName = "👑 넌센스 마스터 👑";
                rankColor = "text-pink-600";
                setTimeout(fireConfetti, 500);
                setTimeout(fireConfetti, 1000);
            } else if (correctAnswersCount >= 13) {
                rankName = "🌟 센스쟁이 기대주 🌟";
                rankColor = "text-blue-600";
                setTimeout(fireConfetti, 500);
            } else if (correctAnswersCount >= 8) {
                rankName = "👍 노력파 넌센서 👍";
                rankColor = "text-green-600";
            } else {
                rankName = "🌱 넌센스 새싹 🌱";
                rankColor = "text-orange-600";
            }
            
            elements.rankBadge.className = `text-2xl sm:text-3xl md:text-4xl mb-0 font-black drop-shadow-md combo-text whitespace-nowrap ${rankColor}`;
            elements.rankBadge.innerText = rankName;
            
            showScreen('result');
        }

        function initGame() {
            document.body.classList.remove('golden-bg');
            showScreen('start');
        }

        initGame();
    </script>
</body>
</html>
