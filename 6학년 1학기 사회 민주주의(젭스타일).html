<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>민주주의 어드벤처: 4개의 세계</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        /* ========================================= */
        /* [CSS 스타일] UI 디자인 및 애니메이션 */
        /* ========================================= */
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --accent: #e74c3c;
            --ui-bg: rgba(255, 255, 255, 0.98);
            --text-main: #2c3e50;
            --shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Jua', sans-serif;
            overflow: hidden; background-color: #000;
            user-select: none; -webkit-user-select: none;
        }

        #gameCanvas { display: block; width: 100%; height: 100%; }
        #game-screen { width: 100%; height: 100%; position: relative; overflow: hidden; background: #34495e; transition: background 1s; }

        /* 상단 상태창 */
        #status-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.75); color: white;
            padding: 12px 20px; border-radius: 20px;
            box-shadow: var(--shadow); z-index: 10; border: 2px solid rgba(255,255,255,0.2);
        }
        
        .stat-section { display: flex; align-items: center; font-size: 1.2rem; }
        .stat-center { flex-grow: 1; justify-content: center; gap: 20px; }
        .stat-group { display: flex; align-items: center; gap: 8px; }

        #hp-container {
            width: 130px; height: 20px; background: #333;
            border-radius: 10px; border: 2px solid #fff; overflow: hidden;
            position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        #hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff7675, #e74c3c); transition: width 0.3s ease, background 0.3s; }
        #hp-text { position: absolute; width: 100%; text-align: center; font-size: 0.85rem; top: 1px; color: white; font-family: 'Poppins', sans-serif; }

        @media (max-width: 650px) {
            #status-bar { flex-wrap: wrap; gap: 10px; justify-content: center; }
            .stat-center { width: 100%; order: 3; }
        }

        /* 가상 조이스틱 */
        #joystick-zone {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15); border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; z-index: 10; touch-action: none; backdrop-filter: blur(5px);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); pointer-events: none; border: 2px solid #333;
        }

        /* 퀴즈 모달창 */
        #quiz-modal {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 650px; background: var(--ui-bg);
            padding: 30px; border-radius: 25px; border: 5px solid var(--text-main);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 30; display: none; text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        #quiz-modal.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        #q-header { font-size: 1.3rem; color: #8e44ad; margin-bottom: 10px; }
        #q-text { font-size: 1.6rem; color: var(--text-main); margin-bottom: 25px; word-break: keep-all; line-height: 1.4; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 500px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        
        .opt-btn {
            background: white; border: 3px solid var(--text-main); border-radius: 15px;
            padding: 15px 10px 15px 40px; font-size: 1.2rem; font-family: 'Jua', sans-serif;
            cursor: pointer; box-shadow: 0 5px 0 var(--text-main); color: var(--text-main);
            position: relative; text-align: center; transition: 0.1s;
        }
        .opt-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--text-main); }
        .opt-btn::before {
            content: attr(data-index); position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 24px; height: 24px; background: var(--text-main); color: white; border-radius: 50%;
            font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }

        /* 피드백 화면 및 해설창 */
        #feedback-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 40; backdrop-filter: blur(8px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 30px; box-sizing: border-box;
        }
        #fb-icon { font-size: 7rem; margin: 0; animation: popIn 0.5s both; }
        #fb-title { font-size: 2.8rem; margin: 15px 0; }
        
        /* [핵심 변경] 문제 풀이 해설창 스타일 */
        .explanation-box {
            background: rgba(255, 255, 255, 0.95); color: #333; padding: 20px; border-radius: 15px;
            max-width: 500px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #f1c40f; text-align: left;
        }
        .explanation-box h4 { margin: 0 0 10px 0; color: #d35400; font-size: 1.4rem; text-align: center; }
        .explanation-box p { margin: 0; font-size: 1.3rem; line-height: 1.5; word-break: keep-all; }
        
        .action-btn {
            background: var(--primary); color: white; border: 4px solid var(--text-main);
            padding: 15px 40px; font-size: 1.8rem; border-radius: 20px;
            cursor: pointer; font-family: 'Jua', sans-serif; box-shadow: 0 6px 0 var(--text-main); transition: 0.1s; margin: 10px;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--text-main); }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
        @keyframes flashRed { 0% { background: rgba(231, 76, 60, 0); } 50% { background: rgba(231, 76, 60, 0.4); } 100% { background: rgba(231, 76, 60, 0); } }
        .effect-shake { animation: shake 0.15s; animation-iteration-count: 3; }
        .effect-flash { animation: flashRed 0.25s; animation-iteration-count: 2; }

        /* 시작화면, 캐릭터 및 난이도 선택 */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1abc9c, #2980b9); z-index: 50;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; color: white;
            overflow-y: auto; padding: 40px 0;
        }

        .neon-title {
            font-size: 5.85rem; color: #fff; text-align: center; margin-bottom: 20px; line-height: 1.3;
            animation: neon-rainbow-soft 8s linear infinite; font-weight: bold; margin-top: 20px;
        }
        .neon-subtitle { font-size: 3.64rem; font-weight: normal; display: block; margin-top: 10px; }
        
        @keyframes neon-rainbow-soft {
            0% { text-shadow: 0 0 15px #fff, 0 0 30px #ff7675, 0 0 50px #ff7675, 0 0 70px #ff7675; } 
            25% { text-shadow: 0 0 15px #fff, 0 0 30px #55efc4, 0 0 50px #55efc4, 0 0 70px #55efc4; } 
            50% { text-shadow: 0 0 15px #fff, 0 0 30px #74b9ff, 0 0 50px #74b9ff, 0 0 70px #74b9ff; } 
            75% { text-shadow: 0 0 15px #fff, 0 0 30px #a29bfe, 0 0 50px #a29bfe, 0 0 70px #a29bfe; } 
            100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff7675, 0 0 50px #ff7675, 0 0 70px #ff7675; }
        }

        #start-logo { font-size: 6rem; margin-bottom: 10px; animation: float 3s infinite ease-in-out; }
        
        #nickname-input {
            font-size: 1.5rem; padding: 12px; border-radius: 12px; border: 3px solid #fff;
            text-align: center; width: 80%; max-width: 300px; font-family: 'Jua'; margin-bottom: 20px; outline: none; color: #333;
        }
        
        .selection-box {
            background: rgba(255,255,255,0.2); border-radius: 15px; padding: 20px;
            width: 95%; max-width: 750px; margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.5);
        }
        .selection-box h3 { margin: 0 0 15px 0; text-align: center; font-size: 1.4rem; text-shadow: 1px 1px 2px #000; }
        
        /* 난이도 선택 버튼 */
        .diff-btn-group { display: flex; justify-content: center; gap: 15px; }
        .diff-btn {
            background: rgba(0,0,0,0.4); padding: 15px 25px; border-radius: 15px; font-size: 1.4rem;
            cursor: pointer; border: 3px solid transparent; transition: 0.2s;
        }
        .diff-btn.selected { background: #f39c12; border: 3px solid #fff; transform: scale(1.05); box-shadow: 0 0 15px #f39c12; }

        #emoji-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; padding: 5px; }
        
        @media (max-width: 650px) {
            #emoji-grid { grid-template-columns: repeat(8, 1fr); gap: 5px; }
            .emoji-item { font-size: 1.6rem; }
            .neon-title { font-size: 3.9rem; } 
            .neon-subtitle { font-size: 2.6rem; } 
            .diff-btn { padding: 10px 15px; font-size: 1.2rem; }
        }
        @media (max-width: 400px) {
            #emoji-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
        }
        
        .emoji-item {
            font-size: 2.2rem; cursor: pointer; transition: 0.2s; text-align: center;
            padding: 5px; border-radius: 10px; background: rgba(0,0,0,0.2);
        }
        .emoji-item:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
        .emoji-item.selected { background: #f1c40f; transform: scale(1.15); box-shadow: 0 0 10px #f1c40f; border: 3px solid #fff; }
        
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 40px;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="start-screen">
            <div id="start-logo">🌍✨</div>
            <h1 class="neon-title">
                민주주의 어드벤처<br>
                <span class="neon-subtitle">4개의 세계를 통과해라!</span>
            </h1>
            
            <input type="text" id="nickname-input" placeholder="여기에 닉네임을 입력하세요!" maxlength="8">

            <div class="selection-box">
                <h3>👇 문제 난이도를 선택하세요 👇</h3>
                <div class="diff-btn-group">
                    <div class="diff-btn selected" onclick="selectDifficulty('basic', this)">🌱 기초 (기본 개념)</div>
                    <div class="diff-btn" onclick="selectDifficulty('advanced', this)">🔥 심화 (사례·응용)</div>
                </div>
            </div>

            <div class="selection-box">
                <h3>👇 내 캐릭터를 선택하세요 👇</h3>
                <div id="emoji-grid">
                    </div>
            </div>
            
            <div class="btn-group">
                <button class="action-btn" onclick="startGame()">탐험 시작!</button>
            </div>
        </div>

        <div id="status-bar">
            <div class="stat-section"><div>🗺️ <span id="map-text">맵 1 / 4</span></div></div>
            <div class="stat-section stat-center">
                <div class="stat-group">
                    <span style="font-size: 1.5rem;">❤️</span>
                    <div id="hp-container"><div id="hp-bar"></div><div id="hp-text">100 / 100</div></div>
                </div>
                <div class="stat-group">
                    <span style="font-size: 1.5rem;">🪙</span>
                    <div style="font-weight: bold;"><span id="score-text">0</span>점</div>
                </div>
            </div>
            <div class="stat-section"><div>🏆 <span id="cleared-text">0 / 5</span></div></div>
        </div>

        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <canvas id="gameCanvas"></canvas>

        <div id="quiz-modal">
            <div id="q-header">❓ 문제 풀이</div>
            <div id="q-text">여기에 문제가 표시됩니다.</div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="feedback-overlay">
            <h1 id="fb-icon">O</h1>
            <h2 id="fb-title">정답입니다!</h2>
            <div id="fb-desc"></div>
            <button class="action-btn" id="fb-btn" onclick="closeFeedback()">계속하기</button>
        </div>
    </div>

<script>
    // ================= :[기초 난이도 문제 데이터 (20문제)] =================
    const questionsBasic = [
        // 맵 1
        { q: "모든 국민이 나라의 주인으로서 권리를 가지는 정치 제도는?", options: ["공산주의", "민주주의", "독재주의", "왕정주의"], answerIndex: 1, explanation: "민주주의는 국민에게 주권이 있는 제도입니다." },
        { q: "다음 중 민주주의 사회에서 갈등을 해결하는 올바른 방법은?", options: ["힘으로 제압한다", "대화와 타협", "상대방 무시", "가짜 뉴스 퍼뜨리기"], answerIndex: 1, explanation: "대화와 타협을 통해 평화롭게 갈등을 해결해야 합니다." },
        { q: "민주주의의 꽃이라고 불리며, 국민의 뜻을 전달하는 가장 기본적인 참여 방법은?", options: ["선거(투표)", "세금 납부", "시위 참여", "댓글 달기"], answerIndex: 0, explanation: "선거는 국민의 뜻을 정치에 반영하는 가장 기본적이고 중요한 권리입니다." },
        { q: "사람들은 모두 다르게 생각할 수 있습니다. 나와 다른 생각을 어떻게 대해야 할까요?", options: ["틀렸다고 비난한다", "무시한다", "존중하고 이해한다", "싸워서 이긴다"], answerIndex: 2, explanation: "나와 다른 의견도 존중하는 '관용'의 태도가 필요합니다." },
        { q: "회의에서 의견이 모아지지 않을 때, 효율적으로 결정하기 위해 따르는 원칙은?", options: ["소수 의견 존중", "양보와 타협", "만장일치", "다수결의 원칙"], answerIndex: 3, explanation: "결정이 어려울 때는 다수결의 원칙을 따릅니다. 단, 소수의 의견도 경청해야 해요." },
        // 맵 2
        { q: "누구나 나이가 되면 조건 없이 똑같이 투표권을 가지는 선거 원칙은?", options: ["평등선거", "대리선거", "보통선거", "비밀선거"], answerIndex: 2, explanation: "일정 연령 이상의 모든 국민에게 선거권을 주는 것을 '보통 선거'라고 합니다." },
        { q: "재산, 성별, 학력에 관계없이 누구나 공평하게 '1표씩' 행사하는 원칙은?", options: ["평등선거", "직접선거", "보통선거", "비밀선거"], answerIndex: 0, explanation: "부자든 가난하든 모두 똑같이 한 표의 가치를 가지는 것이 '평등 선거'입니다." },
        { q: "자신이 누구에게 투표했는지 다른 사람이 알지 못하게 하는 원칙은?", options: ["보통선거", "직접선거", "평등선거", "비밀선거"], answerIndex: 3, explanation: "자유로운 선택을 보장하기 위해 '비밀 선거' 원칙을 지킵니다." },
        { q: "민주주의 국가에서 시민들이 정치에 참여하는 방법이 아닌 것은?", options: ["시민 단체 활동", "선거에 출마하기", "서명 운동", "불법 폭력 시위"], answerIndex: 3, explanation: "정치 참여는 반드시 법과 규칙을 지키는 평화적인 방법으로 이루어져야 합니다." },
        { q: "우리 지역의 문제를 해결하기 위해 주민들이 스스로 대표를 뽑아 다스리는 제도는?", options: ["지방 자치 제도", "삼권 분립", "의원 내각제", "중앙 집권제"], answerIndex: 0, explanation: "주민들이 지역의 일을 스스로 결정하고 처리하는 제도를 지방 자치라고 합니다." },
        // 맵 3
        { q: "국민의 뜻을 반영하여 법을 만드는 국가 기관은 어디인가요?", options: ["법원", "정부", "국회", "경찰청"], answerIndex: 2, explanation: "국회는 국민의 대표들이 모여 법을 만드는 입법부입니다." },
        { q: "국회에서 만든 법을 바탕으로, 나라 살림을 맡아하는 기관은?", options: ["국회", "정부", "법원", "헌법재판소"], answerIndex: 1, explanation: "대통령과 장관들이 모여 실제로 나라 살림을 운영하는 곳이 정부(행정부)입니다." },
        { q: "사람들 사이에 다툼이 생겼을 때, 법에 따라 공정하게 재판하는 기관은?", options: ["법원", "정부", "국회", "주민센터"], answerIndex: 0, explanation: "법원(사법부)은 법을 해석하고 적용하여 재판을 하는 곳입니다." },
        { q: "국가 권력을 국회, 정부, 법원 세 곳으로 나누어 맡는 제도를 무엇이라고 하나요?", options: ["지방 자치", "다수결", "삼권 분립", "정당 정치"], answerIndex: 2, explanation: "한 기관이 권력이 남용되지 못하도록 나누는 제도가 삼권 분립입니다." },
        { q: "삼권 분립을 하는 가장 큰 이유는 무엇인가요?", options: ["재판을 빨리 하려고", "국민의 자유와 권리 보호", "세금을 덜 내려고", "투표를 쉽게 하려고"], answerIndex: 1, explanation: "권력이 한 곳에 집중되는 것을 막아, 국민의 자유와 권리 보호를 위함입니다." },
        // 맵 4

        let dx = touch.clientX - joyCenter.x; let dy = touch.clientY - joyCenter.y;
        let distance = Math.sqrt(dx*dx + dy*dy); const maxDist = 45;
        if(distance > maxDist) { dx = (dx / distance) * maxDist; dy = (dy / distance) * maxDist; }
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joyVector.x = distance > 0 ? dx / maxDist : 0; joyVector.y = distance > 0 ? dy / maxDist : 0;
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    function update() {
        if(gameState !== 'PLAYING') return;

        player.vx = 0; player.vy = 0;
        if(keys['ArrowUp'] || keys['w']) player.vy = -1; if(keys['ArrowDown'] || keys['s']) player.vy = 1;
        if(keys['ArrowLeft'] || keys['a']) player.vx = -1; if(keys['ArrowRight'] || keys['d']) player.vx = 1;
        if(joyActive) { player.vx = joyVector.x; player.vy = joyVector.y; }

        const length = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
        let nextX = player.x; let nextY = player.y;
        if(length > 0) { nextX += (player.vx / length) * player.speed; nextY += (player.vy / length) * player.speed; }

        let canMoveX = true; let canMoveY = true;
        for(let obs of obstacles) {
            if(Math.sqrt(Math.pow(nextX - obs.x, 2) + Math.pow(player.y - obs.y, 2)) < player.radius + obs.radius) canMoveX = false;
            if(Math.sqrt(Math.pow(player.x - obs.x, 2) + Math.pow(nextY - obs.y, 2)) < player.radius + obs.radius) canMoveY = false;
        }

        if(canMoveX) player.x = Math.max(player.radius, Math.min(worldWidth - player.radius, nextX));
        if(canMoveY) player.y = Math.max(player.radius, Math.min(worldHeight - player.radius, nextY));

        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        for(let mon of monsters) {
            mon.x += mon.vx * mon.speed; mon.y += mon.vy * mon.speed;
            if(mon.x < mon.radius || mon.x > worldWidth - mon.radius) mon.vx *= -1;
            if(mon.y < mon.radius || mon.y > worldHeight - mon.radius) mon.vy *= -1;

            if(!player.invincible && gameState === 'PLAYING') {
                let dist = Math.sqrt(Math.pow(player.x - mon.x, 2) + Math.pow(player.y - mon.y, 2));
                if(dist < player.radius + mon.radius) {
                    triggerHurtEffect(hpPerMonster);
                }
            }
        }

        for(let coin of coins) {
            if(!coin.active) continue;
            let dist = Math.sqrt(Math.pow(player.x - coin.x, 2) + Math.pow(player.y - coin.y, 2));
            if(dist < player.radius + coin.radius) {
                coin.active = false;
                let earned = Math.floor(Math.random() * 201) + 100; 
                score += earned;
                floatTexts.push({ x: coin.x, y: coin.y, text: `+${earned}`, life: 40, color: '#f1c40f' }); 
                updateUI();
            }
        }

        floatTexts.forEach(ft => { ft.y -= 1.5; ft.life--; });
        floatTexts = floatTexts.filter(ft => ft.life > 0);

        for(let npc of npcs) {
            if(!npc.active) continue;
            let dist = Math.sqrt(Math.pow(player.x - npc.x, 2) + Math.pow(player.y - npc.y, 2));
            
            if (dist < player.radius + npc.radius + 100) {
                if (!keySoundJinglePlayed.has(npc.id)) { playKeyJingle(); keySoundJinglePlayed.add(npc.id); }
                npc.nearPlayer = true; 
            } else {
                npc.nearPlayer = false; 
            }

            if(dist < player.radius + npc.radius + 10) { startQuiz(npc.id); break; }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0; 

        ctx.save(); ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = currentTheme.floor; 
        ctx.fillRect(0, 0, worldWidth, worldHeight);
        ctx.strokeStyle = currentTheme.lines; ctx.lineWidth = 2;
        for(let i=0; i<=worldWidth; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, worldHeight); ctx.stroke(); }
        for(let i=0; i<=worldHeight; i+=100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(worldWidth, i); ctx.stroke(); }
        ctx.strokeStyle = currentTheme.border; ctx.lineWidth = 20; ctx.strokeRect(0, 0, worldWidth, worldHeight);

        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        for(let obs of obstacles) {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
            ctx.beginPath(); ctx.ellipse(obs.x, obs.y + 15, 12, 6, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000000'; 
            ctx.font = (obs.radius * 1.5) + 'px Arial'; 
            ctx.fillText(obs.emoji, obs.x, obs.y);
        }

        let coinBounce = Math.sin(Date.now() / 150) * 6;
        coins.forEach(coin => {
            if(coin.active) {
                ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
                ctx.beginPath(); ctx.ellipse(coin.x, coin.y + 15, 10, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.font = '35px Arial';
                ctx.fillText(coin.emoji, coin.x, coin.y + coinBounce);
            }
        });

        let bounce = Math.sin(Date.now() / 200) * 8; 
        npcs.forEach(npc => {
            if(!npc.active) return;
            
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; 
            ctx.beginPath(); ctx.ellipse(npc.x, npc.y + 30, 20, 8, 0, 0, Math.PI*2); ctx.fill();

            ctx.save();
            const auraGrad = ctx.createRadialGradient(npc.x, npc.y + bounce, npc.radius * 0.2, npc.x, npc.y + bounce, npc.radius * 2.2);
            auraGrad.addColorStop(0, 'rgba(255, 235, 59, 0.7)'); 
            auraGrad.addColorStop(0.5, 'rgba(255, 152, 0, 0.3)'); 
            auraGrad.addColorStop(1, 'rgba(255, 152, 0, 0)'); 
            ctx.fillStyle = auraGrad;
            ctx.beginPath(); ctx.arc(npc.x, npc.y + bounce, npc.radius * 2.2, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            if (npc.nearPlayer) {
                ctx.font = 'bold 24px Jua';
                ctx.lineWidth = 4; ctx.strokeStyle = '#333';
                ctx.strokeText("💡문제 풀기!", npc.x, npc.y + bounce - 65);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText("💡문제 풀기!", npc.x, npc.y + bounce - 65);
            }

            ctx.fillStyle = '#000000'; 
            ctx.font = '55px Arial'; 
            ctx.fillText(npc.emoji, npc.x, npc.y + bounce);
        });

        monsters.forEach(mon => {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
            ctx.beginPath(); ctx.ellipse(mon.x, mon.y + 15, 12, 6, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#000000'; 
            ctx.font = '35px Arial';
            ctx.fillText(mon.emoji, mon.x, mon.y); 
        });

        if(!player.invincible || Math.floor(Date.now()/150) % 2 === 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; 
            ctx.beginPath(); ctx.ellipse(player.x, player.y + 20, 15, 7, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.save();
            let pBounce = Math.sin(Date.now() / 300) * 2; 
            const playerAura = ctx.createRadialGradient(player.x, player.y, player.radius * 0.2, player.x, player.y, player.radius * 2.5 + pBounce);
            playerAura.addColorStop(0, 'rgba(255, 255, 255, 0.8)'); 
            playerAura.addColorStop(0.4, 'rgba(255, 240, 200, 0.4)'); 
            playerAura.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = playerAura;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius * 2.5 + pBounce, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#000000'; 
            ctx.font = '45px Arial'; 
            ctx.fillText(player.emoji, player.x, player.y);

            ctx.font = 'bold 16px Jua';
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeText(player.nickname, player.x, player.y - 50);
            ctx.fillText(player.nickname, player.x, player.y - 50);

            const hpWidth = 60;
            const hpHeight = 8;
            const hpX = player.x - hpWidth / 2;
            const hpY = player.y - 40;
            
            ctx.fillStyle = '#333';
            ctx.fillRect(hpX, hpY, hpWidth, hpHeight);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(hpX, hpY, hpWidth * (currentHP / maxHP), hpHeight);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(hpX, hpY, hpWidth, hpHeight);
        }

        floatTexts.forEach(ft => {
            ctx.globalAlpha = ft.life / 40;
            ctx.fillStyle = ft.color || '#f1c40f'; 
            ctx.font = 'bold 30px Jua';
            ctx.lineWidth = 4; ctx.strokeStyle = '#333';
            ctx.strokeText(ft.text, ft.x, ft.y);
            ctx.fillText(ft.text, ft.x, ft.y);
        });
        ctx.globalAlpha = 1.0;

        ctx.restore();
    }

    const hpBar = document.getElementById('hp-bar');
    const hpText = document.getElementById('hp-text');
    const clearedText = document.getElementById('cleared-text');
    const scoreText = document.getElementById('score-text');
    const quizModal = document.getElementById('quiz-modal');
    const optionsContainer = document.getElementById('options-container');
    const fbOverlay = document.getElementById('feedback-overlay');
    
    function startGame() {
        const nickInput = document.getElementById('nickname-input').value.trim();
        if(!nickInput) {
            alert("닉네임을 꼭 입력해주세요!");
            return;
        }

        document.getElementById('start-screen').style.display = 'none';
        
        player.nickname = nickInput;
        player.emoji = selectedEmoji;
        
        // 난이도에 따른 문제 세팅
        activeQuestions = selectedDifficulty === 'basic' ? questionsBasic : questionsAdvanced;
        
        initAudio(); 
        currentHP = maxHP; 
        score = 0; 
        
        gameStartTime = Date.now();
        totalQuestionsAttempted = 0;
        totalCorrectAnswers = 0;

        initMap(0); 
        gameState = 'PLAYING';
        gameLoop();
    }

    function updateUI() {
        hpBar.style.width = currentHP + '%'; hpText.innerText = `${currentHP} / ${maxHP}`;
        hpBar.style.background = currentHP > 40 ? 'linear-gradient(90deg, #ff7675, #e74c3c)' : '#c0392b';
        clearedText.innerText = `${mapClearedCount} / 5`;
        scoreText.innerText = score;
    }

    function triggerHurtEffect(damage) {
        currentHP = Math.max(0, currentHP - damage); updateUI();
        gameScreen.classList.add('effect-shake', 'effect-flash');
        setTimeout(() => gameScreen.classList.remove('effect-shake', 'effect-flash'), 300);

        if(currentHP <= 0) {
            setTimeout(() => showFeedback('GAMEOVER', "체력 소진...", `아쉽네요, 다시 도전해볼까요?`), 400);
        } else {
            player.invincible = true; setTimeout(() => player.invincible = false, 1500); 
        }
    }

    function startQuiz(npcId) {
        gameState = 'QUIZ'; activeQuizIndex = npcId; joyVector = {x:0, y:0};
        const qData = mapQuestions[npcId];

        document.getElementById('q-text').innerText = qData.q;
        optionsContainer.innerHTML = '';
        qData.options.forEach((optText, index) => {
            const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = optText; btn.setAttribute('data-index', index + 1);
            btn.onclick = () => checkAnswer(index); optionsContainer.appendChild(btn);
        });

        quizModal.style.display = 'block';
        setTimeout(() => quizModal.classList.add('active'), 10);
        npcs[npcId].nearPlayer = false; 
    }

    function checkAnswer(selectedIndex) {
        quizModal.classList.remove('active');
        setTimeout(() => quizModal.style.display = 'none', 300);

        totalQuestionsAttempted++; 

        const qData = mapQuestions[activeQuizIndex];
        const isCorrect = (selectedIndex === qData.answerIndex);

        if(isCorrect) {
            totalCorrectAnswers++; 
            npcs[activeQuizIndex].active = false;
            mapClearedCount++; 
            score += 500; 
            
            currentHP = Math.min(maxHP, currentHP + 10);
            floatTexts.push({ x: player.x, y: player.y - 30, text: `+10 ❤️`, life: 40, color: '#ff7675' });
            updateUI();
            
            ctx.save(); ctx.font = 'bold 80px Jua'; ctx.fillStyle = '#2ecc71'; ctx.textAlign='center'; ctx.fillText("정답!", canvas.width/2, canvas.height/2 - 50); ctx.restore();
            
            setTimeout(() => {
                if(mapClearedCount >= 5) {
                    if(currentMapIndex < 3) {
                        currentHP = Math.min(maxHP, currentHP + 30);
                        updateUI();
                        showFeedback('MAP_CLEAR', `맵 ${currentMapIndex + 1} 클리어!`, "훌륭합니다! 보너스 체력이 회복되었습니다.\n다음 세계로 이동할 준비가 되었나요?");
                    }
                    else showFeedback('ALL_CLEAR', "🎉 최종 탈출 성공!", "축하합니다! 민주주의 어드벤처를 완벽하게 클리어했습니다.");
                } else {
                    showFeedback('CORRECT', "완벽해요!", qData.explanation);
                }
            }, 500);

        } else {
            triggerHurtEffect(hpPerWrong); 
            // [핵심 변경] 오답 시 직관적인 해설 UI 제공
            if(currentHP > 0) {
                setTimeout(() => {
                    let descHtml = `
                        <div class="explanation-box">
                            <h4>💡 선생님의 문제 풀이 해설</h4>
                            <p>${qData.explanation}</p>
                        </div>
                    `;
                    showFeedback('WRONG', "앗, 오답이에요!", descHtml);
                }, 500);
            }
        }
    }

    function getPlayTimeString() {
        if (!gameStartTime) return "00:00";
        let diffSec = Math.floor((Date.now() - gameStartTime) / 1000);
        let m = Math.floor(diffSec / 60).toString().padStart(2, '0');
        let s = (diffSec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function showFeedback(type, title, desc) {
        gameState = 'FEEDBACK';
        fbOverlay.style.display = 'flex';
        const iconEl = document.getElementById('fb-icon');
        const titleEl = document.getElementById('fb-title');
        const descEl = document.getElementById('fb-desc');
        const btnEl = document.getElementById('fb-btn');

        titleEl.innerText = title;
        
        if (type === 'ALL_CLEAR' || type === 'GAMEOVER') {
            let accuracy = totalQuestionsAttempted === 0 ? 0 : Math.round((totalCorrectAnswers / totalQuestionsAttempted) * 100);
            let timeStr = getPlayTimeString();
            
            let statsHtml = `
                <div style="font-size: 1.2rem; margin-top: 15px; color: #f1c40f; line-height: 1.8;">
                    ⏱️ 클리어 타임: <b>${timeStr}</b><br>
                    🎯 정답률: <b>${accuracy}%</b> (${totalCorrectAnswers}/${totalQuestionsAttempted})<br>
                    🪙 최종 점수: <b>${score}점</b>
                </div>
            `;
            descEl.innerHTML = desc + statsHtml;
        } else {
            descEl.innerHTML = desc; // HTML 태그(해설 박스) 적용을 위해 innerHTML 사용
        }

        if(type === 'CORRECT') {
            iconEl.innerText = '⭕'; iconEl.style.color = '#2ecc71'; titleEl.style.color = '#2ecc71';
            btnEl.innerText = "맵 계속 탐험하기"; btnEl.onclick = closeFeedback;
        } else if(type === 'WRONG') {
            iconEl.innerText = '❌'; iconEl.style.color = '#e74c3c'; titleEl.style.color = '#e74c3c';
            btnEl.innerText = "다시 찾아가기"; btnEl.onclick = closeFeedback;
        } else if(type === 'MAP_CLEAR') {
            iconEl.innerText = '🚀'; iconEl.style.color = '#3498db'; titleEl.style.color = '#3498db';
            btnEl.innerText = "다음 맵으로 이동"; 
            btnEl.onclick = () => { fbOverlay.style.display = 'none'; initMap(currentMapIndex + 1); gameState = 'PLAYING'; };
        } else if(type === 'ALL_CLEAR') {
            iconEl.innerText = '👑'; iconEl.style.color = '#f1c40f'; titleEl.style.color = '#f1c40f';
            btnEl.innerText = "처음부터 다시하기"; 
            btnEl.onclick = () => { fbOverlay.style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; };
        } else if(type === 'GAMEOVER') {
            iconEl.innerText = '👻'; iconEl.style.color = '#e74c3c'; titleEl.style.color = '#e74c3c';
            btnEl.innerText = "처음부터 다시 도전"; 
            btnEl.onclick = () => { fbOverlay.style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; };
        }
    }

    function closeFeedback() { fbOverlay.style.display = 'none'; gameState = 'PLAYING'; }

</script>
