<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨에듀테크 게임 저장소✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { min-height: 100dvh; overflow-x: hidden; color: #f8fafc; background: linear-gradient(-45deg, #071a52, #0f3460, #1b1b7a, #533483, #7c3aed, #c026d3, #ea580c); background-size: 400% 400%; animation: gradientMove 15s ease infinite; position: relative; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    body::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 40%); pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px 20px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 30px; }
    .admin-trigger { display: inline-block; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 20px; border-radius: 30px; color: #f8fafc; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-bottom: 24px; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
    .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(to right, #ffffff, #f1f5f9, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .category-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .tab-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); padding: 10px 24px; border-radius: 30px; color: #cbd5e1; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .tab-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
    .tab-btn.active { background: #ffffff; color: #0f172a; border-color: #ffffff; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.25); }

    .subject-tabs { margin-bottom: 35px; gap: 8px; }
    .subject-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 20px; color: #94a3b8; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .subject-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .subject-btn.active { background: #cbd5e1; color: #0f172a; border-color: #cbd5e1; box-shadow: 0 2px 10px rgba(255, 255, 255, 0.15); }

    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .game-card { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 28px; display: flex; flex-direction: column; transition: all 0.35s ease; }
    .game-card h3 { font-size: 20px; font-weight: 700; line-height: 1.4; word-break: keep-all; }
    .launch-btn { margin-top: auto; background: #ffffff; color: #0f172a; text-align: center; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; transition: background 0.2s; }
    .launch-btn:hover { background: #f1f5f9; }
    
    .game-master-overlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; align-items: center; justify-content: center; }
    #gameConsoleBox { width: 100vw; height: 100dvh; display: flex; justify-content: center; align-items: center; background: #000; }
    .game-frame-iframe { width: 100%; height: 100%; border: none; }
    
    .floating-close-btn { position: absolute; top: 20px; right: 20px; z-index: 10000; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .floating-close-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #1e1b4b; border-radius: 28px; padding: 36px; width: 100%; max-width: 520px; color: white; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #cbd5e1; }
    input, select, textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: #ffffff; font-size: 15px; transition: all 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); }
    select option { background-color: #1e1b4b; color: #ffffff; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <button class="admin-trigger" onclick="checkAdminPassword()">⚙️ 관리자 설정</button>
      <div class="hero"><h1>Play. Learn. Enjoy! ✨</h1></div>
    </header>
    
    <div class="category-tabs" id="gradeTabs">
      <button class="tab-btn active" onclick="filterGrade('all')">전체학년</button>
      <button class="tab-btn" onclick="filterGrade('3학년')">3학년</button>
      <button class="tab-btn" onclick="filterGrade('4학년')">4학년</button>
      <button class="tab-btn" onclick="filterGrade('5학년')">5학년</button>
      <button class="tab-btn" onclick="filterGrade('6학년')">6학년</button>
    </div>

    <div class="category-tabs subject-tabs" id="subjectTabs">
      <button class="subject-btn active" onclick="filterSubject('all')">전체과목</button>
      <button class="subject-btn" onclick="filterSubject('국어')">국어</button>
      <button class="subject-btn" onclick="filterSubject('수학')">수학</button>
      <button class="subject-btn" onclick="filterSubject('사회')">사회</button>
      <button class="subject-btn" onclick="filterSubject('과학')">과학</button>
      <button class="subject-btn" onclick="filterSubject('창체')">창체</button>
      <button class="subject-btn" onclick="filterSubject('기타')">기타</button>
    </div>

    <main>
      <div class="games-grid" id="gamesGrid"></div>
    </main>
  </div>

  <div id="adminModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modalTitle">➕ 관리자 패널</h2>
      <div class="form-group"><label>게임 선택</label><select id="adminGameSelect" onchange="handleAdminGameSelect(this.value)"></select></div>
      <div class="form-group"><label>타이틀 (학년 및 과목 포함 권장)</label><input type="text" id="gameTitleInput" placeholder="예: 5학년 수학 분수의 덧셈과 뺄셈"></div>
      <div class="form-group"><label>파일 경로</label><input type="text" id="gameUrlInput" placeholder="예: ./5학년 수학 분수의 덧셈과 뺄셈.html"></div>
      <button class="launch-btn" onclick="saveGameCard()" style="width: 100%;">저장하기</button>
      <button onclick="closeModal('adminModal')" style="width: 100%; background:none; color:#aaa; margin-top:10px; border:none; cursor:pointer; font-weight:600;">닫기</button>
    </div>
  </div>

  <div id="gameMasterConsole" class="game-master-overlay">
      <button class="floating-close-btn" onclick="shutdownConsole()">✖ 닫기</button>
      <div id="gameConsoleBox">
          <iframe src="" class="game-frame-iframe" id="gameMasterIframe" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
      </div>
  </div>

  <script>
    let isAdminAuthenticated = false;
    let selectedGrade = 'all';
    let selectedSubject = 'all'; 
    
    // 강제 버전 동기화 번호 상향 조정 (버전 24)
    const CURRENT_DATA_VERSION = 24; 

    const initialGames = [
      { id: 1, icon: "🎢", title: "3학년 1학기 수학 길이와 시간", url: "./3학년 1학기 수학 길이와 시간(수학 코스터 타이쿤).html" },
      { id: 2, icon: "🔢", title: "3학년 1학기 수학 분수와 소수", url: "./3학년 1학기 수학 분수와 소수(에듀런).html" },
      { id: 3, icon: "🧪", title: "5학년 1학기 과학 용해 용액 단어", url: "./5학년 1학기 과학 용해 용액 단어.html" },
      { id: 4, icon: "☁️", title: "5학년 1학기 사회 기후", url: "./5학년 1학기 사회 기후(탱크).html" },
      { id: 5, icon: "🏯", title: "5학년 1학기 사회 인구", url: "./5학년 1학기 사회 인구(조선 마을 대모험).html" },
      { id: 6, icon: "🚀", title: "5학년 1학기 수학 분수 크기 비교 2", url: "./5학년 1학기 수학 분수 크기 비교(우주 디펜스) 2.html" },
      { id: 7, icon: "🚀", title: "5학년 1학기 수학 분수 크기 비교", url: "./5학년 1학기 수학 분수 크기 비교(우주 디펜스).html" },
      { id: 8, icon: "🧩", title: "5학년 1학기 수학 분수의 덧셈과 뺄셈", url: "./5학년 1학기 수학 분수의 덧셈과 뺄셈(수학의 나라).html" },
      { id: 9, icon: "🍄", title: "5학년 1학기 수학 약분 통분 기약분수", url: "./5학년 1학기 수학 약분 통분 기약분수(마리오).html" },
      { id: 10, icon: "🏛️", title: "6학년 1학기 사회 민주주의", url: "./6학년 1학기 사회 민주주의(젭스타일).html" },
      { id: 11, icon: "🌍", title: "6학년 1학기 사회 세계 여러 국가", url: "./6학년 1학기 사회 세계 여러 국가의 위치와 영토 모험.html" },
      { id: 12, icon: "🌍", title: "6학년 1학기 사회 지구 탐구 대모험", url: "./6학년 1학기 사회 지구 탐구 대모험.html" },
      { id: 13, icon: "🔢", title: "6학년 1학기 수학 비와 비율(마리오)", url: "./6학년 1학기 수학 비와 비율(마리오).html" },
      { id: 14, icon: "⚔️", title: "6학년 1학기 수학 비와비율(서바이벌)", url: "./6학년 1학기 수학 비와비율(서바이벌).html" },
      { id: 15, icon: "📊", title: "6학년 1학기 수학 여러 가지 그래프", url: "./6학년 1학기 수학 여러 가지 그래프(에듀런).html" },
      { id: 16, icon: "🏃", title: "6학년 1학기 수학 여러가지 그래프 선수학습", url: "./6학년 1학기 수학 여러가지 그래프 선수학습(추격전).html" },
      { id: 17, icon: "📦", title: "6학년 1학기 수학 직육면체의 부피와 겉넓이", url: "./6학년 1학기 수학 직육면체의 부피와 겉넓이(에듀런).html" },
      { id: 18, icon: "🎨", title: "5학년 창체 캐치 1", url: "./catch1.html" },
      { id: 19, icon: "🎨", title: "5학년 창체 캐치 2", url: "./catch2.html" },
      { id: 20, icon: "🎨", title: "5학년 창체 캐치 3", url: "./catch3.html" },
      { id: 21, icon: "🎨", title: "5학년 창체 캐치 4", url: "./catch4.html" },
      { id: 22, icon: "⚽", title: "5학년 1학기 수학 분수의 덧셈과 뺄셈(축구 패널티킥)", url: "./5학년 1학기 수학 분수의 덧셈과 뺄셈(축구 패널티킥).html" },
      { id: 23, icon: "⌨️", title: "창체 타자 연습", url: "./타자 연습.html" },
      { id: 24, icon: "🔐", title: "4학년 1학기 수학 규칙과 관계(암호해독)", url: "./4학년 1학기 수학 규칙과 관계(암호해독).html" },
      { id: 25, icon: "🎨", title: "5학년 창체 캐치 5", url: "./catch5.html" },
      { id: 26, icon: "🌍", title: "4학년 1학기 사회 합리적 소비(디펜스)", url: "./4학년 1학기 사회 합리적 소비(디펜스).html" },
      { id: 27, icon: "🎨", title: "5학년 창체 캐치 6", url: "./catch6.html" },
      { id: 28, icon: "⚔️", title: "5학년 1학기 수학 다각형의 둘레와 넓이(서바이벌)", url: "./5학년 1학기 수학 다각형의 둘레와 넓이(서바이벌).html" },
      { id: 29, icon: "📝", title: "학교업무경감 생기부", url: "./학교업무경감 생기부.html" },
      { id: 30, icon: "💣", title: "창체 초성 단어 폭탄돌리기", url: "./초성 단어 폭탄돌리기.html" },
      { id: 31, icon: "🕹️", title: "창체 미니게임천국 1탄", url: "./미니게임천국 1탄.html" },
      { id: 32, icon: "🕹️", title: "창체 미니 게임 천국 2탄", url: "./미니 게임 천국 2탄.html" },
      { id: 33, icon: "🕹️", title: "창체 미니 게임 천국 3탄", url: "./미니 게임 천국 3탄.html" },
      { id: 34, icon: "🧪", title: "3학년 1학기 수학 분수와 소수(마법 물약 제조소)", url: "./3학년 1학기 수학 분수와 소수(마법 물약 제조소).html" },
      { id: 35, icon: "🎨", title: "5학년 창체 캐치 마인드 7", url: "./캐치 마인드 7.html" },
      { id: 36, icon: "🌍", title: "4학년 1학기 사회 교류하며 발전하는 우리 지역", url: "./4학년 1학기 사회 교류하며 발전하는 우리 지역.html" }
    ];

    let currentGames = [];

    window.addEventListener('DOMContentLoaded', () => {
      const storedVersion = localStorage.getItem('edutech_data_version');
      
      if (!storedVersion || parseInt(storedVersion) !== CURRENT_DATA_VERSION) {
        currentGames = initialGames;
        localStorage.setItem('edutech_games', JSON.stringify(currentGames));
        localStorage.setItem('edutech_data_version', CURRENT_DATA_VERSION.toString());
      } else {
        const stored = localStorage.getItem('edutech_games');
        currentGames = stored ? JSON.parse(stored) : initialGames;
      }
      renderGamesGrid();
    });

    function getGradeFromTitle(title) {
      const match = title.match(/([3-6])학년/);
      return match ? `${match[1]}학년` : '기타';
    }

    function getSubjectFromTitle(title) {
      if (title.includes('국어')) return '국어';
      if (title.includes('수학')) return '수학';
      if (title.includes('사회')) return '사회';
      if (title.includes('과학')) return '과학';
      if (title.includes('창체')) return '창체';
      return '기타';
    }

    function renderGamesGrid() {
      const grid = document.getElementById('gamesGrid');
      grid.innerHTML = "";
      
      const filteredGames = currentGames.filter(game => {
        const matchGrade = (selectedGrade === 'all') || (getGradeFromTitle(game.title) === selectedGrade);
        const matchSubject = (selectedSubject === 'all') || (getSubjectFromTitle(game.title) === selectedSubject);
        return matchGrade && matchSubject;
      });

      if (filteredGames.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#cbd5e1; font-size:16px;">선택한 카테고리에 해당하는 게임이 없습니다.</div>`;
        return;
      }

      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card";
        card.innerHTML = `<h3>${game.icon} ${game.title}</h3><br><button class="launch-btn" onclick="bootUpGameConsole('${game.url}')">실행하기</button>`;
        grid.appendChild(card);
      });
    }

    function filterGrade(grade) {
      selectedGrade = grade;
      document.querySelectorAll('#gradeTabs .tab-btn').forEach(btn => {
        const btnText = btn.textContent === '전체학년' ? 'all' : btn.textContent;
        if (btnText === grade) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      renderGamesGrid();
    }

    function filterSubject(subject) {
      selectedSubject = subject;
      document.querySelectorAll('#subjectTabs .subject-btn').forEach(btn => {
        const btnText = btn.textContent === '전체과목' ? 'all' : btn.textContent;
        if (btnText === subject) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      renderGamesGrid();
    }

    function bootUpGameConsole(url) {
      if(url.startsWith('#')) return;
      document.getElementById('gameMasterIframe').src = url;
      document.getElementById('gameMasterConsole').style.display = 'flex';
    }

    function shutdownConsole() { 
      document.getElementById('gameMasterConsole').style.display = 'none'; 
      document.getElementById('gameMasterIframe').src = '';
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function checkAdminPassword() { 
        const pw = prompt("관리자 암호를 입력하세요.");
        if(pw === "gudtns12") { isAdminAuthenticated = true; openAdminForm(); }
    }

    function openAdminForm() {
        const select = document.getElementById('adminGameSelect');
        select.innerHTML = '<option value="">➕ 새 게임 등록</option>';
        currentGames.forEach(g => select.innerHTML += `<option value="${g.id}">${g.title}</option>`);
        document.getElementById('gameTitleInput').value = '';
        document.getElementById('gameUrlInput').value = '';
        document.getElementById('adminModal').style.display = 'flex';
    }

    function handleAdminGameSelect(id) {
        const game = currentGames.find(g => g.id == id);
        if(game) {
            document.getElementById('gameTitleInput').value = game.title;
            document.getElementById('gameUrlInput').value = game.url;
        } else {
            document.getElementById('gameTitleInput').value = '';
            document.getElementById('gameUrlInput').value = '';
        }
    }

    function saveGameCard() {
        const select = document.getElementById('adminGameSelect');
        const title = document.getElementById('gameTitleInput').value.trim();
        const url = document.getElementById('gameUrlInput').value.trim();
        
        if(!title || !url) {
            alert("타이틀과 파일 경로를 모두 입력해주세요.");
            return;
        }
        
        const selectedId = select.value;
        if(selectedId) {
            const game = currentGames.find(g => g.id == selectedId);
            if(game) {
                game.title = title;
                game.url = url;
            }
        } else {
            const newId = currentGames.length > 0 ? Math.max(...currentGames.map(g => g.id)) + 1 : 1;
            let icon = "🎮";
            if(title.includes("수학")) icon = "🔢";
            else if(title.includes("사회")) icon = "🌍";
            else if(title.includes("과학")) icon = "🧪";
            else if(title.includes("국어")) icon = "📖";
            
            currentGames.push({ id: newId, icon: icon, title: title, url: url });
        }
        
        localStorage.setItem('edutech_games', JSON.stringify(currentGames));
        renderGamesGrid();
        alert("성공적으로 저장되었습니다.");
        document.getElementById('adminModal').style.display = 'none';
    }
  </script>
</body>
</html>
