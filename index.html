<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no" />
  <title>✨에듀테크 게임 저장소✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: #f8fafc;
      background: linear-gradient(-45deg, #071a52, #0f3460, #1b1b7a, #533483, #7c3aed, #c026d3, #ea580c);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      position: relative;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px 20px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    .admin-trigger {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
      border-radius: 30px;
      color: #f8fafc;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 24px;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .admin-trigger:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(to right, #ffffff, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 12px rgba(0,0,0,0.1);
    }

    .hero p {
      font-size: 18px;
      color: #cbd5e1;
      font-weight: 400;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 110, 0, 0.15);
      border: 1px solid rgba(255, 110, 0, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      color: #ffedd5;
      font-weight: 600;
    }

    .category-filter {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 24px;
      border-radius: 12px;
      color: #cbd5e1;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: #ffffff;
      color: #0f172a;
      border-color: #ffffff;
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.25);
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .game-card {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .game-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .game-icon {
      font-size: 36px;
      background: rgba(255, 255, 255, 0.08);
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
    }

    .game-category {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .game-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .game-desc {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 28px;
      flex-grow: 1;
    }

    .action-group {
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    .launch-btn {
      flex-grow: 1;
      background: #ffffff;
      color: #0f172a;
      text-align: center;
      padding: 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }

    .launch-btn:hover { background: #f1f5f9; }

    .card-del-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 0 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    /* ============================================================
       🌟 [근본 해결 코어] 유니버설 반응형 자동 매칭 실시간 가상 실행기 프레임
       ============================================================ */
    .game-master-overlay {
      position: fixed;
      inset: 0;
      background: #09090b;
      z-index: 99999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
      touch-action: none;
    }

    /* 반응형 크기 유지를 위한 컨테이너 */
    .game-console-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* 마스터 가상 콘솔 본체 */
    .game-console-box {
      position: relative;
      width: 960px;  /* 표준 가로 가상 베이스 해상도 */
      height: 690px; /* 표준 세로 가상 베이스 해상도 */
      background: #151518;
      border: 4px solid #ffd700;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      transform-origin: center center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      transition: width 0.2s, height 0.2s;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 8px;
      width: 100%;
    }

    .console-title { font-size: 16px; font-weight: 800; color: #ffd700; }
    
    .console-close-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
      transition: background 0.2s;
    }
    .console-close-btn:hover { background: #dc2626; }

    /* 모듈 임베딩 프레임 */
    .game-frame-iframe {
      width: 100%;
      flex: 1;
      border: none;
      background: #000;
      border-radius: 8px;
    }

    /* 📱 기기 화면 종횡비에 따른 특수 미디어 쿼리 패치 */
    @media (max-width: 600px) or (max-aspect-ratio: 13/19) {
      /* 스마트폰 세로형 비율 감지 시, 가상 캔버스를 900x1200 규격 모바일 전 전용 장치로 가변 변경 */
      .game-console-box {
        width: 900px;
        height: 1300px; /* 모바일 기기 화면 비율에 맞추어 레이아웃 가로세로 대대적 확장 */
        padding: 20px;
      }
      .console-title { font-size: 28px; }
      .console-close-btn { padding: 12px 24px; font-size: 22px; border-radius: 14px; }
    }

    /* 모달 기본 오픈 스타일 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-box {
      background: #1e1b4b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: #ffffff; }

    .modal-btn-group { display: flex; gap: 12px; margin-top: 28px; }
    .modal-btn { flex-grow: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; }
    .modal-btn.primary { background: #ffffff; color: #0f172a; }
    .modal-btn.secondary { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <button class="admin-trigger" onclick="checkAdminPassword()">⚙️ 관리자 설정</button>
      <div class="hero">
        <h1>Play. Learn. Enjoy! ✨</h1>
        <p>재미있게 배우고, 스스로 성장하는 우리 반!</p>
        <div class="badge">⭐ 다양한 주제의 게임으로 즐겁게 학습해요!</div>
      </div>
    </header>

    <main>
      <div class="category-filter">
        <button class="filter-btn active" onclick="filterCategory('전체', this)">🎮 전체 목록</button>
        <button class="filter-btn" onclick="filterCategory('수학', this)">🔢 수학 대모험</button>
        <button class="filter-btn" onclick="filterCategory('연산', this)">⚡ 초고속 연산</button>
        <button class="filter-btn" onclick="filterCategory('분수', this)">🍕 분수 마스터</button>
        <button class="filter-btn" onclick="filterCategory('사회', this)">🌍 사회 탐험</button>
        <button class="filter-btn" onclick="filterCategory('과학', this)">🧪 과학 실험실</button>
      </div>

      <div class="games-grid" id="gamesGrid"></div>
    </main>
  </div>

  <div id="passwordModal" class="modal-overlay">
    <div class="modal-box">
      <h2>🔒 관리자 인증</h2>
      <p>시스템 제어를 위해 패스워드를 입력하세요.</p>
      <div class="form-group">
        <input type="password" id="adminPasswordInput" placeholder="비밀번호를 입력하세요..." onkeyup="if(event.key==='Enter') verifyPassword()">
      </div>
      <div class="modal-btn-group">
        <button class="modal-btn primary" onclick="verifyPassword()">인증하기</button>
        <button class="modal-btn secondary" onclick="closeModal('passwordModal')">취소</button>
      </div>
    </div>
  </div>

  <div id="adminModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modalTitle">➕ 새 에듀테크 모듈 등록</h2>
      <input type="hidden" id="gameId">
      <div class="form-group"><label>게임 타이틀</label><input type="text" id="gameTitleInput"></div>
      <div class="form-group"><label>대표 이모지</label><input type="text" id="gameIconInput"></div>
      <div class="form-group">
        <label>교과 카테고리</label>
        <select id="gameCategorySelect">
          <option value="수학">수학</option><option value="연산">연산</option><option value="분수">분수</option><option value="사회">사회</option><option value="과학">과학</option>
        </select>
      </div>
      <div class="form-group"><label>요약 가이드</label><textarea id="gameDescInput" rows="2"></textarea></div>
      <div class="form-group"><label>로컬 파일 주소 (.html)</label><input type="text" id="gameUrlInput" placeholder="mario.html"></div>
      <div class="modal-btn-group">
        <button class="modal-btn primary" onclick="saveGameCard()">디렉터리 저장 배포</button>
        <button class="modal-btn secondary" onclick="closeAdminModal()">작업 취소</button>
      </div>
    </div>
  </div>

  <div id="gameMasterConsole" class="game-master-overlay">
      <div class="game-console-wrapper">
          <div class="game-console-box" id="gameConsoleBox">
              <div class="console-header">
                  <span class="console-title" id="consoleGameTitle">🎮 에듀테크 가상 플레이어</span>
                  <button class="console-close-btn" onclick="shutdownConsole()">게임 종료 ✖</button>
              </div>
              <iframe src="" class="game-frame-iframe" id="gameMasterIframe"></iframe>
          </div>
      </div>
  </div>

  <script>
    let isAdminAuthenticated = false;
    let selectedCategory = "전체";

    const initialGames = [
      { id: 1, icon: "🪙", title: "분수 월드", desc: "점프하며 분수 문제를 해결하는 RPG 스타일 학습 게임!", category: "분수", url: "./mario.html" },
      { id: 2, icon: "➗", title: "약분 챌린지", desc: "빠르게 약분하며 최고 점수에 도전하는 스피드 게임!", category: "연산", url: "./airplane.html" },
      { id: 3, icon: "🚀", title: "우주 수학 탐험", desc: "행성을 여행하며 다양한 수학 미션을 해결하세요!", category: "수학", url: "./airplane.html" },
      { id: 4, icon: "🍕", title: "분수 피자 만들기", desc: "피자를 나누며 자연스럽게 분수 개념을 익혀보세요.", category: "분수", url: "./mario.html" },
      { id: 5, icon: "🌦️", title: "날씨 탐험대", desc: "계절과 기후를 배우며 퀴즈를 배우는 유익한 교과 게임!", category: "사회", url: "./mario.html" },
      { id: 6, icon: "🧪", title: "과학 실험실", desc: "재미있는 실험과 문제를 해결하며 과학 개념 정복!", category: "과학", url: "./mario.html" },
      { id: 7, icon: "🍄", title: "마리오 분수 구출대작전", desc: "쿠파에게 납치된 피치 공주를 구하기 위해 약분과 통분 문제를 해결하세요!", category: "수학", url: "./mario.html" }
    ];

    let currentGames = [];

    window.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('edutech_games');
      if (stored) {
        let parsedGames = JSON.parse(stored);
        if (parsedGames.length !== initialGames.length || !parsedGames.some(g => g.id === 7)) {
          currentGames = [...initialGames];
          localStorage.setItem('edutech_games', JSON.stringify(currentGames));
        } else {
          currentGames = parsedGames;
        }
      } else {
        currentGames = [...initialGames];
        localStorage.setItem('edutech_games', JSON.stringify(currentGames));
      }
      renderGamesGrid();
    });

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function closeAdminModal() { closeModal('adminModal'); }

    function checkAdminPassword() { if(isAdminAuthenticated) openAdminForm(); else { document.getElementById('adminPasswordInput').value = ""; showModal('passwordModal'); } }
    function verifyPassword() { const pw = document.getElementById('adminPasswordInput').value; if(pw === "1234") { isAdminAuthenticated = true; closeModal('passwordModal'); openAdminForm(); } else { alert("❌ 인증 거부"); } }

    function filterCategory(category, btnElement) { selectedCategory = category; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); btnElement.classList.add('active'); renderGamesGrid(); }

    function renderGamesGrid() {
      const grid = document.getElementById('gamesGrid');
      grid.innerHTML = "";
      const filtered = currentGames.filter(g => selectedCategory === "전체" || g.category === selectedCategory);

      filtered.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card";
        let actionHtml = `<button onclick="bootUpGameConsole('${game.url}', '${game.title}')" class="launch-btn">🚀 학습 시작하기</button>`;
        
        if(isAdminAuthenticated) {
          actionHtml = `
            <button class="card-del-btn" onclick="openAdminForm(${game.id})">수정</button>
            <button onclick="bootUpGameConsole('${game.url}', '${game.title}')" class="launch-btn">🚀 테스트 실행</button>
            <button class="card-del-btn" style="background:rgba(239,68,68,0.2); color:#f87171;" onclick="deleteGameCard(${game.id})">삭제</button>
          `;
        }

        card.innerHTML = `<div class="card-top"><div class="game-icon">${game.icon || '🎮'}</div><div class="game-category">${game.category}</div></div><h2 class="game-title">${game.title}</h2><p class="game-desc">${game.desc}</p><div class="action-group">${actionHtml}</div>`;
        grid.appendChild(card);
      });
    }

    // ============================================================
    // 🌟 [하이브리드 엔진 핵심 스크립트] 
    // 어떤 기기의 화면 비율이든 실시간으로 실측하여 정밀 스케일링하는 코어 함수
    // ============================================================
    function bootUpGameConsole(url, title) {
      document.getElementById('consoleGameTitle').innerText = `🎮 플레이 중: ${title}`;
      const iframe = document.getElementById('gameMasterIframe');
      iframe.src = url;
      
      document.getElementById('gameMasterConsole').style.display = 'flex';
      resizeConsoleLayout(); 
      window.addEventListener('resize', resizeConsoleLayout);
    }

    function shutdownConsole() {
      document.getElementById('gameMasterIframe').src = ""; 
      document.getElementById('gameMasterConsole').style.display = 'none';
      window.removeEventListener('resize', resizeConsoleLayout);
    }

    function resizeConsoleLayout() {
      const box = document.getElementById('gameConsoleBox');
      if (!box || document.getElementById('gameMasterConsole').style.display === 'none') return;

      // 1. 기기 브라우저가 스마트폰(세로형) 비율인지, 태블릿/PC(가로형) 비율인지 실시간 감지
      const isMobilePortrait = window.innerWidth < 600 || (window.innerHeight / window.innerWidth) > 1.35;
      
      // 2. 비율 조건에 맞는 가상 베이스 디자인 규격 할당
      const designWidth = isMobilePortrait ? 900 : 960;
      const designHeight = isMobilePortrait ? 1300 : 690;

      // 3. 기기의 가용 상하좌우 마진 패딩 제외 영역 실측
      const availableWidth = window.innerWidth - 12;
      const availableHeight = window.innerHeight - 12;

      // 4. 어떤 기기든 한 화면에 가두는 스케일 비율 계산
      const scale = Math.min(availableWidth / designWidth, availableHeight / designHeight);

      // 5. 실시간 CSS 변환 행렬 적용 (태블릿은 완만하게, 스마트폰은 컴팩트하게)
      box.style.transform = `scale(${scale})`;
    }

    function saveGameCard() {
      const id = document.getElementById('gameId').value;
      const title = document.getElementById('gameTitleInput').value.trim();
      const icon = document.getElementById('gameIconInput').value.trim();
      const category = document.getElementById('gameCategorySelect').value;
      const desc = document.getElementById('gameDescInput').value.trim();
      const url = document.getElementById('gameUrlInput').value.trim();

      if(!title || !icon || !desc || !url) { alert("⚠️ 빈칸을 채워주세요."); return; }

      if(id) {
        const targetIdx = currentGames.findIndex(g => g.id === parseInt(id));
        if(targetIdx > -1) { currentGames[targetIdx].title = title; currentGames[targetIdx].icon = icon; currentGames[targetIdx].desc = desc; currentGames[targetIdx].category = category; currentGames[targetIdx].url = url; }
      } else {
        const newId = currentGames.length > 0 ? Math.max(...currentGames.map(g => g.id)) + 1 : 1;
        currentGames.push({ id: newId, icon: icon, title: title, desc: desc, category: category, url: url });
      }
      localStorage.setItem('edutech_games', JSON.stringify(currentGames));
      alert("💾 저장 완료!"); closeModal('adminModal'); renderGamesGrid();
    }

    function deleteGameCard(id) { if(confirm("🗑 파기할까요?")) { currentGames = currentGames.filter(g => g.id !== id); localStorage.setItem('edutech_games', JSON.stringify(currentGames)); renderGamesGrid(); } }
  </script>
</body>
</html>
