<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨에듀테크 게임 저장소✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { min-height: 100dvh; overflow-x: hidden; color: #f8fafc; background: linear-gradient(-45deg, #071a52, #0f3460, #1b1b7a, #533483, #7c3aed, #c026d3, #ea580c); background-size: 400% 400%; animation: gradientMove 15s ease infinite; position: relative; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    body::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.03) 0%, transparent 40%); pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px 20px; position: relative; z-index: 1; }
    header { text-align: center; margin-bottom: 50px; }
    .admin-trigger { display: inline-block; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 20px; border-radius: 30px; color: #f8fafc; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-bottom: 24px; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
    .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(to right, #ffffff, #f1f5f9, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .game-card { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 28px; display: flex; flex-direction: column; transition: all 0.35s ease; }
    .launch-btn { flex-grow: 1; background: #ffffff; color: #0f172a; text-align: center; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; }
    
    /* 게임 콘솔 관련 스타일 수정 */
    .game-master-overlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; align-items: center; justify-content: center; }
    #gameConsoleBox { width: 100vw; height: 100dvh; display: flex; justify-content: center; align-items: center; background: #000; }
    .game-frame-iframe { width: 100%; height: 100%; border: none; }
    
    /* 플로팅 닫기 버튼 스타일 보강 */
    .floating-close-btn { position: absolute; top: 20px; right: 20px; z-index: 10000; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .floating-close-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #1e1b4b; border-radius: 28px; padding: 36px; width: 100%; max-width: 520px; color: white; }
    .form-group { margin-bottom: 18px; }
    input, select, textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: #ffffff; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <button class="admin-trigger" onclick="checkAdminPassword()">⚙️ 관리자 설정</button>
      <div class="hero"><h1>Play. Learn. Enjoy! ✨</h1></div>
    </header>
    <main>
      <div class="games-grid" id="gamesGrid"></div>
    </main>
  </div>

  <div id="adminModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modalTitle">➕ 관리자 패널</h2>
      <div class="form-group"><label>게임 선택</label><select id="adminGameSelect" onchange="handleAdminGameSelect(this.value)"></select></div>
      <div class="form-group"><label>타이틀</label><input type="text" id="gameTitleInput"></div>
      <div class="form-group"><label>파일 경로</label><input type="text" id="gameUrlInput"></div>
      <button class="launch-btn" onclick="saveGameCard()">저장하기</button>
      <button onclick="closeModal('adminModal')" style="background:none; color:#aaa; margin-top:10px;">닫기</button>
    </div>
  </div>

  <div id="gameMasterConsole" class="game-master-overlay">
      <button class="floating-close-btn" onclick="shutdownConsole()">✖ 닫기</button>
      <div id="gameConsoleBox">
          <iframe src="" class="game-frame-iframe" id="gameMasterIframe" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
      </div>
  </div>

  <script>
    let isAdminAuthenticated = false;
    const initialGames = [
      { id: 3, icon: "🚀", title: "우주 수학 탐험", category: "수학", url: "#space-math-menu" },
      { id: 7, icon: "🍁", title: "수학의 나라", category: "수학", url: "./baram.html" },
      { id: 8, icon: "🍄", title: "마리오 분수 구출", category: "수학", url: "./mario.html" },
      { id: 9, icon: "⚽", title: "문학 스타디움", category: "수학", url: "./soccor.html" },
      { id: 10, icon: "🪖", title: "탱크 디펜스", category: "수학", url: "./tank.html" }
    ];

    let currentGames = [];

    window.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('edutech_games');
      if (stored) {
        currentGames = JSON.parse(stored);
        // 새로운 게임(ID 10)이 없으면 강제로 병합
        if (!currentGames.some(g => g.id === 10)) {
            currentGames = initialGames;
            localStorage.setItem('edutech_games', JSON.stringify(currentGames));
        }
      } else {
        currentGames = initialGames;
        localStorage.setItem('edutech_games', JSON.stringify(currentGames));
      }
      renderGamesGrid();
    });

    function renderGamesGrid() {
      const grid = document.getElementById('gamesGrid');
      grid.innerHTML = "";
      currentGames.forEach(game => {
        const card = document.createElement('div');
        card.className = "game-card";
        card.innerHTML = `<h3>${game.icon} ${game.title}</h3><br><button class="launch-btn" onclick="bootUpGameConsole('${game.url}')">실행</button>`;
        grid.appendChild(card);
      });
    }

    function bootUpGameConsole(url) {
      if(url.startsWith('#')) return;
      document.getElementById('gameMasterIframe').src = url;
      document.getElementById('gameMasterConsole').style.display = 'flex';
    }

    function shutdownConsole() { 
      document.getElementById('gameMasterConsole').style.display = 'none'; 
      // 닫을 때 게임 소리가 계속 나는 것을 방지하기 위해 iframe 초기화
      document.getElementById('gameMasterIframe').src = '';
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function checkAdminPassword() { 
        const pw = prompt("관리자 암호를 입력하세요.");
        if(pw === "gudtns12") { isAdminAuthenticated = true; openAdminForm(); }
    }

    function openAdminForm() {
        const select = document.getElementById('adminGameSelect');
        select.innerHTML = '<option value="">새 게임 등록</option>';
        currentGames.forEach(g => select.innerHTML += `<option value="${g.id}">${g.title}</option>`);
        document.getElementById('adminModal').style.display = 'flex';
    }

    function handleAdminGameSelect(id) {
        const game = currentGames.find(g => g.id == id);
        if(game) {
            document.getElementById('gameTitleInput').value = game.title;
            document.getElementById('gameUrlInput').value = game.url;
        }
    }

    function saveGameCard() {
        alert("저장되었습니다.");
        document.getElementById('adminModal').style.display = 'none';
    }
  </script>
</body>
</html>
