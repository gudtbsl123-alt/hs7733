<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
<title>🍄 마리오 수학 왕국 - 5학년 분수 대모험</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=DotGothic16&display=swap');

:root {
  --sky: #6B8CFF;
  --ground-top: #8B5E3C;
  --ground-fill: #5C3D1E;
  --brick-red: #C84B11;
  --coin-gold: #FFD700;
  --mario-red: #E52521;
  --star-yellow: #FBDA00;
  --text-shadow: 2px 2px 0 #000;
  --hud-bg: rgba(0,0,20,0.85);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Jua', sans-serif;
  background: #1a0030;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  touch-action: none; /* 모바일 기기 더블탭 확대 방지 */
}

/* ===== SCREENS ===== */
.screen { display:none; width:100%; height:100%; }
.screen.active { display:flex; flex-direction:column; align-items:center; }

/* ===== SHAKE ANIMATION ===== */
@keyframes shake {
  0% { transform: translate(2px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  30% { transform: translate(0px, 2px) rotate(0deg); }
  40% { transform: translate(1px, -1px) rotate(1deg); }
  50% { transform: translate(-1px, 2px) rotate(-1deg); }
  60% { transform: translate(-3px, 1px) rotate(0deg); }
  70% { transform: translate(2px, 1px) rotate(-1deg); }
  80% { transform: translate(-1px, -1px) rotate(1deg); }
  90% { transform: translate(2px, 2px) rotate(0deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}
.shake { animation: shake 0.4s; animation-iteration-count: 1; }

/* ===== TITLE SCREEN ===== */
#titleScreen {
  justify-content: center;
  background: linear-gradient(180deg, #1a0a5e 0%, #5060c8 40%, #7090e0 60%, #5c3d1e 80%, #3d2610 100%);
  position: relative;
}
#titleScreen::before {
  content: ''; position: absolute; bottom: 20%; left: 0; right: 0; height: 22%;
  background: repeating-linear-gradient(90deg, #8B5E3C 0px, #8B5E3C 16px, #C84B11 16px, #C84B11 32px);
  border-top: 4px solid #FFD89B;
}
.title-content { position: relative; z-index:10; text-align: center; padding: 20px; }
.game-title { font-size: 4.8em; color: #FFD700; text-shadow: 4px 4px 0 #C84B11, 6px 6px 0 #8B3000; letter-spacing: 2px; margin-bottom: 12px; animation: titleFloat 2s ease-in-out infinite; }
@keyframes titleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.game-subtitle { font-size: 1.95em; color: #fff; text-shadow: 2px 2px 0 #000; margin-bottom: 40px; }
.pixel-mario-title { font-size: 7.5em; margin-bottom: 15px; animation: spin 3s linear infinite; display: inline-block; }
@keyframes spin { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }

/* ===== SETUP SCREEN ===== */
#setupScreen { justify-content: center; background: linear-gradient(180deg, #5060c8 0%, #7090e0 60%, #5c3d1e 85%, #3d2610 100%); padding: 20px; }
.setup-box { background: rgba(0,0,0,0.85); border: 4px solid #FFD700; border-radius: 16px; padding: 30px; width: 100%; max-width: 800px; box-shadow: 0 0 30px rgba(255,215,0,0.4); max-height: 95vh; overflow-y: auto; }
.setup-title { font-size: 2.5em; color: #FFD700; text-align: center; text-shadow: var(--text-shadow); margin-bottom: 25px; }
.form-group { margin-bottom: 20px; }
.form-label { font-size: 1.4em; color: #fff; display: block; margin-bottom: 10px; text-shadow: var(--text-shadow); }
.form-input { width: 100%; padding: 12px 15px; font-family: 'Jua', sans-serif; font-size: 1.4em; background: #111; border: 4px solid #FFD700; border-radius: 8px; color: #fff; outline: none; }
.form-input:focus { border-color: #FFA500; box-shadow: 0 0 10px rgba(255,165,0,0.5); }

.difficulty-btns { display: flex; gap: 15px; }
.diff-btn { flex: 1; padding: 15px 10px; font-family: 'Jua', sans-serif; font-size: 1.3em; border: 4px solid #555; border-radius: 12px; cursor: pointer; background: #222; color: #aaa; transition: all 0.2s; }
.diff-btn.selected-하 { background: #2E8B00; border-color: #5CFF00; color: #fff; }
.diff-btn.selected-중 { background: #B87D00; border-color: #FFD700; color: #fff; }
.diff-btn.selected-상 { background: #AA0000; border-color: #FF4444; color: #fff; }

.character-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; padding: 6px; }
.char-card { background: #1a1a2e; border: 3px solid #444; border-radius: 12px; padding: 8px 4px; cursor: pointer; text-align: center; transition: all 0.2s; }
.char-card:hover { border-color: #FFD700; transform: scale(1.05); }
.char-card.selected { border-color: #FFD700; background: #2a2a0a; box-shadow: 0 0 12px rgba(255,215,0,0.5); }
.char-emoji { font-size: 2.5em; display: block; }
.char-name { font-size: 0.9em; color: #ccc; margin-top: 5px; }

.start-btn { width: 100%; padding: 20px; font-family: 'Jua', sans-serif; font-size: 2em; background: var(--mario-red); border: 5px solid #FF8888; border-radius: 15px; color: #fff; cursor: pointer; text-shadow: 2px 2px 0 #800; transition: all 0.2s; margin-top: 20px; box-shadow: 0 8px 0 #800; }
.start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #800; }

/* ===== GAME SCREEN (플렉스 자동 반응형 레이아웃 도입) ===== */
#gameScreen { padding: 10px; box-sizing: border-box; }
.game-wrapper {
  width: 100%;
  max-width: 960px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  margin: 0 auto;
}

/* HUD */
#hud { background: var(--hud-bg); border: 3px solid #FFD700; border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
.hud-item { display: flex; align-items: center; gap: 6px; color: #fff; font-size: 1.2em; text-shadow: var(--text-shadow); }
.hud-icon { font-size: 1.5em; }
.health-bar { display: flex; gap: 3px; }
.health-pip { width: 16px; height: 16px; background: #E52521; border: 2px solid #fff; border-radius: 3px; transition: background 0.3s; }
.health-pip.empty { background: #333; }
.map-indicator { margin-left: auto; font-size: 1.2em; color: #FFD700; }

/* 캔버스가 부모 박스에 맞춰 종횡비를 유지하며 자동으로 꽉 차게 조절됨 */
#gameCanvas {
  width: 100%;
  height: auto;
  aspect-ratio: 900 / 460;
  background: #6B8CFF;
  border-radius: 12px;
  border: 4px solid #333;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: block;
}

.game-tips { background: rgba(0,0,0,0.85); color: #FFF; padding: 10px 15px; border-radius: 12px; border: 2px solid #FFD700; text-align: left; font-size: 1em; line-height: 1.5; margin-top: 10px; }
.game-tips .highlight { color: #FFD700; font-weight: bold; }

/* 터치 컨트롤 패드 */
#mobileControls {
  display: flex;
  width: 100%;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  margin-top: auto; /* 남는 세로 여백을 밀어내어 맨 아래로 이동 */
}
.touch-btn { background: rgba(255,255,255,0.15); border: 4px solid rgba(255,255,255,0.4); border-radius: 50%; width: 85px; height: 85px; font-size: 2.2em; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
.touch-btn:active { background: rgba(255,255,255,0.4); }
.touch-left-group { display: flex; gap: 20px; }

/* PC(마우스) 환경일 때는 모바일 버튼 및 팁 숨김 처리 */
@media (pointer: fine) {
  #mobileControls { display: none !important; }
}
@media (max-width: 800px) {
  .game-tips { display: none; } /* 화면이 작은 스마트폰에서는 팁을 가려서 쾌적하게 유지 */
}

/* ===== QUESTION MODAL ===== */
#questionModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; }
#questionModal.show { display: flex; }
.question-box { background: #1a0030; border: 6px solid #FFD700; border-radius: 20px; padding: 30px; width: 95%; max-width: 700px; text-align: center; box-shadow: 0 0 50px rgba(255,215,0,0.6); animation: popIn 0.3s ease; max-height: 90vh; overflow-y: auto; }
@keyframes popIn { from{transform:scale(0.8); opacity:0;} to{transform:scale(1); opacity:1;} }
.q-header { font-size: 1.3em; color: #aaa; margin-bottom: 10px; }
.q-char { font-size: 3em; margin-bottom: 10px; }
.q-text { font-size: 1.6em; color: #fff; margin-bottom: 20px; line-height: 1.5; text-shadow: var(--text-shadow); word-break: keep-all; }
.q-options { display: flex; flex-direction: column; gap: 10px; } /* 모바일 오터치 방지를 위해 세로 1열 배치 */
.q-option { padding: 15px; font-family: 'Jua', sans-serif; font-size: 1.4em; background: #222; border: 4px solid #555; border-radius: 12px; color: #fff; cursor: pointer; text-align: left; transition: all 0.2s; }
.q-option:hover { background: #333; border-color: #FFD700; transform: scale(1.02); }
.q-option:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.q-option.correct { background: #1a5c1a !important; border-color: #5CFF00 !important; opacity: 1; }
.q-option.wrong { background: #5c1a1a !important; border-color: #FF4444 !important; }
.q-feedback { margin-top: 15px; font-size: 1.4em; min-height: 50px; }
.q-next-btn { margin-top: 15px; padding: 15px 30px; font-family: 'Jua', sans-serif; font-size: 1.5em; background: #E52521; border: 4px solid #FF8888; border-radius: 12px; color: #fff; cursor: pointer; display: none; box-shadow: 0 5px 0 #800; }
.q-next-btn:active { transform: translateY(3px); box-shadow: none; }

/* ===== RESULT SCREEN ===== */
#resultScreen { justify-content: center; background: linear-gradient(180deg, #1a0a5e 0%, #5060c8 50%, #5c3d1e 85%, #3d2610 100%); padding: 20px; }
.result-box { background: rgba(0,0,0,0.85); border: 6px solid #FFD700; border-radius: 20px; padding: 30px; text-align: center; max-width: 600px; width: 100%; box-shadow: 0 0 50px rgba(255,215,0,0.4); max-height: 90vh; overflow-y: auto; }
.result-title { font-size: 3em; color: #FFD700; text-shadow: 3px 3px 0 #C84B11; margin-bottom: 10px; }
.result-stats { margin: 20px 0; }
.stat-row { display:flex; justify-content:space-between; color:#fff; font-size:1.4em; padding:10px 0; border-bottom:1px solid #444; }
.stat-val { color: #FFD700; }
.result-grade { font-size: 2.5em; margin: 20px 0; padding: 10px; border-radius: 12px; }
.retry-btn { padding: 15px 25px; font-family: 'Jua', sans-serif; font-size: 1.5em; background: var(--mario-red); border: 4px solid #FF8888; border-radius: 12px; color: #fff; cursor: pointer; margin: 5px; box-shadow: 0 5px 0 #800; }

/* Loading overlay */
#loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
#loadingOverlay.show { display: flex; }
.loading-text { color: #FFD700; font-size: 2em; text-shadow: var(--text-shadow); }
.loading-bar-wrap { width: 300px; height: 20px; border: 4px solid #FFD700; border-radius: 10px; background: #111; }
.loading-bar { height: 100%; background: #FFD700; width: 0%; transition: width 0.3s; border-radius: 6px; }
.loading-icon { font-size: 4em; animation: spin 1s linear infinite; }

.float-text { position: absolute; font-family: 'Jua', sans-serif; font-size: 1.5em; pointer-events: none; z-index: 150; animation: floatUp 1.2s ease forwards; text-shadow: 2px 2px 0 #000; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
</style>
</head>
<body>

<audio id="bgm" loop preload="auto">
  <source src="https://ia800504.us.archive.org/33/items/SuperMarioBros.ThemeMusic/SuperMarioBros.mp3" type="audio/mpeg">
</audio>

<div id="titleScreen" class="screen active">
  <div class="title-content">
    <div class="pixel-mario-title">🍄</div>
    <div class="game-title">마리오 수학 왕국</div>
    <div class="game-subtitle">5학년 분수 대모험 🌟</div>
    <div style="color:#aee;font-size:1.4em;margin-bottom:30px;text-shadow:var(--text-shadow)">약분 · 통분 · 분수와 소수 크기비교</div>
    <button class="start-btn" onclick="goToSetup()" style="max-width:300px;margin:0 auto;display:block">🎮 게임 시작!</button>
  </div>
</div>

<div id="setupScreen" class="screen">
  <div class="setup-box">
    <div class="setup-title">🌟 모험가 등록 🌟</div>
    <div class="form-group">
      <label class="form-label">👤 닉네임을 입력하세요</label>
      <input type="text" id="nicknameInput" class="form-input" placeholder="예: ㅇㅇ초 수학왕" maxlength="12">
    </div>
    <div class="form-group">
      <label class="form-label">🎯 난이도 선택</label>
      <div class="difficulty-btns">
        <button class="diff-btn" data-diff="하" onclick="selectDiff('하')">하 (기초)</button>
        <button class="diff-btn" data-diff="중" onclick="selectDiff('중')">중 (표준)</button>
        <button class="diff-btn" data-diff="상" onclick="selectDiff('상')">상 (심화)</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">🎭 캐릭터 선택</label>
      <div class="character-grid" id="characterGrid"></div>
    </div>
    <button class="start-btn" onclick="startGame()">🚀 모험 출발!</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-wrapper">
    <div id="hud">
      <div class="hud-item"><span class="hud-icon">❤️</span><div class="health-bar" id="healthBar"></div></div>
      <div class="hud-item"><span class="hud-icon">⭐</span><span id="scoreDisplay">0</span></div>
      <div class="hud-item"><span class="hud-icon">🪙</span><span id="coinDisplay">0</span></div>
      <div class="hud-item" id="playerNameHud" style="color:#FFD700; font-weight:bold;"></div>
      <div class="hud-item" onclick="toggleBGM()" style="cursor:pointer; margin-left:10px; background:#333; padding:4px 10px; border-radius:8px; border:1px solid #555;" id="bgmToggleBtn">🔊 음악 켜짐</div>
      <div class="map-indicator" id="mapIndicator">맵 1/20</div>
    </div>
    
    <canvas id="gameCanvas" width="900" height="460"></canvas>
    
    <div class="game-tips">
      <div style="color:#FFD700; font-size:1.1em; margin-bottom:5px; font-weight:bold;">🎮 플레이 팁</div>
      🪙 코인 먹으면 <span class="highlight">+30점</span> &amp; 체력 회복 | ❓ 박스를 치면 코인이나 몬스터 등장!<br>
      💥 몬스터를 밟으면 <span class="highlight">+50점</span> | 🎯 깃발에 도착해 수학 문제를 맞히면 <span class="highlight">+100점!</span>
    </div>

    <div id="mobileControls">
      <div class="touch-left-group">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
      </div>
      <div class="touch-btn" id="btnJump">▲</div>
    </div>
  </div>
</div>

<div id="questionModal">
  <div class="question-box">
    <div class="q-header" id="qHeader">문제 1/20</div>
    <div class="q-char" id="qChar">🍄</div>
    <div class="q-text" id="qText"></div>
    <div class="q-options" id="qOptions"></div>
    <div class="q-feedback" id="qFeedback"></div>
    <button class="q-next-btn" id="qNextBtn" onclick="nextLevel()">다음 맵으로! ▶</button>
  </div>
</div>

<div id="resultScreen" class="screen">
  <div class="result-box">
    <div class="result-title">🎉 모험 완료!</div>
    <canvas id="endingCanvas" width="250" height="250" style="margin: 0 auto; display: block;"></canvas>
    <div style="color:#fff;font-size:1.6em;margin-bottom:15px; font-weight:bold;" id="resultName"></div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-stats" id="resultStats"></div>
    <button class="retry-btn" onclick="goToSetup()">🔄 다시 도전!</button>
    <button class="retry-btn" onclick="goToTitle()" style="background:#1B69B2;border-color:#88aaff">🏠 처음으로</button>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-icon">⚙️</div>
  <div class="loading-text">AI가 문제를 만들고 있어요...</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
</div>

<script>
// ============================================================
//  GAME STATE
// ============================================================
const CHARACTERS = [
  {name:'마리오',emoji:'🔴'}, {name:'루이지',emoji:'🟢'}, {name:'피치공주',emoji:'👸'},
  {name:'쿠파',emoji:'🐢'}, {name:'요시',emoji:'🦕'}, {name:'토드',emoji:'🍄'},
  {name:'로젤리나',emoji:'🌟'}, {name:'동키콩',emoji:'🦍'}, {name:'와리오',emoji:'💛'},
  {name:'와루이지',emoji:'🟣'}, {name:'데이지공주',emoji:'🌼'}, {name:'키노피오',emoji:'🏃'},
  {name:'버섯',emoji:'🍄'}, {name:'구르미',emoji:'☁️'}, {name:'쿠파쥬니어',emoji:'🐊'},
  {name:'봄바',emoji:'💣'}, {name:'부끄부끄',emoji:'👻'}, {name:'락크투',emoji:'🌀'},
  {name:'불꽃마리오',emoji:'🔥'}, {name:'별마리오',emoji:'⭐'},
];

const TILE = 32;
const CANVAS_W = 900;
const CANVAS_H = 460;
const GROUND_Y = CANVAS_H - 80;
const PLAYER_W = 28;
const PLAYER_H = 32;
const MONSTER_W = 30;
const MONSTER_H = 30;

let state = {
  screen: 'title', nickname: '', difficulty: '중', character: CHARACTERS[0],
  score: 0, coins: 0, health: 100, maxHealth: 100, currentMap: 0, questions: [], answeredCount: 0,
  gameRunning: false, startTime: null, endTime: null     
};

let levelSnapshot = { score: 0, coins: 0, health: 100, maxHealth: 100 };
let bgmPlaying = true;
const bgmAudio = document.getElementById('bgm');
bgmAudio.volume = 0.3;
let monsterCooldown = 0; 
let lastTime = 0;
const FPS = 60;
const frameDelay = 1000 / FPS;

function toggleBGM() {
  const btn = document.getElementById('bgmToggleBtn');
  if (bgmPlaying) { bgmAudio.pause(); bgmPlaying = false; btn.textContent = '🔈 음악 꺼짐'; } 
  else { bgmAudio.play().catch(e=>{}); bgmPlaying = true; btn.textContent = '🔊 음악 켜짐'; }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToTitle() { bgmAudio.pause(); bgmAudio.currentTime = 0; cancelAnimationFrame(window.endingAnimFrame); showScreen('titleScreen'); }
function goToSetup() { buildCharGrid(); showScreen('setupScreen'); }

function buildCharGrid() {
  const grid = document.getElementById('characterGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'char-card' + (i===0?' selected':'');
    div.innerHTML = `<span class="char-emoji">${c.emoji}</span><span class="char-name">${c.name}</span>`;
    div.onclick = () => { document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected')); div.classList.add('selected'); state.character = c; };
    grid.appendChild(div);
  });
  state.character = CHARACTERS[0];
}

function selectDiff(d) {
  state.difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b=>{ b.className = 'diff-btn'; if (b.dataset.diff === d) b.classList.add('selected-'+d); });
}

async function startGame() {
  const nick = document.getElementById('nicknameInput').value.trim();
  if (!nick) { alert('닉네임을 입력해주세요!'); return; }
  if (!state.difficulty) { alert('난이도를 선택해주세요!'); return; }
  if(bgmPlaying) bgmAudio.play().catch(e=>{});

  state.nickname = nick; state.score = 0; state.coins = 0; state.health = 100; state.maxHealth = 100; state.currentMap = 0; state.answeredCount = 0;
  state.startTime = Date.now(); state.endTime = null;
  levelSnapshot = { score: state.score, coins: state.coins, health: state.health, maxHealth: state.maxHealth };

  showLoading(true);
  try { state.questions = getFallbackQuestions(state.difficulty); } catch(e) {}
  showLoading(false);

  showScreen('gameScreen');
  initGame();

function showLoading(show) {
  const el = document.getElementById('loadingOverlay');
  if (show) { el.classList.add('show'); let pct = 0; window._loadInterval = setInterval(()=>{ pct = Math.min(pct + Math.random()*8, 90); document.getElementById('loadingBar').style.width = pct+'%'; }, 200); } 
  else { clearInterval(window._loadInterval); document.getElementById('loadingBar').style.width = '100%'; setTimeout(()=>el.classList.remove('show'), 400); }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let player, mapData, camera;
let keys = { justJump: false };
let animFrame;

function makeRng(seed) {
  let a = seed; return function() { a += 0x6D2B79F5; let t = a; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; };
}

function initGame() {
  const pName = document.getElementById('playerNameHud');
  if(pName) pName.textContent = `[ ${state.nickname} ]`;
  
  loadMap(state.currentMap);

  document.onkeydown = e => { if (['Space','ArrowUp','KeyW'].includes(e.code)) { if (!keys[e.code]) keys.justJump = true; } keys[e.code] = true; if (['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code)) e.preventDefault(); };
  document.onkeyup = e => { keys[e.code] = false; };
  setupTouchControls();

  lastTime = 0; state.gameRunning = true; updateHUD();
  cancelAnimationFrame(animFrame); animFrame = requestAnimationFrame(gameLoop);
}

function loadMap(idx) {
  const rng = makeRng(idx * 7771 + 42); mapData = generateMapWithRng(idx, rng);
  player = { x: 60, y: GROUND_Y - PLAYER_H, vx: 0, vy: 0, grounded: true, jumps: 0, facingRight: true, animFrame: 0, animTimer: 0, reachedFlag: false, dead: false };
  camera = { x: 0 }; monsterCooldown = 0;
  const mapInd = document.getElementById('mapIndicator'); if(mapInd) mapInd.textContent = `맵 ${idx+1}/20`;
  updateHUD();
}

function generateMapWithRng(mapIndex, rng) {
  const mapWidth = 3000 + mapIndex * 150; 
  const themes = [ {sky:'#5C94FC',groundTop:'#5CBA3C',groundFill:'#C84B11'}, {sky:'#1a1a4a',groundTop:'#4a3a20',groundFill:'#2a1a10'}, {sky:'#204880',groundTop:'#506030',groundFill:'#303820'}, {sky:'#401060',groundTop:'#503020',groundFill:'#301800'}, {sky:'#0a2040',groundTop:'#205010',groundFill:'#103008'} ];
  const theme = themes[mapIndex % themes.length];
  const gaps = [], plats = [], mons = [], cns = [];
  const startX = 400, endX = mapWidth - 500, playWidth = endX - startX;

  const numGaps = 3 + Math.floor(rng() * 3); const gapSeg = playWidth / numGaps;
  for (let i = 0; i < numGaps; i++) {
    let isWide = rng() < 0.4; let gw = isWide ? (140 + Math.floor(rng() * 30)) : (80 + Math.floor(rng() * 40));
    let gx = startX + i * gapSeg + 50 + rng() * (gapSeg - gw - 100); gaps.push({x: gx, w: gw});
  }

  const numMons = 6 + Math.floor(rng() * 4); const monSeg = playWidth / numMons; const monTypes = ['goomba', 'koopa', 'boo', 'spiny'];
  for (let i = 0; i < numMons; i++) {
    let mx = startX + i * monSeg + 50 + rng() * (monSeg - 100);
    let overlapGap = gaps.find(g => mx + MONSTER_W + 30 > g.x && mx - 30 < g.x + g.w);
    if (overlapGap) { mx = (rng() < 0.5) ? (overlapGap.x - MONSTER_W - 40) : (overlapGap.x + overlapGap.w + 40); }
    mons.push({ x: mx, y: GROUND_Y - MONSTER_H, w: MONSTER_W, h: MONSTER_H, vx: (rng() < 0.5 ? -1 : 1) * 0.96, vy: 0, grounded: true, type: monTypes[Math.floor(rng() * monTypes.length)], startX: mx, patrolDist: 60 + Math.floor(rng() * 40), dir: 1, dead: false });
  }

  const numCoins = 2 + Math.floor(rng() * 2); const coinSeg = playWidth / numCoins;
  for (let i = 0; i < numCoins; i++) {
    let cx = startX + i * coinSeg + 50 + rng() * (coinSeg - 100); let cy = GROUND_Y - 60 - Math.floor(rng() * 60);
    let overGap = gaps.some(g => cx + 22 > g.x && cx < g.x + g.w); if (overGap) cy = GROUND_Y - 140;
    cns.push({x: cx, y: cy, w: 22, h: 22, collected: false, anim: rng() * 10});
  }

  let qBlockCount = 0; let px = startX;
  while (px < endX) {
    let overlapGap = gaps.find(g => px + TILE*4 > g.x - 20 && px < g.x + g.w + 20);
    if (overlapGap) { px = overlapGap.x + overlapGap.w + 50; continue; }
    let chunkType = Math.floor(rng() * 4);
    if (chunkType === 0) { 
      let platLen = 1 + Math.floor(rng() * 4); let py = GROUND_Y - 70 - Math.floor(rng() * 20);
      let hasQ = (platLen >= 2 && qBlockCount < 3 && rng() < 0.6); let qIdx = hasQ ? Math.floor(rng() * platLen) : -1; if (hasQ) qBlockCount++;
      for (let i=0; i<platLen; i++) plats.push({x: px + i*TILE, y: py, w: TILE, h: TILE, type: (i===qIdx)?'qblock':'brick', isHit:false});
    } else if (chunkType === 1) { 
      let platLen = 2 + Math.floor(rng() * 2); let py = GROUND_Y - 140 - Math.floor(rng() * 20);
      let hasQ = (platLen >= 2 && qBlockCount < 3 && rng() < 0.6); let qIdx = hasQ ? Math.floor(rng() * platLen) : -1; if (hasQ) qBlockCount++;
      for (let i=0; i<platLen; i++) plats.push({x: px + i*TILE, y: py, w: TILE, h: TILE, type: (i===qIdx)?'qblock':'stone', isHit:false});
    } else if (chunkType === 2) { 
      let py1 = GROUND_Y - 60; let py2 = GROUND_Y - 110;
      plats.push({x: px, y: py1, w: TILE, h: TILE, type: 'brick', isHit:false}); plats.push({x: px + TILE, y: py1, w: TILE, h: TILE, type: 'brick', isHit:false}); plats.push({x: px + TILE*3, y: py2, w: TILE, h: TILE, type: 'stone', isHit:false}); plats.push({x: px + TILE*4, y: py2, w: TILE, h: TILE, type: 'stone', isHit:false});
    } else if (chunkType === 3) { 
      let py1 = GROUND_Y - 70; let py2 = GROUND_Y - 130;
      let hasQ = (qBlockCount < 3 && rng() < 0.6); if (hasQ) qBlockCount++;
      for (let i=0; i<3; i++) plats.push({x: px + i*TILE, y: py1, w: TILE, h: TILE, type: 'brick', isHit:false});
      for (let i=0; i<3; i++) plats.push({x: px + i*TILE, y: py2, w: TILE, h: TILE, type: (i===1 && hasQ)?'qblock':'stone', isHit:false});
    }
    px += 200 + Math.floor(rng() * 200);
  }
  return {mapWidth, theme, plats, gaps, monsters:mons, coins:cns, flagX:mapWidth-150};
}

function gameLoop(timestamp) {
  if (!state.gameRunning) return;
  animFrame = requestAnimationFrame(gameLoop);
  if (!lastTime) lastTime = timestamp; const dt = timestamp - lastTime;
  if (dt >= frameDelay) { lastTime = timestamp - (dt % frameDelay); update(); render(); }
}

function update() {
  if (!player || player.dead || player.reachedFlag) return;
  const speed = 2.8; const jumpForce = -8.4; const gravity = 0.36;    

  if (keys['ArrowLeft'] || keys['KeyA'] || window.touchLeft) { player.vx = -speed; player.facingRight = false; } 
  else if (keys['ArrowRight'] || keys['KeyD'] || window.touchRight) { player.vx = speed; player.facingRight = true; } 
  else { player.vx *= 0.7; }

  const jumpJustPressed = keys.justJump || window.touchJumpJust;
  if (jumpJustPressed) {
    if (player.grounded) { player.vy = jumpForce; player.grounded = false; player.jumps = 1; } 
    else if (player.jumps === 1) { player.vy = jumpForce * 0.9; player.jumps = 2; showFloatText('💨', player.x - camera.x, player.y + 20, '#FFF'); }
  }
  keys.justJump = false; window.touchJumpJust = false;

  player.vy += gravity; player.x += player.vx; player.y += player.vy;
  player.animTimer++; if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame+1)%4; }
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  player.grounded = false;

  const groundTop = GROUND_Y;
  const inGap = mapData.gaps.some(g => player.x + PLAYER_W/2 > g.x && player.x + PLAYER_W/2 < g.x+g.w);
  if (!inGap && player.y + PLAYER_H >= groundTop && player.vy > 0) { player.y = groundTop - PLAYER_H; player.vy = 0; player.grounded = true; player.jumps = 0; }
  if (player.y > CANVAS_H + 50) { playerHurt(30, true); }

  for (const p of mapData.plats) {
    if (player.x + PLAYER_W > p.x && player.x < p.x + p.w && player.y + PLAYER_H > p.y && player.y + PLAYER_H < p.y + p.h + Math.abs(player.vy) + 4 && player.vy >= 0) { player.y = p.y - PLAYER_H; player.vy = 0; player.grounded = true; player.jumps = 0; }
    if (player.x + PLAYER_W > p.x + 4 && player.x < p.x + p.w - 4 && player.y < p.y + p.h && player.y > p.y && player.vy < 0) {
      player.vy = 0; player.y = p.y + p.h;
      if (p.type === 'qblock' && !p.isHit) {
        p.isHit = true; p.type = 'used';
        if (Math.random() < 0.5) {
          mapData.coins.push({x: p.x + p.w/2 - 11, y: p.y - 40, w: 22, h: 22, collected: false, anim: 0}); showFloatText('⭐', p.x - camera.x + p.w/2, p.y - 20, '#FFD700');
        } else {
          const monTypes = ['goomba', 'koopa', 'boo', 'spiny'];
          mapData.monsters.push({ x: p.x + p.w/2 - MONSTER_W/2, y: p.y - MONSTER_H, w: MONSTER_W, h: MONSTER_H, vx: (Math.random()<0.5?-1:1)*1.2, vy: -4, grounded: false, type: monTypes[Math.floor(Math.random() * monTypes.length)], startX: p.x, patrolDist: 80, dir: 1, dead: false });
        }
      }
    }
  }

  if (monsterCooldown > 0) monsterCooldown--; 
  for (let i=0; i<mapData.monsters.length; i++) {
    const m = mapData.monsters[i]; if (m.dead) continue;
    if (!m.grounded) { m.vy += gravity; m.y += m.vy; if (m.y + m.h >= groundTop) { m.y = groundTop - m.h; m.vy = 0; m.grounded = true; } }
    m.x += m.vx * m.dir; if (Math.abs(m.x - m.startX) > m.patrolDist) m.dir *= -1;

    if (monsterCooldown === 0 && player.x + PLAYER_W - 4 > m.x && player.x + 4 < m.x + m.w && player.y + PLAYER_H > m.y + 4 && player.y < m.y + m.h) {
      if (player.vy > 0 && player.y + PLAYER_H < m.y + (m.h * 0.7)) { m.dead = true; player.vy = -7.2; player.grounded = false; player.jumps = 1; state.score += 50; showFloatText('+50', m.x - camera.x, m.y - 10, '#FFF'); updateHUD(); } 
      else { playerHurt(20, false); }
    }
  }

  for (const c of mapData.coins) {
    if (!c.collected && player.x + PLAYER_W > c.x && player.x < c.x + c.w && player.y + PLAYER_H > c.y && player.y < c.y + c.h) { c.collected = true; state.score += 30; state.coins += 1; state.health = Math.min(state.health + 10, state.maxHealth); showFloatText('+30점', player.x - camera.x, player.y - 10, '#FFD700'); updateHUD(); }
    c.anim = (c.anim||0) + 0.12; 
  }

  if (!player.reachedFlag && player.x + PLAYER_W > mapData.flagX) { player.reachedFlag = true; setTimeout(() => showQuestion(), 600); }
  const targetCamX = player.x - CANVAS_W * 0.35; camera.x += (targetCamX - camera.x) * 0.1; camera.x = Math.max(0, Math.min(camera.x, mapData.mapWidth - CANVAS_W));
}

function playerHurt(dmg, isFall) {
  if (monsterCooldown > 0 && !isFall) return; 
  state.health = Math.max(0, state.health - dmg); monsterCooldown = 60; showFloatText(`-${dmg}HP 💥`, player.x - camera.x, player.y - 20, '#FF4444'); updateHUD();
  const gameWrapper = document.querySelector('.game-wrapper'); if(gameWrapper) { gameWrapper.classList.remove('shake'); void gameWrapper.offsetWidth; gameWrapper.classList.add('shake'); }

  if (state.health <= 0) {
    state.gameRunning = false;
    setTimeout(() => {
      alert(`💔 체력이 모두 소진되었습니다!\n현재 스테이지(${state.currentMap + 1}번 맵)의 처음 상태로 부활합니다.`);
      state.score = levelSnapshot.score; state.coins = levelSnapshot.coins; state.health = levelSnapshot.health; state.maxHealth = levelSnapshot.maxHealth;
      loadMap(state.currentMap); lastTime = 0; state.gameRunning = true; animFrame = requestAnimationFrame(gameLoop); 
    }, 500); 
  }
}

function render() {
  if (!mapData || !player) return; const cx = Math.floor(camera.x);
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = mapData.theme.sky; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground(cx); drawGround(cx);
  for (const p of mapData.plats) drawPlatform(p, cx);
  for (const c of mapData.coins) { if (!c.collected) drawCoin(c, cx); }
  drawFlag(cx); for (const m of mapData.monsters) { if (!m.dead) drawMonster(m, cx); }
  drawPlayer(cx);
}

function drawBackground(cx) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const clouds = [{x:200,y:60,r:30},{x:400,y:40,r:25},{x:700,y:70,r:35},{x:1100,y:50,r:28},{x:1500,y:65,r:32},{x:1900,y:45,r:26},{x:2300,y:60,r:30},{x:2700,y:40,r:35},{x:3100,y:55,r:28}];
  for (const cloud of clouds) {
    const cx2 = cloud.x - cx*0.5; if (cx2 < -80 || cx2 > CANVAS_W+80) continue;
    ctx.beginPath(); ctx.ellipse(cx2, cloud.y, cloud.r, cloud.r*0.6, 0, 0, Math.PI*2); ctx.ellipse(cx2-cloud.r*0.7, cloud.y+4, cloud.r*0.7, cloud.r*0.5, 0, 0, Math.PI*2); ctx.ellipse(cx2+cloud.r*0.7, cloud.y+4, cloud.r*0.7, cloud.r*0.5, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#228B22';
  const bushes = [ {x:150,r:25}, {x:550,r:30}, {x:950,r:20}, {x:1450,r:35}, {x:2050,r:25} ];
  for(const b of bushes) {
    const bx = b.x - cx*0.7; if(bx < -80 || bx > CANVAS_W+80) continue;
    ctx.beginPath(); ctx.ellipse(bx, GROUND_Y, b.r, b.r*0.8, 0, Math.PI, 0); ctx.ellipse(bx-b.r*0.6, GROUND_Y, b.r*0.7, b.r*0.6, 0, Math.PI, 0); ctx.ellipse(bx+b.r*0.6, GROUND_Y, b.r*0.7, b.r*0.6, 0, Math.PI, 0); ctx.fill();
  }
  ctx.fillStyle = 'rgba(100,180,60,0.3)';
  const hills = [{x:300,r:90},{x:800,r:110},{x:1300,r:80},{x:1800,r:100}];
  for (const h of hills) { const hx = h.x - cx*0.8; if (hx < -120 || hx > CANVAS_W+120) continue; ctx.beginPath(); ctx.ellipse(hx, GROUND_Y, h.r, h.r*0.5, 0, Math.PI, 0); ctx.fill(); }
}

function drawGround(cx) {
  const groundY = GROUND_Y; const groundH = CANVAS_H - groundY;
  ctx.fillStyle = mapData.theme.groundFill || '#C84B11'; ctx.fillRect(0, groundY, CANVAS_W, groundH);
  for (const g of mapData.gaps) { const gx = g.x - cx; if (gx+g.w > 0 && gx < CANVAS_W) { ctx.fillStyle = mapData.theme.sky; ctx.fillRect(gx, groundY, g.w, groundH); } }
  const tileW = TILE; const startTile = Math.floor(cx/tileW); const endTile = startTile + Math.ceil(CANVAS_W/tileW) + 1;
  for (let t=startTile; t<=endTile; t++) {
    const tx = t*tileW - cx; const tWorldX = t*tileW; const inGap = mapData.gaps.some(g=>tWorldX>=g.x && tWorldX<g.x+g.w);
    if (!inGap) {
      ctx.fillStyle = '#FFAA55'; ctx.fillRect(tx, groundY, tileW, groundH); ctx.fillStyle = '#C84B11'; ctx.fillRect(tx+2, groundY+2, tileW-4, groundH-4);
      ctx.fillStyle = mapData.theme.groundTop || '#5CBA3C'; ctx.fillRect(tx, groundY, tileW, 10); ctx.fillStyle = '#7CFA5C'; ctx.fillRect(tx, groundY, tileW, 3);
    }
  }
}

function drawPlatform(p, cx) {
  const px = p.x - cx; if (px+p.w < 0 || px > CANVAS_W) return;
  const colors = { brick: {top:'#C84B11',mid:'#A03808',line:'rgba(0,0,0,0.4)'}, qblock: {top:'#FBD000',mid:'#C89000',line:'rgba(0,0,0,0.3)'}, used: {top:'#C88553',mid:'#8B5A2B',line:'rgba(0,0,0,0.5)'}, stone: {top:'#888',mid:'#555',line:'rgba(0,0,0,0.4)'} };
  const c = colors[p.type] || colors.brick;
  ctx.fillStyle = c.top; ctx.fillRect(px, p.y, p.w, p.h); ctx.fillStyle = c.mid; ctx.fillRect(px, p.y+p.h-8, p.w, 8);
  ctx.fillStyle = c.line; for (let i=0; i<p.w; i+=TILE) { ctx.fillRect(px+i, p.y, 2, p.h); ctx.fillRect(px+i, p.y, TILE, 2); ctx.fillRect(px+i, p.y+p.h-2, TILE, 2); }
  if (p.type === 'qblock') { const bob = Math.sin(Date.now()*0.005)*2; ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Jua'; ctx.textAlign = 'center'; ctx.fillText('?', px+p.w/2, p.y+p.h-8 + bob); } 
  else if (p.type === 'used') { ctx.fillStyle = '#444'; for (let i=0; i<p.w; i+=TILE) { ctx.fillRect(px+i+4, p.y+4, 4, 4); ctx.fillRect(px+i+TILE-8, p.y+p.h-8, 4, 4); } }
}

function drawCoin(c, cx) {
  const coinX = c.x - cx; if (coinX < -30 || coinX > CANVAS_W+30) return;
  const bob = Math.sin(c.anim)*4; const r = 10; const cy = c.y + bob;
  ctx.beginPath(); ctx.arc(coinX+r, cy+r, r+4, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(coinX+r, cy+r, r, 0, Math.PI*2); ctx.fillStyle = '#FFD700'; ctx.fill();
  ctx.beginPath(); ctx.arc(coinX+r, cy+r, r*0.6, 0, Math.PI*2); ctx.fillStyle = '#FFA500'; ctx.fill();
  ctx.font = 'bold 10px Jua'; ctx.fillStyle = '#C87800'; ctx.textAlign = 'center'; ctx.fillText('C', coinX+r, cy+r+4);
}

function drawFlag(cx) {
  const fx = mapData.flagX - cx; if (fx < -40 || fx > CANVAS_W+40) return;
  ctx.fillStyle = '#888'; ctx.fillRect(fx-2, GROUND_Y-140, 6, 140); ctx.fillStyle = '#aaa'; ctx.fillRect(fx, GROUND_Y-140, 2, 140);
  ctx.fillStyle = '#E52521'; ctx.beginPath(); ctx.moveTo(fx+4, GROUND_Y-140); ctx.lineTo(fx+36, GROUND_Y-128); ctx.lineTo(fx+4, GROUND_Y-116); ctx.fill();
  ctx.fillStyle = '#FFD700'; ctx.fillRect(fx-10, GROUND_Y-6, 24, 8);
}

function drawMonster(m, cx) {
  const mx = m.x - cx; if (mx+m.w < -20 || mx > CANVAS_W+20) return; const facing = m.vx * m.dir < 0;
  ctx.save();
  if (facing) { ctx.translate(mx + m.w, m.y); ctx.scale(-1, 1); ctx.translate(-m.w*0.5, 0); } else { ctx.translate(mx, m.y); }
  if (m.type === 'koopa') drawKoopa(m.w, m.h); else if (m.type === 'boo') drawBoo(m.w, m.h); else if (m.type === 'spiny') drawSpiny(m.w, m.h); else drawGoomba(m.w, m.h); 
  ctx.restore();
}

function drawGoomba(w, h) {
  ctx.fillStyle = '#8B4513'; ctx.beginPath(); ctx.ellipse(w/2, h*0.65, w*0.48, h*0.38, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5C2D00'; ctx.beginPath(); ctx.arc(w/2, h*0.35, w*0.45, Math.PI, 0, false); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillRect(w*0.18, h*0.42, w*0.2, h*0.18); ctx.fillRect(w*0.62, h*0.42, w*0.2, h*0.18);
  ctx.fillStyle = '#000'; ctx.fillRect(w*0.22, h*0.46, w*0.12, h*0.12); ctx.fillRect(w*0.66, h*0.46, w*0.12, h*0.12);
  ctx.fillStyle = '#3a1500'; ctx.fillRect(w*0.1, h*0.88, w*0.28, h*0.12); ctx.fillRect(w*0.62, h*0.88, w*0.28, h*0.12);
}

function drawKoopa(w, h) {
  ctx.fillStyle = '#3EA80A'; ctx.beginPath(); ctx.ellipse(w/2, h*0.55, w*0.42, h*0.42, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a8000'; ctx.beginPath(); ctx.ellipse(w/2, h*0.55, w*0.28, h*0.28, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5CCC00'; ctx.beginPath(); ctx.arc(w*0.72, h*0.22, h*0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(w*0.78, h*0.18, h*0.07, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(w*0.80, h*0.18, h*0.04, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5CCC00'; ctx.fillRect(w*0.1, h*0.82, w*0.22, h*0.16); ctx.fillRect(w*0.68, h*0.82, w*0.22, h*0.16);
}

function drawBoo(w, h) {
  ctx.fillStyle = 'rgba(240,240,255,0.9)'; ctx.beginPath(); ctx.arc(w/2, h*0.4, w*0.45, Math.PI, 0); ctx.lineTo(w*0.95, h*0.85); ctx.lineTo(w*0.78, h*0.72); ctx.lineTo(w*0.6, h*0.88); ctx.lineTo(w*0.5, h*0.72); ctx.lineTo(w*0.4, h*0.88); ctx.lineTo(w*0.22, h*0.72); ctx.lineTo(w*0.05, h*0.85); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(w*0.35, h*0.38, w*0.09, 0, Math.PI*2); ctx.arc(w*0.65, h*0.38, w*0.09, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#E52521'; ctx.beginPath(); ctx.arc(w*0.35, h*0.38, w*0.04, 0, Math.PI*2); ctx.arc(w*0.65, h*0.38, w*0.04, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w/2, h*0.6, w*0.22, 0, Math.PI); ctx.fill();
}

function drawSpiny(w, h) {
  ctx.fillStyle = '#CC2200'; ctx.beginPath(); ctx.arc(w/2, h*0.6, w*0.42, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF4444'; const spineAngles = [0, 45, 90, 135, 180];
  for (const ang of spineAngles) { const rad = Math.PI + ang * Math.PI/180; const bx = w/2 + Math.cos(rad)*w*0.38; const by = h*0.6 + Math.sin(rad)*h*0.35; ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx+Math.cos(rad)*w*0.2, by+Math.sin(rad)*h*0.2); ctx.lineTo(bx+Math.cos(rad+0.3)*w*0.1, by+Math.sin(rad+0.3)*h*0.1); ctx.fill(); }
  ctx.fillStyle = '#fff'; ctx.fillRect(w*0.25, h*0.45, w*0.18, h*0.14); ctx.fillRect(w*0.57, h*0.45, w*0.18, h*0.14);
  ctx.fillStyle = '#000'; ctx.fillRect(w*0.3, h*0.48, w*0.1, h*0.08); ctx.fillRect(w*0.6, h*0.48, w*0.1, h*0.08);
  ctx.fillStyle = '#882200'; ctx.fillRect(w*0.2, h*0.9, w*0.22, h*0.1); ctx.fillRect(w*0.58, h*0.9, w*0.22, h*0.1);
}

function drawPlayer(cx) {
  if (!player) return; const px = player.x - cx; const py = player.y;
  ctx.save();
  if (monsterCooldown > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.4;
  if (!player.facingRight) { ctx.translate(px + PLAYER_W, py); ctx.scale(-1, 1); } else { ctx.translate(px, py); }
  const walking = Math.abs(player.vx) > 0.5 && player.grounded; const jumping = !player.grounded; const w = PLAYER_W, h = PLAYER_H;
  const charName = state.character.name;

  if (charName === '마리오' || charName === '루이지') {
    const isLuigi = (charName === '루이지'); const mainColor = isLuigi ? '#2E8B00' : '#E52521'; const overColor = isLuigi ? '#0033AA' : '#0044BB'; const skinColor = '#FFCC99'; const shoeColor = '#663300';
    const bob = walking ? Math.sin(player.animFrame * 1.5) * 2 : 0; const jumpOffset = jumping ? -2 : 0;
    ctx.fillStyle = skinColor; ctx.fillRect(w*0.2, h*0.2 + bob, w*0.6, h*0.4); ctx.fillStyle = mainColor; ctx.fillRect(w*0.1, h*0.1 + bob, w*0.7, h*0.15); ctx.fillRect(w*0.3, h*0.05 + bob, w*0.5, h*0.05); 
    ctx.fillStyle = '#000'; ctx.fillRect(w*0.6, h*0.25 + bob, w*0.1, h*0.1); ctx.fillRect(w*0.6, h*0.4 + bob, w*0.3, h*0.1);
    ctx.fillStyle = skinColor; ctx.fillRect(w*0.8, h*0.3 + bob, w*0.15, h*0.1); ctx.fillStyle = mainColor; ctx.fillRect(w*0.2, h*0.55 + jumpOffset, w*0.6, h*0.35);
    ctx.fillStyle = overColor; ctx.fillRect(w*0.3, h*0.7 + jumpOffset, w*0.4, h*0.2); ctx.fillRect(w*0.2, h*0.85 + jumpOffset, w*0.2, h*0.1); ctx.fillRect(w*0.6, h*0.85 + jumpOffset, w*0.2, h*0.1);
    const armWobble = walking ? Math.sin(player.animFrame)*3 : (jumping ? -4 : 0); ctx.fillStyle = mainColor; ctx.fillRect(w*0.1, h*0.6 + armWobble, w*0.2, h*0.2); ctx.fillStyle = '#FFF'; ctx.fillRect(w*0.05, h*0.8 + armWobble, w*0.2, h*0.1); 
    ctx.fillStyle = shoeColor; const leg1 = walking ? Math.sin(player.animFrame)*3 : (jumping ? -2 : 0); const leg2 = walking ? -Math.sin(player.animFrame)*3 : (jumping ? -4 : 0); ctx.fillRect(w*0.1, h*0.95 + leg1, w*0.3, h*0.1); ctx.fillRect(w*0.6, h*0.95 + leg2, w*0.3, h*0.1);
  } else {
    const e = state.character.emoji; const wobble = walking ? Math.sin(player.animFrame * 0.8) * 2 : 0; const squish = jumping ? 1.15 : 1;
    ctx.font = `${PLAYER_H}px sans-serif`; ctx.textAlign = 'left'; ctx.scale(1, squish); ctx.fillText(e, 0, PLAYER_H/squish - wobble);
  }
  ctx.restore();
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(player.x - cx + PLAYER_W/2, GROUND_Y + 2, PLAYER_W*0.5, 4, 0, 0, Math.PI*2); ctx.fill();

  if (state.nickname) {
    const nickY = player.y - 12; const nickX = player.x - cx + PLAYER_W/2;
    ctx.font = 'bold 12px Jua'; ctx.textAlign = 'center'; ctx.lineWidth = 3; ctx.strokeStyle = '#000'; ctx.strokeText(state.nickname, nickX, nickY); ctx.fillStyle = '#FFF'; ctx.fillText(state.nickname, nickX, nickY);
  }
}

function showFloatText(text, x, y, color) {
  const gameEl = document.getElementById('gameScreen'); const div = document.createElement('div'); div.className = 'float-text';
  div.style.left = (x + gameEl.offsetLeft) + 'px'; div.style.top = (y + gameEl.offsetTop + 45) + 'px'; div.style.color = color; div.textContent = text;
  document.body.appendChild(div); setTimeout(() => div.remove(), 1200);
}

function updateHUD() {
  const sd = document.getElementById('scoreDisplay'); if(sd) sd.textContent = state.score.toLocaleString();
  const cd = document.getElementById('coinDisplay'); if(cd) cd.textContent = state.coins;
  const bar = document.getElementById('healthBar');
  if(bar) {
    bar.innerHTML = '';
    const pips = Math.ceil(state.maxHealth / 10); const filledPips = Math.ceil(state.health / 10);
    for (let i=0; i<pips; i++) { const pip = document.createElement('div'); pip.className = 'health-pip' + (i < filledPips ? '' : ' empty'); bar.appendChild(pip); }
  }
}

function showQuestion() {
  cancelAnimationFrame(animFrame); state.gameRunning = false;
  const q = state.questions[state.currentMap];
  document.getElementById('qHeader').textContent = `문제 ${state.currentMap+1}/20 · 난이도: ${state.difficulty}`;
  document.getElementById('qChar').textContent = state.character.emoji; document.getElementById('qText').textContent = q.q;
  document.getElementById('qFeedback').innerHTML = ''; document.getElementById('qNextBtn').style.display = 'none';
  const optDiv = document.getElementById('qOptions'); optDiv.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button'); btn.className = 'q-option'; btn.textContent = `${['①','②','③','④'][idx]} ${opt}`;
    btn.onclick = () => answerQuestion(idx, q); optDiv.appendChild(btn);
  });
  document.getElementById('questionModal').classList.add('show');
}

function answerQuestion(idx, q) {
  const btns = document.querySelectorAll('.q-option'); const correct = (idx === q.answer);
  if (correct) {
    btns.forEach(b => b.disabled = true); btns[idx].classList.add('correct');
    state.score += 100; state.answeredCount++;
    document.getElementById('qFeedback').innerHTML = `<span style="color:#5CFF00">🎉 정답! +100점!</span><br><small style="color:#aaa">${q.explain}</small>`;
    updateHUD(); document.getElementById('qNextBtn').style.display = 'inline-block';
  } else {
    btns[idx].disabled = true; btns[idx].classList.add('wrong');
    const tipMsg = q.tip || "문제를 다시 한번 꼼꼼하게 읽어보세요!";
    document.getElementById('qFeedback').innerHTML = `<span style="color:#FF4444">❌ 아쉽지만 틀렸어요! 다시 골라보세요.</span><br><span style="color:#FFD700; font-size:0.9em;">💡 힌트: ${tipMsg}</span>`;
  }
}

function nextLevel() {
  document.getElementById('questionModal').classList.remove('show'); state.currentMap++;
  if (state.currentMap >= 20) { state.endTime = Date.now(); showResult(); return; }
  levelSnapshot = { score: state.score, coins: state.coins, health: state.health, maxHealth: state.maxHealth };
  loadMap(state.currentMap); lastTime = 0; state.gameRunning = true; animFrame = requestAnimationFrame(gameLoop);
}

function showResult() {
  cancelAnimationFrame(animFrame); cancelAnimationFrame(window.endingAnimFrame); state.gameRunning = false;
  document.getElementById('resultName').textContent = `${state.nickname} 모험가`;
  const pct = Math.round(state.answeredCount / 20 * 100);
  let grade, color;
  if (pct >= 90) { grade = '🏆 완벽한 수학 왕!'; color = '#FFD700'; } else if (pct >= 70) { grade = '⭐ 훌륭한 수학자!'; color = '#5CFF00'; } else if (pct >= 50) { grade = '👍 조금만 더 노력하면 완벽해질 거예요!'; color = '#FFA500'; } else { grade = '📚 기초부터 다시 단단하게 다져봐요!'; color = '#FF6666'; }

  const totalSecs = Math.floor((state.endTime - state.startTime) / 1000); const m = Math.floor(totalSecs / 60); const s = totalSecs % 60; const timeStr = m > 0 ? `${m}분 ${s}초` : `${s}초`;
  document.getElementById('resultStats').innerHTML = `
    <div class="stat-row"><span>맞힌 문제</span><span class="stat-val">${state.answeredCount} / 20</span></div>
    <div class="stat-row"><span>정답률</span><span class="stat-val">${pct}%</span></div>
    <div class="stat-row"><span>총 점수</span><span class="stat-val">${state.score.toLocaleString()}점</span></div>
    <div class="stat-row"><span>수집한 코인</span><span class="stat-val">${state.coins}개 🪙</span></div>
    <div class="stat-row"><span>걸린 시간</span><span class="stat-val">${timeStr} ⏱️</span></div>
    <div class="stat-row"><span>선택 난이도</span><span class="stat-val">${state.difficulty}</span></div>
  `;
  const gradeEl = document.getElementById('resultGrade'); gradeEl.textContent = grade; gradeEl.style.color = color; gradeEl.style.background = 'rgba(0,0,0,0.4)';
  showScreen('resultScreen'); animateEnding(); 
}

function animateEnding() {
  const eCanvas = document.getElementById('endingCanvas'); if(!eCanvas) return; const eCtx = eCanvas.getContext('2d');
  const time = Date.now() * 0.008; const jumpY = Math.abs(Math.sin(time)) * 30; 
  eCtx.clearRect(0, 0, eCanvas.width, eCanvas.height);
  for(let i=0; i<6; i++) { eCtx.fillStyle = ['#FFD700', '#FF4444', '#5CFF00', '#6B8CFF', '#FFA500', '#FF66FF'][i]; const sx = 125 + Math.cos(time + i) * 60; const sy = 125 + Math.sin(time + i) * 60; eCtx.beginPath(); eCtx.arc(sx, sy, 5, 0, Math.PI*2); eCtx.fill(); }
  eCtx.save(); eCtx.translate(125, 180 - jumpY); eCtx.scale(2.5, 2.5); eCtx.translate(-PLAYER_W/2, -PLAYER_H);
  const charName = state.character.name; const w = PLAYER_W; const h = PLAYER_H;

  if (charName === '마리오' || charName === '루이지') {
    const isLuigi = (charName === '루이지'); const mainColor = isLuigi ? '#2E8B00' : '#E52521'; const overColor = isLuigi ? '#0033AA' : '#0044BB'; const skinColor = '#FFCC99'; const shoeColor = '#663300';
    eCtx.fillStyle = skinColor; eCtx.fillRect(w*0.2, h*0.2, w*0.6, h*0.4); eCtx.fillStyle = mainColor; eCtx.fillRect(w*0.1, h*0.1, w*0.7, h*0.15); eCtx.fillRect(w*0.3, h*0.05, w*0.5, h*0.05); 
    eCtx.fillStyle = '#000'; eCtx.fillRect(w*0.6, h*0.25, w*0.1, h*0.1); eCtx.fillRect(w*0.6, h*0.4, w*0.3, h*0.1); eCtx.fillStyle = skinColor; eCtx.fillRect(w*0.8, h*0.3, w*0.15, h*0.1);
    eCtx.fillStyle = mainColor; eCtx.fillRect(w*0.2, h*0.55 - 2, w*0.6, h*0.35); eCtx.fillStyle = overColor; eCtx.fillRect(w*0.3, h*0.7 - 2, w*0.4, h*0.2); eCtx.fillRect(w*0.2, h*0.85 - 2, w*0.2, h*0.1); eCtx.fillRect(w*0.6, h*0.85 - 2, w*0.2, h*0.1);
    eCtx.fillStyle = mainColor; eCtx.fillRect(w*0.1, h*0.6 - 10, w*0.2, h*0.2); eCtx.fillStyle = '#FFF'; eCtx.fillRect(w*0.05, h*0.8 - 14, w*0.2, h*0.1); 
    eCtx.fillStyle = shoeColor; eCtx.fillRect(w*0.1, h*0.95 - 4, w*0.3, h*0.1); eCtx.fillRect(w*0.6, h*0.95 - 2, w*0.3, h*0.1);
  } else { const e = state.character.emoji; eCtx.font = `${h}px sans-serif`; eCtx.textAlign = 'left'; eCtx.scale(1, 1.15); eCtx.fillText(e, 0, h/1.15); }
  eCtx.restore(); window.endingAnimFrame = requestAnimationFrame(animateEnding);
}

function setupTouchControls() {
  window.touchLeft = false; window.touchRight = false; window.touchJump = false; window.touchJumpJust = false;
  const btnL = document.getElementById('btnLeft'); const btnR = document.getElementById('btnRight'); const btnJ = document.getElementById('btnJump');
  if(!btnL || !btnR || !btnJ) return;
  btnL.addEventListener('touchstart', e=>{e.preventDefault(); window.touchLeft=true;}, {passive:false}); btnL.addEventListener('touchend', e=>{e.preventDefault(); window.touchLeft=false;}, {passive:false});
  btnR.addEventListener('touchstart', e=>{e.preventDefault(); window.touchRight=true;}, {passive:false}); btnR.addEventListener('touchend', e=>{e.preventDefault(); window.touchRight=false;}, {passive:false});
  btnJ.addEventListener('touchstart', e=>{ e.preventDefault(); window.touchJump=true; window.touchJumpJust=true; }, {passive:false}); btnJ.addEventListener('touchend', e=>{ e.preventDefault(); window.touchJump=false; }, {passive:false});
}

buildCharGrid();
selectDiff('중');
</script>
